<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бамбузл Клон - Викторина</title>
    <style>
        :root { --primary: #ffcc00; --secondary: #ff3366; --bg: #2c3e50; }
        body { font-family: 'Arial Black', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; }
        
        .scoreboard { display: flex; justify-content: space-around; background: #34495e; padding: 15px; position: sticky; top: 0; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .team { padding: 10px 20px; border-radius: 10px; border: 3px solid transparent; }
        .active-team { border-color: var(--primary); background: rgba(255, 204, 0, 0.1); }
        .score { font-size: 32px; color: var(--primary); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; padding: 20px; max-width: 900px; margin: auto; }
        .card { background: #ecf0f1; color: #2c3e50; height: 120px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 0 #bdc3c7; }
        .card:hover { transform: translateY(-5px); background: #fff; }
        .card.used { background: #95a5a6; cursor: default; opacity: 0.5; }

        /* Модальное окно */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; }
        .modal-content { background: white; color: #2c3e50; padding: 40px; border-radius: 20px; width: 80%; max-width: 500px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; }
        .btn-correct { background: #2ecc71; color: white; }
        .btn-wrong { background: #e74c3c; color: white; }
        
        .special { color: var(--secondary); font-size: 40px; }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div id="team1-box" class="team active-team">
            <div>Команда А</div>
            <div id="score1" class="score">0</div>
        </div>
        <div id="team2-box" class="team">
            <div>Команда Б</div>
            <div id="score2" class="score">0</div>
        </div>
    </div>

    <h1>ВЫБЕРИ КАРТОЧКУ!</h1>
    <div class="grid" id="game-grid"></div>

    <div id="modal">
        <div class="modal-content" id="modal-inner">
            </div>
    </div>

    <script>
        // ТВОЯ ССЫЛКА MockAPI (вставь свою для таблицы лидеров)
        const API_URL = "ТВОЯ_ССЫЛКА_ТУТ"; 

        let scores = [0, 0];
        let activeTeam = 0; // 0 - Команда А, 1 - Команда Б

        const questions = [
            { type: "q", text: "Как называется столица Японии?", a: "Токио", p: 15 },
            { type: "q", text: "Сколько планет в Солнечной системе?", a: "8", p: 10 },
            { type: "bomb", text: "💣 БОМБА! Вы теряете ВСЕ очки!", p: 0 },
            { type: "swap", text: "🔄 ОБМЕН! Вы меняетесь очками с противником!", p: 0 },
            { type: "q", text: "Кто написал 'Гарри Поттера'?", a: "Дж. Роулинг", p: 20 },
            { type: "gift", text: "🎁 ПОДАРОК! +25 очков просто так!", p: 25 },
            { type: "q", text: "Самое быстрое животное?", a: "Гепард", p: 10 },
            { type: "q", text: "Сколько секунд в минуте?", a: "60", p: 5 },
            { type: "bomb", text: "💣 БАБАХ! -15 очков!", p: -15 },
            { type: "q", text: "Цвет неба в ясный день?", a: "Голубой", p: 5 },
            { type: "q", text: "Какой металл жидкий?", a: "Ртуть", p: 15 },
            { type: "swap", text: "🔄 ХИТРЫЙ ХОД! Обмен очками!", p: 0 }
        ];

        function createGrid() {
            const grid = document.getElementById('game-grid');
            questions.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerText = index + 1;
                card.onclick = () => openCard(index, card);
                grid.appendChild(card);
            });
        }

        function openCard(idx, cardEl) {
            if (cardEl.classList.contains('used')) return;
            cardEl.classList.add('used');
            
            const q = questions[idx];
            const modal = document.getElementById('modal');
            const inner = document.getElementById('modal-inner');
            modal.style.display = 'flex';

            if (q.type === 'q') {
                inner.innerHTML = `
                    <h3>ВОПРОС на ${q.p} очков</h3>
                    <p style="font-size: 24px">${q.text}</p>
                    <div class="btn-group">
                        <button class="btn btn-correct" onclick="addPoints(${q.p})">ПРАВИЛЬНО</button>
                        <button class="btn btn-wrong" onclick="closeModal()">ОШИБКА</button>
                    </div>
                `;
            } else if (q.type === 'bomb') {
                inner.innerHTML = `<h2 class="special">${q.text}</h2><button class="btn" onclick="applySpecial('bomb', ${q.p})">ОК...</button>`;
            } else if (q.type === 'swap') {
                inner.innerHTML = `<h2 class="special">${q.text}</h2><button class="btn" onclick="applySpecial('swap')">ВОТ ЭТО ДА!</button>`;
            } else if (q.type === 'gift') {
                inner.innerHTML = `<h2 class="special">${q.text}</h2><button class="btn" onclick="applySpecial('gift', ${q.p})">СПАСИБО!</button>`;
            }
        }

        function addPoints(p) {
            scores[activeTeam] += p;
            updateUI();
            closeModal();
        }

        function applySpecial(type, p) {
            if (type === 'bomb') {
                if (p === 0) scores[activeTeam] = 0; // Обнуление
                else scores[activeTeam] += p; // Минус очки
            } else if (type === 'swap') {
                let temp = scores[0];
                scores[0] = scores[1];
                scores[1] = temp;
            } else if (type === 'gift') {
                scores[activeTeam] += p;
            }
            updateUI();
            closeModal();
        }

        function updateUI() {
            document.getElementById('score1').innerText = scores[0];
            document.getElementById('score2').innerText = scores[1];
            
            // Смена команды
            activeTeam = activeTeam === 0 ? 1 : 0;
            document.getElementById('team1-box').classList.toggle('active-team', activeTeam === 0);
            document.getElementById('team2-box').classList.toggle('active-team', activeTeam === 1);
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            checkEndGame();
        }

        function checkEndGame() {
            const used = document.querySelectorAll('.card.used').length;
            if (used === questions.length) {
                const winner = scores[0] > scores[1] ? "Команда А" : "Команда Б";
                alert("ИГРА ОКОНЧЕНА! Победитель: " + winner);
            }
        }

        createGrid();
    </script>
</body>
</html>
