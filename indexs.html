<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина на GitHub</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --text: #e94560; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 15px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .btn { background: #0f3460; border: 2px solid var(--text); color: white; padding: 12px; margin: 8px; width: 100%; cursor: pointer; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: var(--text); }
        table { width: 100%; margin-top: 20px; border-spacing: 0; border-radius: 8px; overflow: hidden; }
        th { background: var(--text); color: white; padding: 10px; }
        td { background: #0f3460; padding: 10px; border-bottom: 1px solid #16213e; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="card" id="quiz-box">
        <h2 id="q-text">Загрузка...</h2>
        <div id="answers"></div>
    </div>

    <div class="card hidden" id="result-box">
        <h2>Игра окончена!</h2>
        <p>Твой результат: <strong id="score-val">0</strong></p>
        <button class="btn" onclick="saveScore()">Сохранить результат</button>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3>🏆 Таблица лидеров</h3>
        <table id="leaderboard">
            <thead><tr><th>Имя</th><th>Очки</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // --- 1. ТВОЯ НАСТРОЙКА ---
        // Зайди на mockapi.io (это бесплатно), создай проект и вставь ссылку сюда:
        const API_URL = "ТВОЯ_ССЫЛКА_ТУТ"; 

        const questions = [
            { q: "Какой язык программирования создал Брендан Эйк?", a: ["Python", "Java", "JavaScript", "C++"], c: 2 },
            { q: "Что такое HTML?", a: ["Язык разметки", "Язык программирования", "Протокол", "Браузер"], c: 0 },
            { q: "Где хранит файлы GitHub?", a: ["В облаке", "В репозиториях", "В письмах", "В папке Windows"], c: 1 }
        ];

        let currentStep = 0;
        let score = 0;

        function startQuiz() {
            if(currentStep >= questions.length) {
                document.getElementById('quiz-box').classList.add('hidden');
                document.getElementById('result-box').classList.remove('hidden');
                document.getElementById('score-val').innerText = score;
                return;
            }
            let q = questions[currentStep];
            document.getElementById('q-text').innerText = q.q;
            let ansDiv = document.getElementById('answers');
            ansDiv.innerHTML = "";
            q.a.forEach((text, i) => {
                let b = document.createElement('button');
                b.className = "btn";
                b.innerText = text;
                b.onclick = () => { if(i==q.c) score++; currentStep++; startQuiz(); };
                ansDiv.appendChild(b);
            });
        }

        async function saveScore() {
            let name = prompt("Введи свое имя:");
            if(!name) return;

            // Отправляем данные в API
            await fetch(API_URL, {
                method: 'POST',
                headers: {'content-type':'application/json'},
                body: JSON.stringify({ name: name, score: score })
            });
            
            alert("Сохранено!");
            loadLeaderboard();
        }

        async function loadLeaderboard() {
            try {
                let res = await fetch(API_URL);
                let data = await res.json();
                data.sort((a,b) => b.score - a.score); // Сортировка по очкам
                
                let html = data.slice(0, 5).map(row => `<tr><td>${row.name}</td><td>${row.score}</td></tr>`).join('');
                document.querySelector('#leaderboard tbody').innerHTML = html;
            } catch(e) { console.log("Пока данных нет"); }
        }

        startQuiz();
        loadLeaderboard();
    </script>
</body>
</html>
