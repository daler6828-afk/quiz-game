<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Drone Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .joystick-zone { position: absolute; bottom: 20px; width: 40%; height: 200px; pointer-events: auto; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; 
            align-items: center; z-index: 100; color: white; 
        }
        button { 
            padding: 20px 40px; font-size: 20px; cursor: pointer; 
            background: #27ae60; border: none; color: white; border-radius: 10px; 
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">ЗАПУСТИТЬ СИМУЛЯТОР</button>
    </div>

    <div id="ui-layer">
        <div id="left-zone" class="joystick-zone"></div>
        <div id="right-zone" class="joystick-zone"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        let scene, camera, renderer, drone;
        let moveInput = { forward: 0, side: 0, up: 0, turn: 0 };

        function init() {
            // 1. Сцена и Камера
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 10, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 2. Свет
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x606060));

            // 3. Земля (сетка)
            const grid = new THREE.GridHelper(200, 50, 0x0000ff, 0x888888);
            scene.add(grid);

            // 4. Дрон (простая модель)
            drone = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 0.1, 0.4), 
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            drone.add(body);
            
            // Пропеллеры (4 цилиндра)
            const propGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.02, 8);
            const propMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const positions = [[0.3, 0.05, 0.2], [0.3, 0.05, -0.2], [-0.3, 0.05, 0.2], [-0.3, 0.05, -0.2]];
            positions.forEach(pos => {
                const p = new THREE.Mesh(propGeo, propMat);
                p.position.set(...pos);
                drone.add(p);
            });

            scene.add(drone);
            drone.position.y = 1;

            // 5. Препятствия (Кольца)
            for(let i = 0; i < 15; i++) {
                const ring = new THREE.Mesh(
                    new THREE.TorusGeometry(1.5, 0.1, 16, 32),
                    new THREE.MeshStandardMaterial({ color: 0xffff00 })
                );
                ring.position.set(Math.random()*40-20, Math.random()*10+1, -i * 15 - 10);
                scene.add(ring);
            }

            setupJoysticks();
            animate();
        }

        function setupJoysticks() {
            // Левый джойстик: Вверх/Вниз и Поворот
            const left = nipplejs.create({ zone: document.getElementById('left-zone'), mode: 'static', position: {left: '50%', bottom: '50%'}, color: 'white' });
            left.on('move', (evt, data) => {
                moveInput.up = data.vector.y;
                moveInput.turn = -data.vector.x;
            });
            left.on('end', () => { moveInput.up = 0; moveInput.turn = 0; });

            // Правый джойстик: Вперед/Назад и Вбок
            const right = nipplejs.create({ zone: document.getElementById('right-zone'), mode: 'static', position: {left: '50%', bottom: '50%'}, color: 'red' });
            right.on('move', (evt, data) => {
                moveInput.forward = data.vector.y;
                moveInput.side = -data.vector.x;
            });
            right.on('end', () => { moveInput.forward = 0; moveInput.side = 0; });
        }

        function animate() {
            requestAnimationFrame(animate);

            // Движение дрона
            const speed = 0.15;
            const rotSpeed = 0.03;

            // Вперед/назад относительно направления дрона
            drone.translateZ(-moveInput.forward * speed);
            drone.translateX(-moveInput.side * speed);
            drone.position.y += moveInput.up * speed;
            drone.rotation.y += moveInput.turn * rotSpeed;

            // Наклоны для визуала
            drone.rotation.x = THREE.MathUtils.lerp(drone.rotation.x, moveInput.forward * 0.3, 0.1);
            drone.rotation.z = THREE.MathUtils.lerp(drone.rotation.z, moveInput.side * 0.3, 0.1);

            // Камера следует за дроном
            const relativeCameraOffset = new THREE.Vector3(0, 1.5, 4);
            const cameraOffset = relativeCameraOffset.applyMatrix4(drone.matrixWorld);
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(drone.position);

            renderer.render(scene, camera);
        }

        // Полноэкранный режим и Старт
        document.getElementById('start-btn').addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            document.getElementById('overlay').style.display = 'none';
            init();
        });

        window.addEventListener('resize', () => {
            if(camera) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });
    </script>
</body>
</html>
