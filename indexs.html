<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Super Clicker Game</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; }
        #game-container { margin-top: 50px; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; }
        table { margin: 20px auto; border-collapse: collapse; width: 300px; }
        th, td { border: 1px solid #ccc; padding: 10px; }
        th { background: #eee; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Очки: <span id="score">0</span></h1>
        <button onclick="addPoint()">КЛИК!</button>
        <br><br>
        <button onclick="saveScore()">Сохранить результат</button>
    </div>

    <h2>Таблица лидеров</h2>
    <table>
        <thead>
            <tr>
                <th>Имя</th>
                <th>Очки</th>
            </tr>
        </thead>
        <tbody id="leaderboard">
            </tbody>
    </table>

    <script>
        let currentScore = 0;
        // Замени на URL своего созданного API (например, на mockapi.io)
        const API_URL = 'https://65XXXXX.mockapi.io/leaderboard'; 

        function addPoint() {
            currentScore++;
            document.getElementById('score').innerText = currentScore;
        }

        // Загрузка таблицы лидеров
        async function loadLeaderboard() {
            const response = await fetch(API_URL);
            const data = await response.json();
            const list = document.getElementById('leaderboard');
            
            // Сортируем по убыванию очков
            data.sort((a, b) => b.score - a.score);
            
            list.innerHTML = data.slice(0, 5).map(item => 
                `<tr><td>${item.name}</td><td>${item.score}</td></tr>`
            ).join('');
        }

        // Сохранение результата
        async function saveScore() {
            const name = prompt("Введите ваше имя:");
            if (!name) return;

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, score: currentScore })
            });

            currentScore = 0;
            document.getElementById('score').innerText = 0;
            loadLeaderboard(); // Обновляем таблицу
        }

        loadLeaderboard();
    </script>
</body>
</html>
