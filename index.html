<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ark Builder: Time Traveler</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }

        /* ГЛАВНОЕ МЕНЮ */
        #menu { position: absolute; inset: 0; background: linear-gradient(#1a1a2e, #16213e); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .play-btn { padding: 20px 60px; font-size: 24px; background: #ffd700; color: #000; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); transition: 0.2s; }
        .play-btn:active { transform: scale(0.9); }

        /* HUD */
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: none; }
        .top-ui { position: absolute; top: 15px; left: 15px; display: flex; gap: 10px; pointer-events: auto; }
        #chest-btn { position: absolute; top: 15px; right: 15px; width: 60px; height: 60px; background: #5d4037; border: 3px solid #ffd700; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 30px; pointer-events: auto; }
        
        #chest-panel { position: absolute; top: 85px; right: 15px; width: 180px; background: rgba(30,20,10,0.95); border: 3px solid #ffd700; border-radius: 15px; padding: 10px; display: none; grid-template-columns: repeat(3, 1fr); gap: 8px; pointer-events: auto; }
        .slot { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: 2px solid #8d6e63; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; }
        .slot.active { border-color: #ffd700; background: rgba(255,215,0,0.2); }

        /* ДИАЛОГИ */
        #dialog { position: absolute; bottom: 150px; left: 50%; transform: translateX(-50%); width: 85%; background: white; border-radius: 20px; padding: 15px; display: none; text-align: center; border: 4px solid #5d4037; pointer-events: auto; z-index: 200; }

        /* КНОПКИ */
        #controls { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .btn-ui { width: 80px; height: 80px; background: rgba(255,255,255,0.15); border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; backdrop-filter: blur(5px); }
        #act-btn { background: rgba(255, 140, 0, 0.6); display: none; border-color: #ffa500; }

        .quest-list { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); color: #ffd700; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="font-size: 40px; margin-bottom: 5px;">ARK BUILDER</h1>
    <p style="margin-bottom: 30px; opacity: 0.8;">Помоги Ною построить ковчег!</p>
    <button class="play-btn" onclick="startGame()">ИГРАТЬ</button>
</div>

<div id="hud">
    <div class="top-ui">
        <div class="slot" id="q0" onclick="sel(0)">🪓</div>
        <div class="slot" id="q1" onclick="sel(1)"></div>
    </div>
    
    <div class="quest-list">
        ЧЕРТЕЖИ: <span id="plans-cnt">0/3</span><br>
        <div style="width: 120px; height: 8px; background: #333; border-radius: 4px; display: inline-block;">
            <div id="build-bar" style="width: 0%; height: 100%; background: #2ecc71;"></div>
        </div>
    </div>

    <div id="chest-btn" onclick="toggleChest()">📦</div>
    <div id="chest-panel"></div>

    <div id="dialog">
        <strong id="d-name"></strong>: <span id="d-text"></span><br>
        <button onclick="closeD()" style="margin-top:10px; padding: 5px 20px;">Далее</button>
    </div>

    <div id="controls">
        <div id="act-btn" class="btn-ui">ДЕЙСТВИЕ</div>
        <div id="jump-btn" class="btn-ui" ontouchstart="jump()">ПРЫЖОК</div>
    </div>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let w, h, camX = 0, active = false, plansFound = 0, buildVal = 0;
let player = { x: 150, y: 0, vx: 0, vy: 0, w: 40, h: 70, ground: false, slot: 0, inv: ['🪓', null], chest: [], anim: 0 };
let treeHP = 3, treeX = 1400, arkX = 3500;

const npcs = [
    { x: 800, name: "Ной", color: "#3498db", beard: true, msg: "Привет, путешественник! Нам нужны чертежи, они разлетелись по лесу!" },
    { x: 2200, name: "Сын Ноя", color: "#e74c3c", beard: false, msg: "Если соберешь все чертежи, мы сможем строить!" }
];

const worldPlans = [{x: 1100, f: false}, {x: 1900, f: false}, {x: 2700, f: false}];

function startGame() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    document.getElementById('menu').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    active = true;
    resize();
    loop();
}

// Инициализация сундука
const cp = document.getElementById('chest-panel');
for(let i=0; i<9; i++) {
    let s = document.createElement('div');
    s.className = 'slot';
    s.onclick = () => { if(player.chest[i]) { player.inv[1] = player.chest.splice(i, 1)[0]; updateUI(); } };
    cp.appendChild(s);
}

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);

// УПРАВЛЕНИЕ
let startX = null;
window.addEventListener('touchstart', e => { 
    if(e.touches[0].clientX < w/2) startX = e.touches[0].clientX; 
    if(e.target.id === 'act-btn') doAct();
});
window.addEventListener('touchmove', e => { if(startX) player.vx = Math.sign(e.touches[0].clientX - startX) * 7.5; });
window.addEventListener('touchend', () => { player.vx = 0; startX = null; });

function jump() { if(player.ground) { player.vy = -18; player.ground = false; } }
function toggleChest() { cp.style.display = cp.style.display === 'grid' ? 'none' : 'grid'; updateUI(); }
function sel(i) { player.slot = i; updateUI(); }
function closeD() { document.getElementById('dialog').style.display = 'none'; }

function doAct() {
    if(Math.abs(player.x - treeX) < 100 && player.inv[player.slot] === '🪓') {
        treeHP--; if(treeHP <= 0) { treeHP = 3; player.chest.push('🪵'); updateUI(); }
    }
    if(Math.abs(player.x - arkX) < 250 && player.inv[player.slot] === '🪵' && plansFound >= 3) {
        buildVal += 10; player.inv[player.slot] = null; updateUI();
    }
}

function updateUI() {
    document.getElementById('q0').innerText = player.inv[0] || "";
    document.getElementById('q1').innerText = player.inv[1] || "";
    document.getElementById('plans-cnt').innerText = plansFound + "/3";
    document.getElementById('build-bar').style.width = buildVal + "%";
    document.querySelectorAll('.top-ui .slot').forEach((s, i) => s.classList.toggle('active', i === player.slot));
    cp.querySelectorAll('.slot').forEach((s, i) => s.innerText = player.chest[i] || "");
}

function drawMan(x, y, color, beard, anim, isPlayer) {
    ctx.save();
    ctx.translate(x + 20, y + 70);
    if(player.vx !== 0 && isPlayer) ctx.rotate(Math.sin(anim)*0.1);
    
    // Ноги
    ctx.fillStyle = isPlayer ? "#2980b9" : "#333"; // Джинсы или штаны
    ctx.fillRect(-10, -15, 8, 15); ctx.fillRect(2, -15, 8, 15);
    // Тело
    ctx.fillStyle = color;
    ctx.fillRect(-12, -45, 24, 30);
    // Голова
    ctx.fillStyle = "#ffdbac";
    ctx.beginPath(); ctx.arc(0, -55, 12, 0, 7); ctx.fill();
    if(beard) { ctx.fillStyle = "white"; ctx.beginPath(); ctx.moveTo(-8, -52); ctx.lineTo(8, -52); ctx.lineTo(0, -35); ctx.fill(); }
    ctx.restore();
}

function update() {
    if(!active) return;
    player.vy += 0.8; player.x += player.vx; player.y += player.vy;
    player.anim += 0.15;
    camX += (player.x - w/2 - camX) * 0.1;

    let ground = h - 70;
    if(player.y + player.h > ground) { player.y = ground - player.h; player.vy = 0; player.ground = true; }

    // Сбор чертежей
    worldPlans.forEach(p => {
        if(!p.f && Math.abs(player.x - p.x) < 50) { p.f = true; plansFound++; updateUI(); }
    });

    // Диалоги
    npcs.forEach(n => {
        if(!n.met && Math.abs(player.x - n.x) < 80) {
            n.met = true;
            document.getElementById('dialog').style.display = 'block';
            document.getElementById('d-name').innerText = n.name;
            document.getElementById('d-text').innerText = n.msg;
        }
    });

    const ab = document.getElementById('act-btn');
    let nearTree = Math.abs(player.x - treeX) < 100 && player.inv[player.slot] === '🪓';
    let nearArk = Math.abs(player.x - arkX) < 250 && player.inv[player.slot] === '🪵' && plansFound >= 3;
    ab.style.display = (nearTree || nearArk) ? 'flex' : 'none';
}

function draw() {
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0,0,w,h);

    ctx.save(); ctx.translate(-camX, 0);
    ctx.fillStyle = "#0f0f1a"; ctx.fillRect(camX, h-70, w, 70);

    // Чертежи в мире
    worldPlans.forEach(p => {
        if(!p.f) { ctx.font = "20px Arial"; ctx.fillText("📜", p.x, h-100 + Math.sin(Date.now()/200)*10); }
    });

    // Объекты
    ctx.fillStyle = "#3d2b1f"; ctx.fillRect(treeX, h-250, 20, 180);
    ctx.fillStyle = "#1e3d1e"; ctx.beginPath(); ctx.arc(treeX+10, h-250, 60, 0, 7); ctx.fill();

    // Ковчег
    ctx.fillStyle = "#5d4037"; ctx.fillRect(arkX, h-70-(buildVal*2), 400, buildVal*2);
    ctx.strokeStyle = plansFound >= 3 ? "#ffd700" : "#444"; ctx.strokeRect(arkX, h-270, 400, 200);

    npcs.forEach(n => drawMan(n.x, h-140, n.color, n.beard, 0, false));
    drawMan(player.x, player.y, "#e67e22", false, player.anim, true); // Игрок в оранжевой куртке

    ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
</script>
</body>
</html>
