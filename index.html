<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drone Simulator Pro Max</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #00ff41; }
        
        /* Сцена */
        #viewport { perspective: 800px; width: 100vw; height: 100vh; overflow: hidden; }
        #world { position: relative; transform-style: preserve-3d; transition: transform 0.05s linear; }

        /* Эффект помех при ударе */
        #glitch {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWU9zQp0SInK77/giphy.gif');
            opacity: 0; pointer-events: none; z-index: 1000; mix-blend-mode: screen;
        }

        /* Окружение */
        .ground {
            position: absolute; width: 6000px; height: 6000px;
            background: repeating-linear-gradient(0deg, #111 0, #111 49px, #222 50px),
                        repeating-linear-gradient(90deg, #111 0, #111 49px, #222 50px);
            transform: rotateX(90deg) translateZ(100px); transform-origin: center;
        }

        .tree {
            position: absolute; width: 30px; height: 150px; background: #3d2b1f;
            transform-style: preserve-3d;
        }
        .leaves {
            position: absolute; top: -80px; left: -35px; width: 100px; height: 100px;
            background: #1b4332; border-radius: 20%; box-shadow: 0 0 15px #2d6a4f;
        }

        /* Интерфейс */
        #hud { position: fixed; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        .btn-start { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px; background: #00ff41; color: #000; font-weight: bold; 
            cursor: pointer; z-index: 2000; border: none;
        }

        /* Стики */
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-around; pointer-events: none; }
        .stick { width: 140px; height: 140px; background: rgba(0,255,65,0.1); border: 2px solid #00ff41; border-radius: 50%; display: grid; grid-template-columns: repeat(3, 1fr); pointer-events: auto; }
        .btn { display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; user-select: none; touch-action: none; }
    </style>
</head>
<body>

    <button class="btn-start" id="startBtn">ЗАПУСТИТЬ ДВИГАТЕЛИ (CLICK)</button>
    <div id="glitch"></div>

    <div id="hud">
        THRUST: <span id="thrust">0</span>%<br>
        SAT_COUNT: <span id="sats">12</span><br>
        VOLT: 14.8V
    </div>

    <div id="viewport">
        <div id="world">
            <div class="ground"></div>
        </div>
    </div>

    <div class="controls">
        <div class="stick">
            <div class="btn" style="grid-column:2" onpointerdown="ip.up=1" onpointerup="ip.up=0">↑</div>
            <div class="btn" style="grid-row:2;grid-column:1" onpointerdown="ip.yL=1" onpointerup="ip.yL=0">↺</div>
            <div class="btn" style="grid-row:2;grid-column:3" onpointerdown="ip.yR=1" onpointerup="ip.yR=0">↻</div>
            <div class="btn" style="grid-row:3;grid-column:2" onpointerdown="ip.dn=1" onpointerup="ip.dn=0">↓</div>
        </div>
        <div class="stick">
            <div class="btn" style="grid-column:2" onpointerdown="ip.f=1" onpointerup="ip.f=0">W</div>
            <div class="btn" style="grid-row:2;grid-column:1" onpointerdown="ip.rL=1" onpointerup="ip.rL=0">A</div>
            <div class="btn" style="grid-row:2;grid-column:3" onpointerdown="ip.rR=1" onpointerup="ip.rR=0">D</div>
            <div class="btn" style="grid-row:3;grid-column:2" onpointerdown="ip.b=1" onpointerup="ip.b=0">S</div>
        </div>
    </div>

    <script>
        const world = document.getElementById('world');
        const glitch = document.getElementById('glitch');
        const startBtn = document.getElementById('startBtn');
        
        let audioCtx, oscillator, gainNode;
        const ip = { up:0, dn:0, yL:0, yR:0, f:0, b:0, rL:0, rR:0 };
        let pos = { x:0, y:-50, z:-400 }, vel = { x:0, y:0, z:0 }, rot = { p:0, r:0, y:0 };
        const trees = [];

        // Инициализация звука
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(100, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        // Создание леса
        function createForest() {
            for(let i=0; i<60; i++) {
                let x = Math.random()*5000 - 2500, z = Math.random()*5000 - 2500;
                let tree = document.createElement('div');
                tree.className = 'tree';
                tree.style.transform = `translate3d(${x}px, 0px, ${z}px)`;
                tree.innerHTML = '<div class="leaves"></div>';
                world.appendChild(tree);
                trees.push({x, z});
            }
        }

        function checkCollision() {
            trees.forEach(t => {
                let dx = pos.x - t.x, dz = pos.z - t.z;
                if(Math.sqrt(dx*dx + dz*dz) < 40 && pos.y > -100) {
                    glitch.style.opacity = "0.5";
                    setTimeout(() => glitch.style.opacity = "0", 200);
                }
            });
        }

        function loop() {
            vel.y += 0.12; // Гравитация
            if(ip.up) { vel.y -= 0.35; if(oscillator) oscillator.frequency.setTargetAtTime(300, audioCtx.currentTime, 0.1); }
            else { if(oscillator) oscillator.frequency.setTargetAtTime(100, audioCtx.currentTime, 0.2); }
            
            if(ip.dn) vel.y += 0.3;
            if(ip.yL) rot.y -= 2;
            if(ip.yR) rot.y += 2;

            let rad = rot.y * Math.PI/180;
            if(ip.f) { rot.p = -20; vel.z += Math.cos(rad)*0.6; vel.x -= Math.sin(rad)*0.6; }
            else if(ip.b) { rot.p = 20; vel.z -= Math.cos(rad)*0.6; vel.x += Math.sin(rad)*0.6; }
            else rot.p *= 0.85;

            if(ip.rL) { rot.r = -20; vel.x -= Math.cos(rad)*0.6; vel.z -= Math.sin(rad)*0.6; }
            else if(ip.rR) { rot.r = 20; vel.x += Math.cos(rad)*0.6; vel.z += Math.sin(rad)*0.6; }
            else rot.r *= 0.85;

            vel.x *= 0.98; vel.y *= 0.98; vel.z *= 0.98;
            pos.x += vel.x; pos.y += vel.y; pos.z += vel.z;
            if(pos.y > 80) { pos.y = 80; vel.y = 0; }

            checkCollision();
            document.getElementById('thrust').innerText = ip.up ? "90" : "20";

            world.style.transform = `rotateX(${-15 - rot.p}deg) rotateZ(${-rot.r}deg) rotateY(${-rot.y}deg) translate3d(${-pos.x}px, ${-pos.y}px, ${-pos.z}px)`;
            requestAnimationFrame(loop);
        }

        startBtn.onclick = () => {
            initAudio();
            startBtn.style.display = "none";
            createForest();
            loop();
        };
    </script>
</body>
</html>
