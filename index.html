<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GAME SAM: NO SCROLL</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --tile: #334155; --font: 'Segoe UI', sans-serif; }
        .theme-space { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --tile: #334155; }
        .theme-cyberpunk { --bg: #0a0e17; --card: #141a29; --accent: #ff007f; --text: #fff; --tile: #1f293a; }
        .theme-matrix { --bg: #000; --card: #0d0d0d; --accent: #00ff41; --text: #00ff41; --tile: #1a1a1a; --font: 'Courier New', monospace; }

        * { box-sizing: border-box; -webkit-user-select: none; touch-action: none; }
        
        body { 
            font-family: var(--font); background: var(--bg); color: var(--text); 
            margin: 0; padding: 0; height: 100vh; width: 100vw; 
            overflow: hidden; display: flex; flex-direction: column;
        }

        /* Настройки (скролл разрешен только тут) */
        .panel { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            width: 90%; max-width: 400px; margin: auto; overflow-y: auto; max-height: 95vh;
        }

        #game-ui { display: none; flex: 1; width: 100%; height: 100%; overflow: hidden; }

        /* ВЕРТИКАЛЬНЫЙ РЕЖИМ */
        @media (orientation: portrait) {
            #game-ui { flex-direction: column; }
            .scoreboard { display: flex; gap: 5px; padding: 10px; background: rgba(0,0,0,0.3); overflow-x: auto; flex-shrink: 0; }
            .grid-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 10px; }
            .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; }
            .tile { font-size: 18px; }
        }

        /* ГОРИЗОНТАЛЬНЫЙ РЕЖИМ — ВСЁ НА ОДНОМ ЭКРАНЕ */
        @media (orientation: landscape) {
            #game-ui { flex-direction: row; }
            .scoreboard { 
                width: 120px; height: 100%; display: flex; flex-direction: column; 
                gap: 5px; padding: 10px; background: rgba(0,0,0,0.3); flex-shrink: 0;
            }
            .grid-container { 
                flex: 1; height: 100%; display: flex; align-items: center; 
                justify-content: center; padding: 5px; 
            }
            /* Умная сетка: карточки сжимаются, чтобы влезть */
            .grid { 
                display: grid; 
                grid-template-columns: repeat(11, 1fr); 
                grid-auto-rows: 1fr;
                gap: 4px; 
                width: 98%;
                height: 95%; /* Занимает почти всю высоту */
            }
            .tile { font-size: 14px; border-bottom-width: 2px; }
            .team-box { padding: 5px; }
            .score { font-size: 18px; }
        }

        .team-box { background: var(--card); border-radius: 10px; text-align: center; border: 2px solid transparent; flex: 1; }
        .team-box.active { border-color: var(--accent); background: rgba(56,189,248,0.1); }
        .score { font-weight: 900; color: var(--accent); }

        .tile { 
            aspect-ratio: 1/1; background: var(--tile); border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; border-bottom: 3px solid rgba(0,0,0,0.4);
            cursor: pointer;
        }
        .tile.used { opacity: 0.1; border: none; background: #000 !important; }

        /* Модалки подстраиваются под высоту */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 99; align-items: center; justify-content: center; padding: 10px; }
        .modal-content { 
            background: var(--card); width: 100%; max-width: 400px; border-radius: 20px; 
            padding: 15px; text-align: center; border: 2px solid var(--accent);
            max-height: 95vh; overflow-y: auto;
        }
        
        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: 900; width: 100%; cursor: pointer; }
        .btn-check { background: var(--accent); color: #000; margin-top: 10px; }
        .ctrl-row { display: flex; gap: 8px; margin-top: 10px; }
    </style>
</head>
<body class="theme-space" id="main-body">

<div class="panel" id="setup">
    <h2 style="text-align:center; color:var(--accent); margin:0 0 15px 0;">GAME SAM</h2>
    <button class="btn" style="background:var(--accent); color:#000; margin-bottom:15px" onclick="toggleFS()">ПОЛНЫЙ ЭКРАН</button>
    
    <label style="font-size:10px">ТЕМА</label>
    <select onchange="document.getElementById('main-body').className = this.value" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px;">
        <option value="theme-space">Космос</option>
        <option value="theme-cyberpunk">Киберпанк</option>
        <option value="theme-matrix">Матрица</option>
    </select>

    <label style="font-size:10px">КОМАНДЫ</label>
    <input type="text" id="v-teams" value="Сэм, Друзья" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px;">
    
    <button class="btn btn-check" onclick="startGame()">ИГРАТЬ</button>
</div>

<div id="game-ui">
    <div class="scoreboard" id="score-board"></div>
    <div class="grid-container">
        <div class="grid" id="game-grid"></div>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div id="m-icon" style="font-size:40px">❓</div>
        <p id="m-text" style="font-size:20px; font-weight: 800; margin:10px 0;"></p>
        <button id="m-rev-btn" class="btn btn-check" onclick="showAns()">ОТВЕТ</button>
        <div id="m-ans-box" style="display:none; padding:10px; background:rgba(0,0,0,0.3); border-radius:10px; border:1px solid var(--accent); margin-top:10px;">
            <b id="m-ans-text" style="color:var(--accent)"></b>
        </div>
        <div id="m-ctrl" class="ctrl-row" style="display:none">
            <button class="btn" style="background:#22c55e; color:#fff" onclick="endTurn(true)">ВЕРНО</button>
            <button class="btn" style="background:#ef4444; color:#fff" onclick="endTurn(false)">НЕТ</button>
        </div>
        <button id="m-ok-btn" class="btn btn-check" style="display:none" onclick="nextPlayer()">ОК</button>
    </div>
</div>

<script>
const chains = ["О борьбе между Христом и сатаной в теч 7000 лет", "Пророчество Еноха", "Пророчество о потопе", "Пророчество Ноя о его потомках", "430 лет", "Пророчество Иакова", "Пророчество Иова", "40 лет странствования по пустыне", "Пророчество Моисея о Христе как пророке", "70 лет Вавилонского плена", "Великий пророческий истукан", "Четыре больших зверя", "Овен и козёл", "2300 вечеров и утр (лет)", "70 седьмин", "1260 дней (лет)", "1290 дней (лет)", "1335 дней (лет)", "Великое пророчество Иисуса Христа", "Пророч. ап. Павла о вел. отступл. в христ-ве", "Семь церквей", "Семь печатей", "Удержание ветров и окончание запечатления", "Семь труб", "Время Филадельф. Адвент. в симв. Ангела обл. в обл.", "Особое время, не измеряемое тростью ВНЗ", "1260 лет Библия во вретище", "Церковь Божья всех веков", "Время папского Рима", "Двурогий зверь - лжепротестантизм", "Время формирован. и запечатл. 144 000 искупл.", "Время трёхангельской вести", "Две жатвы", "Песнь Моисея и Агнца перед язвами", "Закрытие благодати", "Излитие семи посл. чаш (язв) гнева Б. на землю", "Два зверя и их участие в последней вел. борьбе", "Весть Иного Ангела. Посл. предупрежд. миру", "Наказание Вавилона", "Радость неба о правосудии над Вавилоном", "4 посл. вест. имени Хр. и 4 стадии раб. Иного Анг.", "Великая вечеря птиц", "1000-летнее царство и суд", "Город Новый Иерусалим - Жена невеста Агнца"];
let state = { teams:[], scores:[], cur:0, deck:[], extra:false };

function toggleFS() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
}

function startGame() {
    state.teams = document.getElementById('v-teams').value.split(',').map(s => s.trim()).filter(s => s);
    state.scores = state.teams.map(() => 0);
    let deck = [];
    // 4 Бомбы и 1 Алмаз для интереса
    for(let i=0; i<4; i++) deck.push({type:'b', icon:'💣', d:'БОМБА! -20'});
    deck.push({type:'g', icon:'💎', d:'АЛМАЗ! +50'});
    
    for(let i=0; i<39; i++) {
        let n = (i % 44) + 1;
        deck.push({type:'q', q:`Цепь №${n}?`, a: chains[n-1]});
    }
    state.deck = deck.sort(() => Math.random() - 0.5);
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game-ui').style.display = 'flex';
    draw();
}

function draw() {
    const sb = document.getElementById('score-board');
    sb.innerHTML = state.teams.map((n, i) => `
        <div class="team-box ${i===state.cur?'active':''}">
            <div style="font-size:10px;">${n}</div>
            <div class="score">${state.scores[i]}</div>
        </div>`).join('');
    
    const grid = document.getElementById('game-grid');
    grid.innerHTML = state.deck.map((it, i) => `
        <div class="tile ${it.type==='used'?'used':''}" onclick="openTile(${i})">${it.type==='used'?'':i+1}</div>
    `).join('');
}

function openTile(i) {
    if(state.deck[i].type==='used') return;
    window.actIdx = i;
    const it = state.deck[i];
    const m = document.getElementById('modal');
    ['m-rev-btn','m-ans-box','m-ctrl','m-ok-btn'].forEach(id => document.getElementById(id).style.display = 'none');
    
    document.getElementById('m-icon').innerText = it.icon || '❓';
    document.getElementById('m-text').innerText = it.q || it.d;

    if(it.type==='q') {
        document.getElementById('m-rev-btn').style.display = 'block';
        document.getElementById('m-ans-text').innerText = it.a;
    } else {
        document.getElementById('m-ok-btn').style.display = 'block';
        if(it.type==='b') state.scores[state.cur] -= 20;
        if(it.type==='g') state.scores[state.cur] += 50;
    }
    m.style.display = 'flex';
}

function showAns() {
    document.getElementById('m-rev-btn').style.display = 'none';
    document.getElementById('m-ans-box').style.display = 'block';
    document.getElementById('m-ctrl').style.display = 'flex';
}

function endTurn(win) {
    if(win) state.scores[state.cur] += 15;
    nextPlayer();
}

function nextPlayer() {
    document.getElementById('modal').style.display = 'none';
    state.deck[window.actIdx].type = 'used';
    state.cur = (state.cur + 1) % state.teams.length;
    draw();
}
</script>
</body>
</html>
