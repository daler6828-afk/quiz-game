<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>История времен: Ной и Моисей</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        canvas { display: block; }

        /* HUD */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        #inv-panel { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 80%; height: 80px; background: rgba(50, 40, 30, 0.9); border: 3px solid #5d4037; border-radius: 15px 15px 0 0; display: flex; align-items: center; justify-content: center; gap: 10px; pointer-events: auto; }
        .slot { width: 50px; height: 50px; background: rgba(255,255,255,0.1); border: 2px dashed #8d6e63; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; }
        .filled { border: 2px solid #ffd700; cursor: pointer; }
        
        /* Кнопки */
        #action-btn { position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%); padding: 20px 40px; background: #e67e22; color: white; border: 3px solid #fff; border-radius: 10px; font-weight: bold; display: none; pointer-events: auto; }
        #jump-btn { position: absolute; bottom: 100px; right: 30px; width: 80px; height: 80px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; pointer-events: auto; }
        
        /* Экраны */
        .screen { position: absolute; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; color: white; text-align: center; z-index: 200; }
        .hidden { display: none !important; }
        #dialog { position: absolute; top: 20px; width: 80%; left: 10%; background: rgba(0,0,0,0.8); color: #fff; padding: 15px; border-radius: 10px; border: 1px solid #ffd700; text-align: center; display: none; }
    </style>
</head>
<body>

<div id="ui">
    <div id="menu" class="screen">
        <h1 style="color: #ffd700;">НАЗАД ВО ВРЕМЕНИ</h1>
        <button class="slot filled" style="width: 200px;" onclick="startWorld()">НАЧАТЬ ПУТЬ</button>
    </div>

    <div id="transition" class="screen hidden">
        <h2 id="trans-text">ГЛАВА 1 ЗАВЕРШЕНА</h2>
        <p>Переход к следующей истории...</p>
    </div>

    <div id="hud" class="hidden">
        <div id="dialog"></div>
        <div id="action-btn">РУБИТЬ ДЕРЕВО</div>
        <div id="inv-panel">
            <div class="slot" id="s0" onclick="selectItem(0)"></div>
            <div class="slot" id="s1" onclick="selectItem(1)"></div>
            <div class="slot" id="s2" onclick="selectItem(2)"></div>
        </div>
        <div id="jump-btn">ПРЫЖОК</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let w, h, frame = 0, currentChapter = 1;
let player = { x: 100, y: 0, vx: 0, vy: 0, w: 40, h: 65, ground: false, items: [], activeItem: null };
let cameraX = 0, waterLevel = 0, isFlooding = false;
let treeHealth = 5, treeX = 3200;

const noahItems = [
    {x: 800, y: 0, icon: '🪓', name: 'Топор', collected: false},
    {x: 1600, y: 0, icon: '🪄', name: 'Посох', collected: false},
    {x: 2400, y: 0, icon: '🥖', name: 'Еда', collected: false}
];

let platforms = [];

function startWorld() {
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    initNoah();
    loop();
}

function initNoah() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    player.y = h - 200;
    platforms = [
        {x: 0, y: h-70, w: 5000, h: 70, c: '#2e7d32'},
        {x: 500, y: h-180, w: 200, h: 20, c: '#3e2723'},
        {x: 1200, y: h-250, w: 200, h: 20, c: '#3e2723'},
        {x: 2000, y: h-300, w: 300, h: 20, c: '#3e2723'}
    ];
    noahItems.forEach((it, i) => it.y = h - 120);
}

function initMoses() {
    currentChapter = 2;
    player.x = 100;
    player.items = [];
    player.activeItem = null;
    cameraX = 0;
    for(let i=0; i<3; i++) {
        let s = document.getElementById('s'+i);
        s.innerText = ''; s.classList.remove('filled');
    }
    platforms = [
        {x: 0, y: h-70, w: 5000, h: 70, c: '#edc9af'}, // Песок
        {x: 600, y: h-150, w: 200, h: 30, c: '#c2b280'}
    ];
    showDialog("Моисей: 'Мы должны вывести народ из Египта! Помоги мне найти путь через пустыню.'");
}

// Управление
let touchX = null;
window.addEventListener('touchstart', e => {
    let t = e.touches[0];
    if(t.clientX > w/2) { if(player.ground) player.vy = -18; }
    else { touchX = t.clientX; }
});
window.addEventListener('touchmove', e => {
    if(touchX !== null) {
        let dx = e.touches[0].clientX - touchX;
        player.vx = Math.sign(dx) * 7;
    }
});
window.addEventListener('touchend', () => { touchX = null; player.vx = 0; });

function selectItem(idx) {
    if(player.items[idx]) {
        player.activeItem = player.items[idx];
        showDialog("В руке: " + (player.activeItem === '🪓' ? "Топор" : "Предмет"));
    }
}

document.getElementById('action-btn').onclick = () => {
    if(treeHealth > 0) {
        treeHealth--;
        if(treeHealth <= 0) {
            showDialog("Дерево срублено! Ковчег готов. Заходи внутрь!");
            document.getElementById('action-btn').style.display = 'none';
        }
    }
};

function showDialog(t) {
    const d = document.getElementById('dialog');
    d.innerText = t; d.style.display = 'block';
    setTimeout(() => d.style.display = 'none', 4000);
}

function update() {
    frame++;
    player.vy += 0.8;
    player.x += player.vx;
    player.y += player.vy;
    cameraX += (player.x - w/2 - cameraX) * 0.1;

    player.ground = false;
    platforms.forEach(p => {
        if(player.x+20 > p.x && player.x < p.x+p.w && player.y+player.h > p.y && player.y+player.h < p.y+20 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.ground = true;
        }
    });

    // Сбор предметов (Ной)
    if(currentChapter === 1) {
        noahItems.forEach(it => {
            if(!it.collected && Math.abs(player.x - it.x) < 40) {
                it.collected = true;
                player.items.push(it.icon);
                let s = document.getElementById('s' + (player.items.length-1));
                s.innerText = it.icon; s.classList.add('filled');
            }
        });

        // Логика рубки
        if(Math.abs(player.x - treeX) < 100 && player.activeItem === '🪓' && treeHealth > 0) {
            document.getElementById('action-btn').style.display = 'block';
        } else {
            document.getElementById('action-btn').style.display = 'none';
        }

        // Заход в Ковчег
        if(player.x > 3600 && treeHealth <= 0 && !isFlooding) {
            isFlooding = true;
            showDialog("Потоп начался! Спасаемся!");
        }
    }

    if(isFlooding) {
        waterLevel += 4;
        if(waterLevel > h) {
            isFlooding = false;
            nextStory();
        }
    }
}

function nextStory() {
    active = false;
    document.getElementById('transition').classList.remove('hidden');
    setTimeout(() => {
        document.getElementById('transition').classList.add('hidden');
        initMoses();
        waterLevel = 0;
        active = true;
    }, 4000);
}

function draw() {
    ctx.clearRect(0,0,w,h);
    
    // Фон
    ctx.fillStyle = currentChapter === 1 ? '#0a1a2a' : '#ffd394';
    ctx.fillRect(0,0,w,h);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Платформы
    platforms.forEach(p => {
        ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, p.w, p.h);
    });

    if(currentChapter === 1) {
        // Дерево
        if(treeHealth > 0) {
            ctx.fillStyle = '#5d4037'; ctx.fillRect(treeX, h-270, 20, 200);
            ctx.fillStyle = '#2e7d32'; ctx.beginPath(); ctx.arc(treeX+10, h-280, 50, 0, 7); ctx.fill();
        }
        // Ковчег
        ctx.fillStyle = '#3e2723'; ctx.fillRect(3600, h-270, 400, 200);
        
        noahItems.forEach(it => {
            if(!it.collected) { ctx.font = "30px Arial"; ctx.fillText(it.icon, it.x, it.y); }
        });
    }

    drawCharacter(player.x + 20, player.y);
    ctx.restore();

    // Вода
    if(isFlooding) {
        ctx.fillStyle = "rgba(0, 100, 255, 0.8)";
        ctx.fillRect(0, h - waterLevel, w, waterLevel);
    }
}

function drawCharacter(x, y) {
    ctx.lineWidth = 3;
    // Мантия
    ctx.fillStyle = currentChapter === 1 ? "#5d4037" : "#fff"; // У Моисея белая мантия
    ctx.beginPath(); ctx.moveTo(x-15, y+65); ctx.lineTo(x+15, y+65); ctx.lineTo(x, y+20); ctx.fill();
    // Голова и борода
    ctx.strokeStyle = "white"; ctx.beginPath(); ctx.arc(x, y+15, 10, 0, 7); ctx.stroke();
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.moveTo(x-6, y+18); ctx.lineTo(x+6, y+18); ctx.lineTo(x, y+35); ctx.fill();
    
    // Руки
    ctx.strokeStyle = "#e0ac69";
    ctx.beginPath(); ctx.moveTo(x, y+25); ctx.lineTo(x-18, y+45); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, y+25); ctx.lineTo(x+18, y+45); ctx.stroke();

    if(player.activeItem) {
        ctx.font = "20px Arial";
        ctx.fillText(player.activeItem, x + 15, y + 35);
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });
</script>
</body>
</html>
