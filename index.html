<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BOMBUZA: PRO EDITION</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --tile: #334155; --font: 'Segoe UI', sans-serif; }
        .theme-space { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --tile: #334155; }
        .theme-cyberpunk { --bg: #0a0e17; --card: #141a29; --accent: #ff007f; --text: #fff; --tile: #1f293a; }
        .theme-matrix { --bg: #000; --card: #0d0d0d; --accent: #00ff41; --text: #00ff41; --tile: #1a1a1a; --font: 'Courier New', monospace; }
        .theme-glacier { --bg: #e0f2fe; --card: #ffffff; --accent: #0284c7; --text: #0c4a6e; --tile: #bae6fd; }
        .theme-vintage { --bg: #fdf6e3; --card: #eee8d5; --accent: #b58900; --text: #657b83; --tile: #dacfc0; }
        .theme-emerald { --bg: #064e3b; --card: #065f46; --accent: #34d399; --text: #ecfdf5; --tile: #064e3b; }

        body { font-family: var(--font); background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.5s; overflow-x: hidden; }
        .panel { background: var(--card); padding: 30px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); max-width: 900px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.1); }
        .setup-section { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; }
        .group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; }
        input, select { padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: inherit; font-size: 15px; outline: none; }
        input:focus { border-color: var(--accent); }

        .scoreboard { display: flex; gap: 15px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
        .team-box { min-width: 140px; background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 4px solid transparent; transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .team-box.active { border-color: var(--accent); transform: scale(1.05); }
        .score { font-size: 36px; font-weight: 900; color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; }
        .tile { aspect-ratio: 1/1; background: var(--tile); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.2s; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .tile:hover { background: var(--accent); color: #000; transform: translateY(-3px); }
        .tile.used { pointer-events: none; opacity: 0.1; background: #000 !important; }
        .tile.used::after { content: "❌"; position: absolute; font-size: 40px; color: #ef4444; inset: 0; display: flex; align-items: center; justify-content: center; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card); width: 90%; max-width: 550px; padding: 40px; border-radius: 35px; text-align: center; border: 3px solid var(--accent); }
        .btn { padding: 14px 28px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; margin: 8px; transition: 0.2s; }
        .btn-check { background: var(--accent); color: #000; width: 100%; margin-top: 15px; }
        .btn-win { background: #22c55e; color: white; }
        .btn-lose { background: #ef4444; color: white; }
        
        .title-main { text-align:center; margin-top:0; color:var(--accent); font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body class="theme-space" id="main-body">

<div class="panel" id="setup">
    <h1 class="title-main">BOMBUZA PRO</h1>
    
    <div class="setup-section">
        <label>🎨 СТИЛЬ ИНТЕРФЕЙСА</label>
        <select onchange="document.getElementById('main-body').className = this.value" style="width:100%; margin-top:10px">
            <option value="theme-space">🌌 Глубокий космос</option>
            <option value="theme-cyberpunk">💖 Неоновый Киберпанк</option>
            <option value="theme-matrix">📟 Код Матрицы</option>
            <option value="theme-glacier">❄️ Ледяной Ледник</option>
            <option value="theme-vintage">📜 Старинный Винтаж</option>
            <option value="theme-emerald">🌲 Изумрудная Тайга</option>
        </select>
    </div>

    <div class="setup-section">
        <label>⚙️ ГЛАВНЫЕ НАСТРОЙКИ</label>
        <div class="setup-grid" style="margin-top:10px">
            <div class="group"><label>Всего карт</label><input type="number" id="v-total" value="44"></div>
            <div class="group"><label>За ответ</label><input type="number" id="v-win" value="15"></div>
            <div class="group"><label>Штраф бомбы</label><input type="number" id="v-bomb" value="20"></div>
        </div>
        <div class="group" style="margin-top:15px">
            <label>Команды (через запятую)</label>
            <input type="text" id="v-teams" value="Команда 1, Команда 2">
        </div>
    </div>

    <div class="setup-section">
        <label>🎁 НАСТРОЙКА БОНУСОВ (КОЛИЧЕСТВО)</label>
        <div class="setup-grid" style="margin-top:10px">
            <div class="group"><label>💣 Бомбы</label><input type="number" id="c-b" value="4"></div>
            <div class="group"><label>💎 Алмазы</label><input type="number" id="c-g" value="2"></div>
            <div class="group"><label>🚀 Ракеты</label><input type="number" id="c-r" value="1"></div>
            <div class="group"><label>🛡️ Щиты</label><input type="number" id="c-s" value="2"></div>
        </div>
        <p style="font-size: 11px; color: gray; margin-top: 10px;">* Остальные карточки станут вопросами по цепям.</p>
    </div>

    <button class="btn btn-check" onclick="initGame()">ЗАПУСТИТЬ ИГРУ</button>
</div>

<div id="game-ui" style="display:none">
    <div class="scoreboard" id="score-board"></div>
    <div class="grid" id="game-grid"></div>
    <center><button class="btn" style="background: rgba(255,255,255,0.1); color: gray; margin-top: 40px;" onclick="location.reload()">НАЗАД В МЕНЮ</button></center>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div id="m-icon" style="font-size:80px">❓</div>
        <h2 id="m-title" style="color:var(--accent)"></h2>
        <p id="m-text" style="font-size:28px; margin:20px 0; font-weight: 800;"></p>
        
        <button id="m-rev-btn" class="btn btn-check" onclick="revealAnswer()">ПОКАЗАТЬ ОТВЕТ</button>
        
        <div id="m-ans-box" style="display:none; background:rgba(0,0,0,0.3); padding:20px; border-radius:15px; margin-bottom:15px; border: 1px solid var(--accent);">
            <b id="m-ans-text" style="font-size:24px; color:var(--accent)"></b>
        </div>
        
        <div id="m-ctrl" style="display:none">
            <button class="btn btn-win" onclick="handleFinish(true)">ВЕРНО ✅</button>
            <button class="btn btn-lose" onclick="handleFinish(false)">ОШИБКА ❌</button>
        </div>
        
        <button id="m-ok-btn" class="btn btn-check" style="display:none" onclick="nextTurn()">ПОНЯТНО</button>
    </div>
</div>

<script>
const chainNames = [
    "О борьбе между Христом и сатаной в теч 7000 лет", "Пророчество Еноха", "Пророчество о потопе", "Пророчество Ноя о его потомках", "430 лет", "Пророчество Иакова", "Пророчество Иова", "40 лет странствования по пустыне", "Пророчество Моисея о Христе как пророке", "70 лет Вавилонского плена", "Великий пророческий истукан", "Четыре больших зверя", "Овен и козёл", "2300 вечеров и утр (лет)", "70 седьмин", "1260 дней (лет)", "1290 дней (лет)", "1335 дней (лет)", "Великое пророчество Иисуса Христа", "Пророч. ап. Павла о вел. отступл. в христ-ве", "Семь церквей", "Семь печатей", "Удержание ветров и окончание запечатления", "Семь труб", "Время Филадельф. Адвент. в симв. Ангела обл. в обл.", "Особое время, не измеряемое тростью ВНЗ", "1260 лет Библия во вретище", "Церковь Божья всех веков", "Время папского Рима", "Двурогий зверь - лжепротестантизм", "Время формирован. и запечатл. 144 000 искупл.", "Время трёхангельской вести", "Две жатвы", "Песнь Моисея и Агнца перед язвами", "Закрытие благодати", "Излитие семи посл. чаш (язв) гнева Б. на землю", "Два зверя и их участие в последней вел. борьбе", "Весть Иного Ангела. Посл. предупрежд. миру", "Наказание Вавилона", "Радость неба о правосудии над Вавилоном", "4 посл. вест. имени Хр. и 4 стадии раб. Иного Анг.", "Великая вечеря птиц", "1000-летнее царство и суд", "Город Новый Иерусалим - Жена невеста Агнца"
];

let gameState = { teams:[], scores:[], shields:[], cur:0, deck:[], winPoints:15, bombPoints:20, extraTurn:false };

function initGame() {
    const teamsInput = document.getElementById('v-teams').value;
    gameState.teams = teamsInput.split(',').map(n => n.trim()).filter(n => n !== "");
    if(gameState.teams.length === 0) gameState.teams = ["Команда 1", "Команда 2"];
    
    gameState.scores = gameState.teams.map(() => 0);
    gameState.shields = gameState.teams.map(() => false);
    gameState.winPoints = parseInt(document.getElementById('v-win').value) || 15;
    gameState.bombPoints = parseInt(document.getElementById('v-bomb').value) || 20;
    
    let totalCards = parseInt(document.getElementById('v-total').value) || 44;
    let deck = [];

    // Добавляем бонусы на основе ввода
    const addBonuses = (inputId, type, icon, title, desc) => {
        let count = parseInt(document.getElementById(inputId).value) || 0;
        for(let i=0; i<count; i++) {
            if(deck.length < totalCards) deck.push({ type, icon, t: title, d: desc });
        }
    };

    addBonuses('c-b', 'b', '💣', 'БОМБА!', `Вы теряете ${gameState.bombPoints} очков!`);
    addBonuses('c-g', 'g', '💎', 'АЛМАЗ!', 'Сокровище! +50 очков!');
    addBonuses('c-r', 'r', '🚀', 'РАКЕТА!', 'Турбо-ход! Ходите еще раз.');
    addBonuses('c-s', 's', '🛡️', 'ЩИТ!', 'Защита от следующей бомбы.');

    // Заполняем остаток вопросами
    let questionsLeft = totalCards - deck.length;
    for(let i=0; i < questionsLeft; i++) {
        let chainIndex = i % 44;
        let chainNum = chainIndex + 1;
        deck.push({
            type: 'q',
            title: `ЦЕПЬ №${chainNum}`,
            q: `Какая ${chainNum} цепь?`,
            a: chainNames[chainIndex]
        });
    }

    // Перемешиваем
    gameState.deck = deck.sort(() => Math.random() - 0.5);
    
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    renderBoard();
}

function renderBoard() {
    const sb = document.getElementById('score-board');
    sb.innerHTML = gameState.teams.map((name, i) => `
        <div class="team-box ${i === gameState.cur ? 'active' : ''}">
            <div style="font-size:12px; font-weight:bold;">${name} ${gameState.shields[i] ? '🛡️' : ''}</div>
            <div class="score">${gameState.scores[i]}</div>
        </div>
    `).join('');

    const grid = document.getElementById('game-grid');
    grid.innerHTML = gameState.deck.map((item, i) => `
        <div class="tile ${item.type === 'used' ? 'used' : ''}" onclick="openTile(${i})">${i+1}</div>
    `).join('');
}

function openTile(idx) {
    const item = gameState.deck[idx];
    if(item.type === 'used') return;
    
    window.currentTileIdx = idx;
    const m = document.getElementById('modal');
    
    // Сброс вида окна
    document.getElementById('m-rev-btn').style.display = 'none';
    document.getElementById('m-ans-box').style.display = 'none';
    document.getElementById('m-ctrl').style.display = 'none';
    document.getElementById('m-ok-btn').style.display = 'none';
    
    document.getElementById('m-icon').innerText = item.icon || '❓';
    document.getElementById('m-title').innerText = item.title || item.t;
    document.getElementById('m-text').innerText = item.q || item.d;

    if(item.type === 'q') {
        document.getElementById('m-rev-btn').style.display = 'block';
        document.getElementById('m-ans-text').innerText = item.a;
    } else {
        document.getElementById('m-ok-btn').style.display = 'block';
        applyBonus(item);
    }
    m.style.display = 'flex';
}

function applyBonus(item) {
    let p = gameState.cur;
    if(item.type === 'b') {
        if(gameState.shields[p]) {
            gameState.shields[p] = false;
        } else {
            gameState.scores[p] -= gameState.bombPoints;
        }
    }
    if(item.type === 'g') gameState.scores[p] += 50;
    if(item.type === 's') gameState.shields[p] = true;
    if(item.type === 'r') gameState.extraTurn = true;
}

function revealAnswer() {
    document.getElementById('m-rev-btn').style.display = 'none';
    document.getElementById('m-ans-box').style.display = 'block';
    document.getElementById('m-ctrl').style.display = 'flex';
}

function handleFinish(isCorrect) {
    if(isCorrect) gameState.scores[gameState.cur] += gameState.winPoints;
    nextTurn();
}

function nextTurn() {
    document.getElementById('modal').style.display = 'none';
    gameState.deck[window.currentTileIdx].type = 'used';
    
    if(!gameState.extraTurn) {
        gameState.cur = (gameState.cur + 1) % gameState.teams.length;
    }
    gameState.extraTurn = false;
    renderBoard();
}
</script>
</body>
</html>
