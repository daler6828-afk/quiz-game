<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>История Времен: Ной, Моисей и Иосиф</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        canvas { display: block; }

        /* ИНТЕРФЕЙС */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        #inv-btn { position: absolute; top: 20px; right: 20px; width: 60px; height: 60px; background: #8d6e63; border: 3px solid #ffd700; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 30px; pointer-events: auto; }
        
        #inv-panel { position: absolute; bottom: -150px; left: 50%; transform: translateX(-50%); width: 300px; height: 100px; background: rgba(62, 39, 35, 0.95); border: 4px solid #ffd700; border-radius: 20px 20px 0 0; display: flex; justify-content: space-around; align-items: center; transition: 0.4s; pointer-events: auto; }
        .inv-active { bottom: 0px !important; }
        .slot { width: 60px; height: 60px; background: rgba(0,0,0,0.3); border: 2px solid #8d6e63; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .slot.selected { border: 3px solid #ffd700; background: rgba(255,215,0,0.2); }

        #controls-right { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; pointer-events: auto; }
        .action-circle { width: 85px; height: 85px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #act-btn { background: rgba(230, 126, 34, 0.7); display: none; }

        #joy-zone { position: absolute; bottom: 30px; left: 30px; width: 150px; height: 150px; pointer-events: auto; }
        #joy-base { width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; left: 25px; top: 25px; }
        #joy-stick { width: 40px; height: 40px; background: #fff; border-radius: 50%; position: absolute; left: 30px; top: 30px; }

        .screen { position: absolute; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 200; pointer-events: auto; text-align: center; }
        .fade-text { animation: fadeIn 2s; padding: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="hud" class="hidden">
    <div id="inv-btn" onclick="toggleInv()">📒</div>
    <div id="inv-panel">
        <div class="slot" id="sl0" onclick="chooseItem(0)"></div>
        <div class="slot" id="sl1" onclick="chooseItem(1)"></div>
        <div class="slot" id="sl2" onclick="chooseItem(2)"></div>
    </div>
    <div id="joy-zone"><div id="joy-base"><div id="joy-stick"></div></div></div>
    <div id="controls-right">
        <div id="act-btn" class="action-circle">ДЕЙСТВИЕ</div>
        <div id="jump-btn" class="action-circle">ПРЫЖОК</div>
    </div>
</div>

<div id="intro-screen" class="screen">
    <div id="intro-content" class="fade-text">
        <h1 id="intro-title" style="color: #ffd700;">НАЗАД ВО ВРЕМЕНИ</h1>
        <p id="intro-desc">Загрузка истории...</p>
        <button id="start-btn" onclick="nextStep()" style="padding: 15px 40px; margin-top: 20px; border-radius: 10px; cursor: pointer; display: none;">ПРОДОЛЖИТЬ</button>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let w, h, active = false, chapter = 1, introStep = 0;
let player = { x: 100, y: 0, vx: 0, vy: 0, w: 40, h: 65, ground: false, items: [], activeIdx: -1 };
let camX = 0, floodY = 0, isTransition = false;
let treeHealth = 5, mosesGoal = 4000, josephGrain = 0;

const items = [
    {x: 800, i: '🪓', name: 'Топор', ch: 1}, {x: 1800, i: '🪄', name: 'Посох', ch: 1},
    {x: 1200, i: '🦯', name: 'Посох', ch: 2}, {x: 2500, i: '🍯', name: 'Манна', ch: 2},
    {x: 1000, i: '🌾', name: 'Зерно', ch: 3}, {x: 2000, i: '🌾', name: 'Зерно', ch: 3}, {x: 3000, i: '🌾', name: 'Зерно', ch: 3}
];

// Тексты вступления
const introLines = [
    {t: "НАЗАД ВО ВРЕМЕНИ", d: "Эпизод 1: Ковчег Ноя. Мир ждет великий потоп..."},
    {t: "ГЛАВА 2", d: "Моисей. Путь через пустыню к земле Ханаанской."},
    {t: "ГЛАВА 3", d: "Иосиф в Египте. Собери зерно, чтобы спасти народ от голода."}
];

function nextStep() {
    if(introStep === 0) { startGame(); }
    else { 
        document.getElementById('intro-screen').classList.add('hidden');
        active = true;
    }
}

function showChapterIntro(ch) {
    active = false;
    const scr = document.getElementById('intro-screen');
    const title = document.getElementById('intro-title');
    const desc = document.getElementById('intro-desc');
    const btn = document.getElementById('start-btn');
    
    scr.classList.remove('hidden');
    title.innerText = introLines[ch-1].t;
    desc.innerText = introLines[ch-1].d;
    btn.style.display = 'block';
    introStep = ch;
}

function startGame() {
    document.getElementById('intro-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    active = true;
    resize();
    floodY = h + 100;
    loop();
}

// УПРАВЛЕНИЕ
let moveTouchId = null;
window.addEventListener('touchstart', e => {
    for(let t of e.changedTouches) {
        if(t.clientX < w/2) moveTouchId = t.identifier;
        if(t.target.id === 'jump-btn' && player.ground) player.vy = -18;
        if(t.target.id === 'act-btn') handleAction();
    }
}, {passive: false});

window.addEventListener('touchmove', e => {
    for(let t of e.changedTouches) {
        if(t.identifier === moveTouchId) {
            let bx = 80, by = h - 80;
            let dx = t.clientX - bx, dy = t.clientY - by;
            let angle = Math.atan2(dy, dx);
            let dist = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
            document.getElementById('joy-stick').style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            player.vx = Math.cos(angle) * (dist/40) * 8;
        }
    }
});

window.addEventListener('touchend', e => {
    for(let t of e.changedTouches) {
        if(t.identifier === moveTouchId) {
            moveTouchId = null; player.vx = 0;
            document.getElementById('joy-stick').style.transform = `translate(0,0)`;
        }
    }
});

function handleAction() {
    if(chapter === 1 && treeHealth > 0) treeHealth--;
    if(chapter === 2 && player.x > mosesGoal - 200) { isTransition = true; } // Переход через море
}

function toggleInv() { document.getElementById('inv-panel').classList.toggle('inv-active'); }
function chooseItem(idx) {
    if(player.items[idx]) {
        player.activeIdx = idx;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
        document.getElementById('sl'+idx).classList.add('selected');
    }
}

function update() {
    if(!active) return;
    player.vy += 0.8;
    player.x += player.vx;
    player.y += player.vy;
    camX += (player.x - w/2 - camX) * 0.1;

    let ground = h - 70;
    if(player.y + player.h > ground) { player.y = ground - player.h; player.vy = 0; player.ground = true; }

    items.forEach(it => {
        if(it.ch === chapter && !it.collected && Math.abs(player.x - it.x) < 50) {
            it.collected = true; player.items.push(it.i);
            document.getElementById('sl' + (player.items.length-1)).innerText = it.i;
            if(chapter === 3) josephGrain++;
        }
    });

    // Кнопка действия
    const ab = document.getElementById('act-btn');
    if(chapter === 1 && Math.abs(player.x - 3200) < 100 && player.items[player.activeIdx] === '🪓' && treeHealth > 0) {
        ab.style.display = 'flex'; ab.innerText = "РУБИТЬ";
    } else if (chapter === 2 && player.x > mosesGoal - 300 && player.items.includes('🦯')) {
        ab.style.display = 'flex'; ab.innerText = "МОРЕ";
    } else { ab.style.display = 'none'; }

    // Переходы
    if(chapter === 1 && player.x > 3600 && treeHealth <= 0) isTransition = true;
    if(chapter === 3 && josephGrain >= 3 && player.x > 3500) { alert("Вы спасли Египет! Продолжение следует..."); location.reload(); }

    if(isTransition) {
        floodY -= 6;
        if(floodY < -200) { 
            isTransition = false; 
            chapter++; 
            resetForNextChapter();
            showChapterIntro(chapter);
        }
    } else if (floodY < h + 100) { floodY += 10; }
}

function resetForNextChapter() {
    player.x = 100; player.items = []; player.activeIdx = -1;
    document.querySelectorAll('.slot').forEach(s => s.innerText = "");
    camX = 0;
}

function draw() {
    ctx.clearRect(0,0,w,h);
    const bgs = ["#0a1a2a", "#edc9af", "#f4e1ad"];
    ctx.fillStyle = bgs[chapter-1]; ctx.fillRect(0,0,w,h);

    ctx.save();
    ctx.translate(-camX, 0);
    
    // Земля
    const grounds = ["#2e7d32", "#c2b280", "#e3c382"];
    ctx.fillStyle = grounds[chapter-1]; ctx.fillRect(0, h-70, 5000, 70);

    if(chapter === 1) {
        if(treeHealth > 0) { ctx.fillStyle = "#5d4037"; ctx.fillRect(3200, h-270, 20, 200); }
        ctx.fillStyle = "#3e2723"; ctx.fillRect(3600, h-270, 450, 200); // Ковчег
    } else if(chapter === 2) {
        ctx.fillStyle = "#0077be"; ctx.fillRect(mosesGoal, 0, 1000, h); // Море
        ctx.fillStyle = "white"; ctx.fillText("ХАНААН", mosesGoal + 200, h-100);
    } else if(chapter === 3) {
        ctx.fillStyle = "#d4af37"; ctx.fillRect(3500, h-370, 300, 300); // Пирамида
    }

    items.forEach(it => {
        if(it.ch === chapter && !it.collected) {
            ctx.font = "40px Arial"; ctx.fillText(it.i, it.x, h-120 + Math.sin(Date.now()/200)*10);
        }
    });

    drawHero(player.x+20, player.y);
    ctx.restore();

    ctx.fillStyle = "rgba(0, 80, 200, 0.8)";
    ctx.fillRect(0, floodY, w, h);
}

function drawHero(x, y) {
    const colors = ["#5d4037", "#f5f5f5", "#ffcc00"];
    ctx.fillStyle = colors[chapter-1];
    ctx.beginPath(); ctx.moveTo(x-15, y+65); ctx.lineTo(x+15, y+65); ctx.lineTo(x, y+20); ctx.fill();
    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x, y+15, 10, 0, 7); ctx.stroke();
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.moveTo(x-6, y+18); ctx.lineTo(x+6, y+18); ctx.lineTo(x, y+35); ctx.fill();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
showChapterIntro(1);
</script>
</body>
</html>
