<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINECRAFT ПОЛНОСТЬЮ РАБОЧИЙ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            overflow: hidden;
            touch-action: none;
            font-family: Arial, sans-serif;
            background: #000;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 10;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #555;
            pointer-events: none;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 3px solid white;
            background: transparent;
            z-index: 15;
            pointer-events: none;
            box-shadow: 0 0 0 2px black;
        }
        #hotbar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 15px;
            border: 3px solid #555;
            z-index: 20;
        }
        .hotbar-slot {
            width: 70px;
            height: 70px;
            background: #333;
            border: 3px solid #666;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            position: relative;
            color: white;
        }
        .hotbar-slot.active {
            border: 4px solid gold;
            transform: scale(1.1);
        }
        .slot-count {
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 black;
        }
        #controls {
            position: absolute;
            bottom: 150px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
            z-index: 100;
        }
        .joystick-area {
            pointer-events: auto;
            width: 150px;
            height: 150px;
            background: rgba(30, 30, 30, 0.7);
            border-radius: 75px;
            border: 4px solid white;
            backdrop-filter: blur(5px);
        }
        #action-buttons {
            position: absolute;
            bottom: 300px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }
        .action-btn {
            width: 100px;
            height: 100px;
            background: rgba(0,0,0,0.8);
            border: 4px solid white;
            border-radius: 50px;
            color: white;
            font-size: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .action-btn:active {
            transform: scale(0.9);
            background: rgba(100,100,100,0.8);
        }
        #fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border: 3px solid white;
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
            z-index: 200;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="info">❤️ 100 | БЛОКОВ: <span id="block-counter">20</span></div>
    <div id="crosshair"></div>
    
    <div id="hotbar"></div>

    <div id="controls">
        <div class="joystick-area" id="left-joystick"></div>
        <div class="joystick-area" id="right-joystick"></div>
    </div>

    <div id="action-buttons">
        <div class="action-btn" id="jump-btn">🦘</div>
        <div class="action-btn" id="break-btn">⛏️</div>
        <div class="action-btn" id="place-btn">🪨</div>
    </div>

    <button id="fullscreen-btn">⛶ ПОЛНЫЙ ЭКРАН</button>

    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>

    <script>
        // Запускаем после загрузки
        window.addEventListener('load', function() {
            console.log('Minecraft загружается...');
            
            // ========== НАСТРОЙКИ ==========
            const GRAVITY = 0.02;
            const JUMP_FORCE = 0.3;
            const SPEED = 0.15;
            const REACH = 5;
            
            // ========== СОЗДАЕМ СЦЕНУ ==========
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Голубое небо
            
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            // ========== ОСВЕЩЕНИЕ ==========
            // Основной свет
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            // Солнце
            const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
            sunLight.position.set(20, 30, 10);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 50;
            sunLight.shadow.camera.left = -20;
            sunLight.shadow.camera.right = 20;
            sunLight.shadow.camera.top = 20;
            sunLight.shadow.camera.bottom = -20;
            scene.add(sunLight);
            
            // Дополнительный свет снизу
            const fillLight = new THREE.PointLight(0x446688, 0.5);
            fillLight.position.set(0, 10, 10);
            scene.add(fillLight);
            
            // ========== БЛОКИ ==========
            const blocks = [];
            const blockTypes = {
                'grass': { color: 0x7CFC00, emoji: '🌿' },
                'dirt': { color: 0x8B5A2B, emoji: '🟫' },
                'stone': { color: 0x808080, emoji: '🪨' },
                'wood': { color: 0x8B4513, emoji: '🪵' },
                'leaf': { color: 0x2E8B57, emoji: '🍃' }
            };
            
            // Функция создания блока с черными гранями
            function createBlock(type, x, y, z) {
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshStandardMaterial({ 
                    color: blockTypes[type].color,
                    emissive: 0x000000
                });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(x, y, z);
                cube.castShadow = true;
                cube.receiveShadow = true;
                
                // Добавляем черные ребра как в Minecraft
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
                cube.add(line);
                
                cube.userData = { type: type };
                return cube;
            }
            
            // СОЗДАЕМ ТВЕРДЫЙ ПОЛ (НЕПРОЗРАЧНЫЙ)
            console.log('Создаем пол...');
            for (let x = -12; x <= 12; x++) {
                for (let z = -12; z <= 12; z++) {
                    // Основной слой - трава
                    const grass = createBlock('grass', x, 0, z);
                    scene.add(grass);
                    blocks.push(grass);
                    
                    // Слой земли под травой (для прочности)
                    const dirt = createBlock('dirt', x, -1, z);
                    scene.add(dirt);
                    blocks.push(dirt);
                    
                    // Слой камня под землей
                    const stone = createBlock('stone', x, -2, z);
                    scene.add(stone);
                    blocks.push(stone);
                }
            }
            
            // Добавляем деревья и холмы
            for (let i = 0; i < 15; i++) {
                const x = Math.floor(Math.random() * 20) - 10;
                const z = Math.floor(Math.random() * 20) - 10;
                
                // Ствол из дерева
                for (let h = 1; h <= 3; h++) {
                    const wood = createBlock('wood', x, h, z);
                    scene.add(wood);
                    blocks.push(wood);
                }
                
                // Листва
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dz = -1; dz <= 1; dz++) {
                        for (let dy = 3; dy <= 4; dy++) {
                            if (dx === 0 && dz === 0 && dy === 3) continue;
                            const leaf = createBlock('leaf', x + dx, dy, z + dz);
                            scene.add(leaf);
                            blocks.push(leaf);
                        }
                    }
                }
            }
            
            // Добавляем несколько каменных столбов
            for (let i = 0; i < 5; i++) {
                const x = Math.floor(Math.random() * 16) - 8;
                const z = Math.floor(Math.random() * 16) - 8;
                for (let h = 1; h <= 3; h++) {
                    const stone = createBlock('stone', x, h, z);
                    scene.add(stone);
                    blocks.push(stone);
                }
            }
            
            console.log('Всего блоков:', blocks.length);
            
            // ========== ПЕРЕМЕННЫЕ ИГРОКА ==========
            const player = {
                x: 0,
                y: 5,
                z: 0,
                velY: 0,
                onGround: false,
                selectedSlot: 0,
                hotbar: ['grass', 'dirt', 'stone', 'wood', 'leaf'],
                inventory: {
                    'grass': 64,
                    'dirt': 64,
                    'stone': 64,
                    'wood': 32,
                    'leaf': 32
                }
            };
            
            // Углы поворота
            let pitch = 0;
            let yaw = 0;
            
            // Направления от джойстиков
            let moveForward = 0;
            let moveSide = 0;
            let lookHorizontal = 0;
            let lookVertical = 0;
            
            // ========== ПРОВЕРКА СТОЛКНОВЕНИЙ ==========
            function checkCollision(x, y, z) {
                const width = 0.3;
                const height = 1.8;
                
                for (let block of blocks) {
                    const b = block.position;
                    
                    if (x + width > b.x - 0.5 && x - width < b.x + 0.5 &&
                        y + height > b.y - 0.5 && y < b.y + 0.5 &&
                        z + width > b.z - 0.5 && z - width < b.z + 0.5) {
                        return true;
                    }
                }
                return false;
            }
            
            // ========== ПОИСК БЛОКА ПОД ПРИЦЕЛОМ ==========
            function getTargetBlock() {
                const raycaster = new THREE.Raycaster();
                const direction = new THREE.Vector3(
                    Math.sin(yaw) * Math.cos(pitch),
                    Math.sin(pitch),
                    Math.cos(yaw) * Math.cos(pitch)
                );
                raycaster.set(camera.position, direction);
                
                const intersects = raycaster.intersectObjects(blocks);
                if (intersects.length > 0 && intersects[0].distance < REACH) {
                    return intersects[0].object;
                }
                return null;
            }
            
            // ========== ЛОМАЕМ БЛОК ==========
            function breakBlock() {
                const target = getTargetBlock();
                if (target) {
                    const type = target.userData.type;
                    player.inventory[type] += 1;
                    
                    scene.remove(target);
                    const index = blocks.indexOf(target);
                    if (index > -1) blocks.splice(index, 1);
                    
                    updateHotbar();
                    console.log('Блок сломан');
                }
            }
            
            // ========== СТАВИМ БЛОК ==========
            function placeBlock() {
                const target = getTargetBlock();
                if (!target) return;
                
                const type = player.hotbar[player.selectedSlot];
                if (player.inventory[type] <= 0) return;
                
                const direction = new THREE.Vector3(
                    Math.sin(yaw) * Math.cos(pitch),
                    Math.sin(pitch),
                    Math.cos(yaw) * Math.cos(pitch)
                );
                
                const pos = target.position.clone().add(direction.clone().multiplyScalar(1.1));
                pos.x = Math.round(pos.x);
                pos.y = Math.round(pos.y);
                pos.z = Math.round(pos.z);
                
                // Проверяем, свободно ли место
                let occupied = false;
                for (let b of blocks) {
                    if (Math.abs(b.position.x - pos.x) < 0.1 && 
                        Math.abs(b.position.y - pos.y) < 0.1 && 
                        Math.abs(b.position.z - pos.z) < 0.1) {
                        occupied = true;
                        break;
                    }
                }
                
                // Проверяем, не слишком близко к игроку
                const distToPlayer = Math.sqrt(
                    (pos.x - player.x) ** 2 +
                    (pos.y - player.y) ** 2 +
                    (pos.z - player.z) ** 2
                );
                
                if (!occupied && distToPlayer > 1.2) {
                    const newBlock = createBlock(type, pos.x, pos.y, pos.z);
                    scene.add(newBlock);
                    blocks.push(newBlock);
                    player.inventory[type] -= 1;
                    updateHotbar();
                    console.log('Блок поставлен');
                }
            }
            
            // ========== ПРЫЖОК ==========
            function jump() {
                if (player.onGround) {
                    player.velY = JUMP_FORCE;
                    player.onGround = false;
                    console.log('Прыжок');
                }
            }
            
            // ========== ОБНОВЛЕНИЕ ХОТБАРА ==========
            function updateHotbar() {
                const hotbarDiv = document.getElementById('hotbar');
                hotbarDiv.innerHTML = '';
                
                for (let i = 0; i < player.hotbar.length; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'hotbar-slot' + (i === player.selectedSlot ? ' active' : '');
                    
                    const type = player.hotbar[i];
                    slot.textContent = blockTypes[type].emoji;
                    
                    const count = document.createElement('span');
                    count.className = 'slot-count';
                    count.textContent = player.inventory[type];
                    
                    slot.appendChild(count);
                    hotbarDiv.appendChild(slot);
                }
                
                document.getElementById('block-counter').textContent = player.inventory[player.hotbar[player.selectedSlot]];
            }
            
            // ========== ОБНОВЛЕНИЕ ФИЗИКИ ==========
            function update() {
                // Поворот камеры
                yaw -= lookHorizontal * 0.02;
                pitch += lookVertical * 0.02;
                
                // Ограничиваем pitch, чтобы не смотреть сквозь себя
                if (pitch > 1.4) pitch = 1.4;
                if (pitch < -1.4) pitch = -1.4;
                
                camera.rotation.order = 'YXZ';
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;
                
                // Гравитация
                player.velY -= GRAVITY;
                
                // Движение
                let moveX = 0;
                let moveZ = 0;
                
                if (Math.abs(moveForward) > 0.1 || Math.abs(moveSide) > 0.1) {
                    const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
                    const right = new THREE.Vector3(Math.sin(yaw + Math.PI/2), 0, Math.cos(yaw + Math.PI/2));
                    
                    moveX = (forward.x * -moveForward + right.x * moveSide) * SPEED;
                    moveZ = (forward.z * -moveForward + right.z * moveSide) * SPEED;
                }
                
                // Пробуем двигаться по X
                let newX = player.x + moveX;
                if (!checkCollision(newX, player.y, player.z)) {
                    player.x = newX;
                }
                
                // Пробуем двигаться по Z
                let newZ = player.z + moveZ;
                if (!checkCollision(player.x, player.y, newZ)) {
                    player.z = newZ;
                }
                
                // Вертикальное движение
                let newY = player.y + player.velY;
                if (!checkCollision(player.x, newY, player.z)) {
                    player.y = newY;
                    player.onGround = false;
                } else {
                    player.velY = 0;
                    player.onGround = true;
                }
                
                // Не даем провалиться ниже земли
                if (player.y < 1.5) {
                    player.y = 1.5;
                    player.velY = 0;
                    player.onGround = true;
                }
                
                // Обновляем камеру
                camera.position.x = player.x;
                camera.position.y = player.y;
                camera.position.z = player.z;
            }
            
            // ========== АНИМАЦИЯ ==========
            function animate() {
                requestAnimationFrame(animate);
                update();
                renderer.render(scene, camera);
            }
            animate();
            
            // ========== НАСТРОЙКА ДЖОЙСТИКОВ ==========
            setTimeout(() => {
                if (typeof nipplejs !== 'undefined') {
                    console.log('Инициализация джойстиков...');
                    
                    // Левый джойстик (движение)
                    const leftJoystick = nipplejs.create({
                        zone: document.getElementById('left-joystick'),
                        mode: 'static',
                        position: { left: '50%', top: '50%' },
                        color: 'white',
                        size: 90,
                        restOpacity: 0.7
                    });
                    
                    leftJoystick.on('move', (evt, nipple) => {
                        moveSide = nipple.vector.x;
                        moveForward = nipple.vector.y;
                    }).on('end', () => {
                        moveSide = 0;
                        moveForward = 0;
                    });
                    
                    // Правый джойстик (поворот)
                    const rightJoystick = nipplejs.create({
                        zone: document.getElementById('right-joystick'),
                        mode: 'static',
                        position: { left: '50%', top: '50%' },
                        color: 'white',
                        size: 90,
                        restOpacity: 0.7
                    });
                    
                    rightJoystick.on('move', (evt, nipple) => {
                        lookHorizontal = nipple.vector.x;
                        lookVertical = nipple.vector.y;
                    }).on('end', () => {
                        lookHorizontal = 0;
                        lookVertical = 0;
                    });
                }
            }, 300);
            
            // ========== КНОПКИ ДЕЙСТВИЙ ==========
            document.getElementById('jump-btn').addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                jump();
            });
            
            document.getElementById('break-btn').addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                breakBlock();
            });
            
            document.getElementById('place-btn').addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                placeBlock();
            });
            
            // Переключение слотов цифрами
            window.addEventListener('keydown', (e) => {
                if (e.key >= '1' && e.key <= '5') {
                    player.selectedSlot = parseInt(e.key) - 1;
                    updateHotbar();
                }
                
                // Пробел для прыжка на компьютере
                if (e.key === ' ') {
                    e.preventDefault();
                    jump();
                }
            });
            
            // Полный экран
            document.getElementById('fullscreen-btn').addEventListener('click', () => {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            });
            
            // Запрещаем скролл и контекстное меню
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
            document.addEventListener('touchend', (e) => e.preventDefault());
            
            // Инициализация
            updateHotbar();
            console.log('Minecraft готов! Пол твердый, все работает!');
        });
    </script>
</body>
</html>
