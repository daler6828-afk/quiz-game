<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Назад во времени: Начало Потопа</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Arial', sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }
        
        /* Кнопки управления */
        .ctrl { position: absolute; bottom: 30px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; z-index: 100; pointer-events: auto; }
        #btn-left { left: 20px; }
        #btn-right { left: 120px; }
        #btn-jump { right: 20px; width: 100px; height: 100px; background: rgba(74, 144, 226, 0.4); }
        
        #dialog { position: absolute; top: 20px; width: 90%; left: 5%; background: rgba(0,0,0,0.8); color: #fff; padding: 15px; border-radius: 10px; border: 1px solid #4a90e2; text-align: center; font-size: 16px; pointer-events: none; z-index: 200; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="dialog"></div>
<canvas id="game"></canvas>

<div id="btn-left" class="ctrl">←</div>
<div id="btn-right" class="ctrl">→</div>
<div id="btn-jump" class="ctrl">ПРЫЖОК</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const dialog = document.getElementById('dialog');

let w, h, frame = 0;
let player = { x: 100, y: 0, vx: 0, vy: 0, w: 40, h: 60, ground: false, hasStaff: false };
let cameraX = 0;
let keys = { left: false, right: false };
let rain = [];

// Создаем мир
let platforms = [
    {x: 0, y: 0, w: 2000, h: 80, color: '#3e2723'}, // Земля
    {x: 400, y: 150, w: 200, h: 20},
    {x: 700, y: 280, w: 150, h: 20},
    {x: 1000, y: 200, w: 300, h: 20},
    {x: 1400, y: 350, w: 200, h: 20, isStaffPlatform: true}
];

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    player.y = h - 150;
    // Подгоняем платформы под высоту экрана
    platforms.forEach(p => p.realY = h - 80 - p.y);
    // Создаем дождь
    for(let i=0; i<100; i++) rain.push({x: Math.random()*w, y: Math.random()*h, s: Math.random()*10+5});
}

// --- УПРАВЛЕНИЕ (Самое важное!) ---
const setLeft = (v) => keys.left = v;
const setRight = (v) => keys.right = v;

document.getElementById('btn-left').ontouchstart = () => setLeft(true);
document.getElementById('btn-left').ontouchend = () => setLeft(false);
document.getElementById('btn-right').ontouchstart = () => setRight(true);
document.getElementById('btn-right').ontouchend = () => setRight(false);
document.getElementById('btn-jump').ontouchstart = (e) => { e.preventDefault(); jump(); };

function jump() {
    if(player.ground) {
        player.vy = -18;
        player.ground = false;
    }
}

function showText(txt) {
    dialog.innerText = txt;
    dialog.style.display = 'block';
    setTimeout(() => dialog.style.display = 'none', 4000);
}

function update() {
    frame++;
    
    // Движение
    if(keys.left) player.vx = -7;
    else if(keys.right) player.vx = 7;
    else player.vx = 0;

    player.vy += 0.8; // Гравитация
    player.x += player.vx;
    player.y += player.vy;

    // Камера
    cameraX += (player.x - w/2 - cameraX) * 0.1;

    // Коллизии
    player.ground = false;
    platforms.forEach(p => {
        if(player.x + player.w > p.x && player.x < p.x + p.w && 
           player.y + player.h > p.realY && player.y + player.h < p.realY + 20 && player.vy >= 0) {
            player.y = p.realY - player.h;
            player.vy = 0;
            player.ground = true;
        }
    });

    // Сюжет: Нашел посох
    if(!player.hasStaff && player.x > 1400 && player.y < h - 350) {
        player.hasStaff = true;
        showText("Вы нашли Посох Ноя! Начался Великий Потоп! Скорее назад!");
    }

    // Дождь
    rain.forEach(r => {
        r.y += r.s;
        if(r.y > h) r.y = -10;
    });
}

function draw() {
    // Атмосферный фон
    let sky = ctx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0, '#0a0a2a'); sky.addColorStop(1, '#1a1a1a');
    ctx.fillStyle = sky; ctx.fillRect(0,0,w,h);

    // Молния (редко)
    if(player.hasStaff && Math.random() > 0.98) {
        ctx.fillStyle = "rgba(255,255,255,0.3)";
        ctx.fillRect(0,0,w,h);
    }

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Дождь
    ctx.strokeStyle = "rgba(174,194,224,0.5)";
    ctx.lineWidth = 1;
    rain.forEach(r => {
        ctx.beginPath(); ctx.moveTo(r.x + cameraX, r.y); ctx.lineTo(r.x + cameraX, r.y+15); ctx.stroke();
    });

    // Платформы
    platforms.forEach(p => {
        ctx.fillStyle = p.isStaffPlatform ? '#ffd700' : '#444';
        ctx.fillRect(p.x, p.realY, p.w, 80);
        ctx.fillStyle = '#222'; ctx.fillRect(p.x, p.realY, p.w, 5); // Трава/Грязь
    });

    // Посох (если не собран)
    if(!player.hasStaff) {
        ctx.fillStyle = "gold";
        ctx.fillRect(1500, h-450, 8, 40);
    }

    // Игрок
    drawPlayer(player.x + 20, player.y);

    ctx.restore();
}

function drawPlayer(x, y) {
    ctx.strokeStyle = "white"; ctx.lineWidth = 3;
    // Голова
    ctx.beginPath(); ctx.arc(x, y+10, 10, 0, 7); ctx.stroke();
    // Тело
    ctx.beginPath(); ctx.moveTo(x, y+20); ctx.lineTo(x, y+45); ctx.stroke();
    // Ноги
    let leg = Math.sin(frame/5)*10;
    ctx.beginPath(); ctx.moveTo(x, y+45); ctx.lineTo(x-10+(keys.left||keys.right?leg:0), y+60); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, y+45); ctx.lineTo(x+10-(keys.left||keys.right?leg:0), y+60); ctx.stroke();
    
    if(player.hasStaff) {
        ctx.strokeStyle = "gold";
        ctx.beginPath(); ctx.moveTo(x+15, y+10); ctx.lineTo(x+15, y+50); ctx.stroke();
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

window.addEventListener('resize', init);
init();
showText("Глава 1: Ной ждет помощи. Найди его посох на востоке!");
loop();
</script>
</body>
</html>
