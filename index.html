<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>История Времен: Ной и Моисей</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* ИНТЕРФЕЙС */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .screen { position: absolute; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; color: white; text-align: center; }
        
        .menu-btn { padding: 20px 50px; font-size: 24px; color: #ffd700; border: 3px solid #ffd700; background: rgba(255,215,0,0.1); cursor: pointer; border-radius: 15px; text-transform: uppercase; font-weight: bold; }
        
        /* ИНВЕНТАРЬ (КАК НА ЛИСТОЧКЕ) */
        #inventory { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 320px; height: 80px; background: rgba(40, 30, 20, 0.9); border: 4px solid #5d4037; border-radius: 15px; display: flex; justify-content: space-around; align-items: center; pointer-events: auto; padding: 0 10px; }
        .slot { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 2px dashed #8d6e63; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .slot.active { border: 3px solid #ffd700; background: rgba(255,215,0,0.2); }

        /* КНОПКИ УПРАВЛЕНИЯ */
        #controls { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        #jump-btn { position: absolute; bottom: 100px; right: 30px; width: 90px; height: 90px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; pointer-events: auto; }
        #action-btn { position: absolute; bottom: 200px; left: 50%; transform: translateX(-50%); padding: 15px 30px; background: #e67e22; color: white; border-radius: 10px; border: 2px solid #fff; font-weight: bold; display: none; pointer-events: auto; }

        .hidden { display: none !important; }
        #msg { position: absolute; top: 20px; width: 100%; text-align: center; color: #ffd700; font-size: 18px; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="menu-screen" class="screen">
        <h1 style="font-size: 40px; margin-bottom: 30px; color: #ffd700;">НАЗАД ВО ВРЕМЕНИ</h1>
        <div class="menu-btn" onclick="startIntro()">НАЧАТЬ ПУТЬ</div>
    </div>

    <div id="intro-screen" class="screen hidden">
        <p id="intro-text" style="font-size: 20px; width: 80%; line-height: 1.6;"></p>
        <div class="menu-btn hidden" id="intro-next-btn" onclick="beginGame()">ВОЙТИ</div>
    </div>

    <div id="game-ui" class="hidden">
        <div id="msg"></div>
        <div id="action-btn">ДЕЙСТВИЕ</div>
        
        <div id="inventory">
            <div class="slot" id="slot0" onclick="selectItem(0)"></div>
            <div class="slot" id="slot1" onclick="selectItem(1)"></div>
            <div class="slot" id="slot2" onclick="selectItem(2)"></div>
            <div class="slot" id="slot3" onclick="selectItem(3)"></div>
        </div>

        <div id="controls">
            <div id="jump-btn">ПРЫЖОК</div>
        </div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = "MENU";
let chapter = 1;
let w, h, frame = 0;
let player = { x: 100, y: 0, vx: 0, vy: 0, w: 40, h: 65, ground: false, items: [], activeIdx: -1 };
let camX = 0;
let treeHP = 5;
let isFlooding = false, floodY = 0;

const itemsMap = [
    {x: 800, i: '🪓', name: 'Топор', collected: false, ch: 1},
    {x: 1500, i: '🪄', name: 'Посох', collected: false, ch: 1},
    {x: 2200, i: '🥖', name: 'Еда', collected: false, ch: 1},
    {x: 1000, i: '🦯', name: 'Посох Моисея', collected: false, ch: 2},
    {x: 2000, i: '🍯', name: 'Манна', collected: false, ch: 2}
];

function startIntro() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    document.getElementById('menu-screen').classList.add('hidden');
    document.getElementById('intro-screen').classList.remove('hidden');
    
    const lines = [
        "Мир изменился...",
        "Ною нужно построить Ковчег до начала Потопа.",
        "Найди топор и сруби великое дерево."
    ];
    let i = 0;
    const txtBox = document.getElementById('intro-text');
    txtBox.innerText = lines[0];
    
    const interval = setInterval(() => {
        i++;
        if(i < lines.length) txtBox.innerText = lines[i];
        else {
            clearInterval(interval);
            document.getElementById('intro-next-btn').classList.remove('hidden');
        }
    }, 2500);
}

function beginGame() {
    document.getElementById('intro-screen').classList.add('hidden');
    document.getElementById('game-ui').classList.remove('hidden');
    gameState = "PLAY";
    resize();
    render();
}

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    player.y = h - 200;
    floodY = h + 100;
}

// Управление
let keys = {};
let touchStartX = 0;

window.addEventListener('touchstart', e => {
    const t = e.touches[0];
    if(t.clientX > w/2) { if(player.ground) player.vy = -17; }
    else touchStartX = t.clientX;
});
window.addEventListener('touchmove', e => {
    if(touchStartX > 0) {
        let dx = e.touches[0].clientX - touchStartX;
        player.vx = Math.sign(dx) * 7;
    }
});
window.addEventListener('touchend', () => { player.vx = 0; touchStartX = 0; });

function selectItem(idx) {
    if(player.items[idx]) {
        player.activeIdx = idx;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById('slot'+idx).classList.add('active');
        showMsg("Выбрано: " + player.items[idx]);
    }
}

function showMsg(t) {
    const m = document.getElementById('msg');
    m.innerText = t;
    setTimeout(() => m.innerText = "", 3000);
}

function update() {
    if(gameState !== "PLAY") return;

    player.vy += 0.8;
    player.x += player.vx;
    player.y += player.vy;
    
    // Камера
    camX += (player.x - w/2 - camX) * 0.1;

    // Пол
    let groundY = h - 70;
    if(player.y + player.h > groundY) {
        player.y = groundY - player.h;
        player.vy = 0;
        player.ground = true;
    }

    // Сбор предметов
    itemsMap.forEach(it => {
        if(it.ch === chapter && !it.collected && Math.abs(player.x - it.x) < 50) {
            it.collected = true;
            player.items.push(it.i);
            const s = document.getElementById('slot' + (player.items.length-1));
            s.innerText = it.i;
            s.classList.add('filled');
            showMsg("Подобрано: " + it.name);
        }
    });

    const actBtn = document.getElementById('action-btn');
    // Глава 1: Рубка
    if(chapter === 1) {
        if(Math.abs(player.x - 3000) < 100 && player.items[player.activeIdx] === '🪓' && treeHP > 0) {
            actBtn.style.display = 'block';
            actBtn.innerText = "РУБИТЬ ДЕРЕВО (" + treeHP + ")";
            actBtn.onclick = () => { treeHP--; if(treeHP <= 0) showMsg("Дерево срублено! Иди в Ковчег!"); };
        } else { actBtn.style.display = 'none'; }

        if(player.x > 3400 && treeHP <= 0 && !isFlooding) {
            isFlooding = true;
            showMsg("ПОТОП! Глава 1 завершена!");
        }
    }

    if(isFlooding) {
        floodY -= 3;
        if(floodY < -100) {
            isFlooding = false;
            startChapter2();
        }
    }
}

function startChapter2() {
    chapter = 2;
    player.x = 100;
    player.items = [];
    player.activeIdx = -1;
    floodY = h + 100;
    for(let i=0; i<4; i++) {
        const s = document.getElementById('slot'+i);
        s.innerText = ""; s.classList.remove('filled', 'active');
    }
    showMsg("ГЛАВА 2: Моисей в пустыне");
}

function render() {
    update();
    ctx.clearRect(0,0,w,h);

    // Фон
    ctx.fillStyle = chapter === 1 ? "#0a1a2a" : "#edc9af";
    ctx.fillRect(0,0,w,h);

    ctx.save();
    ctx.translate(-camX, 0);

    // Земля
    ctx.fillStyle = chapter === 1 ? "#2e7d32" : "#c2b280";
    ctx.fillRect(0, h-70, 5000, 70);

    if(chapter === 1) {
        // Дерево
        if(treeHP > 0) {
            ctx.fillStyle = "#5d4037"; ctx.fillRect(3000, h-270, 20, 200);
            ctx.fillStyle = "#2e7d32"; ctx.beginPath(); ctx.arc(3010, h-280, 50, 0, 7); ctx.fill();
        }
        // Ковчег
        ctx.fillStyle = "#3e2723"; ctx.fillRect(3400, h-270, 400, 200);
        ctx.fillStyle = "white"; ctx.fillText("КОВЧЕГ", 3550, h-150);
    }

    // Предметы
    itemsMap.forEach(it => {
        if(it.ch === chapter && !it.collected) {
            ctx.font = "35px Arial";
            ctx.fillText(it.i, it.x, h - 120 + Math.sin(Date.now()/200)*10);
        }
    });

    // Ной / Моисей
    drawHero(player.x + 20, player.y);

    ctx.restore();

    // Вода
    if(isFlooding) {
        ctx.fillStyle = "rgba(0, 100, 255, 0.7)";
        ctx.fillRect(0, floodY, w, h);
    }

    requestAnimationFrame(render);
}

function drawHero(x, y) {
    ctx.lineWidth = 3;
    // Одежда
    ctx.fillStyle = chapter === 1 ? "#5d4037" : "#f5f5f5";
    ctx.beginPath(); ctx.moveTo(x-15, y+65); ctx.lineTo(x+15, y+65); ctx.lineTo(x, y+20); ctx.fill();
    // Голова
    ctx.strokeStyle = "white"; ctx.beginPath(); ctx.arc(x, y+15, 10, 0, 7); ctx.stroke();
    // Борода
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.moveTo(x-6, y+18); ctx.lineTo(x+6, y+18); ctx.lineTo(x, y+35); ctx.fill();
    // Руки
    ctx.strokeStyle = "#e0ac69";
    ctx.beginPath(); ctx.moveTo(x, y+25); ctx.lineTo(x-18, y+45); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, y+25); ctx.lineTo(x+18, y+45); ctx.stroke();
}

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
