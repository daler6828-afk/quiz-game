<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библейский герой ⚔️ RPG</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(45deg, #1a2f1a 0%, #2b4f2b 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .game-wrapper {
            max-width: 1000px;
            width: 100%;
            background: #d9c8a7;
            background-image: radial-gradient(circle at 30% 20%, #efdfbf 0%, #c8b184 90%);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.6), 0 0 0 6px #ac8b5a, 0 0 0 12px #6d4f2b;
            padding: 24px;
            border: 2px solid #ffdd99;
        }

        /* шапка с профилем */
        .header-castle {
            background: #9b855c;
            background: linear-gradient(135deg, #b79f72, #7d623c);
            border-radius: 100px 100px 40px 40px;
            padding: 16px 32px;
            margin-bottom: 24px;
            border: 4px solid #ebc280;
            box-shadow: inset 0 4px 10px #fbeac2, 0 10px 0 #4f3f24;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .hero-info {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .hero-avatar {
            background: #3f3a2b;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            border: 5px solid #f5d742;
            box-shadow: 0 0 0 3px #2c2518;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            background: #5e5a3c;
            transform: rotate(5deg);
        }

        .stats {
            background: #2e2b1c;
            padding: 12px 30px 12px 20px;
            border-radius: 50px;
            border: 3px solid #ebc000;
            box-shadow: inset 0 2px 8px #655635, 0 6px 0 #3f351b;
            color: #fef5cf;
            font-size: 1.3rem;
            font-weight: bold;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            background: #544d2e;
            padding: 5px 16px;
            border-radius: 30px;
            border: 2px solid #ffdb8a;
            color: #fff1b5;
            font-size: 1.5rem;
            min-width: 60px;
            text-align: center;
        }

        .level-badge {
            background: #c79d3e;
            border-radius: 30px;
            padding: 6px 24px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #222200;
            border: 4px solid #ffe294;
            box-shadow: 0 5px 0 #7a601f;
        }

        /* поле битвы/события */
        .arena {
            background: #5d7343;
            background-image: linear-gradient(145deg, #7d9960, #446133);
            border-radius: 80px 80px 40px 40px;
            padding: 30px 30px 20px;
            border: 6px solid #a98c5a;
            box-shadow: inset 0 0 30px #ced982, 0 16px 0 #4f5f2e;
            margin-bottom: 32px;
        }

        .event-image {
            font-size: 6rem;
            text-align: center;
            line-height: 1.2;
            filter: drop-shadow(8px 12px 0 #3f4d2b);
            margin-bottom: 10px;
        }

        .story-text {
            background: #fcf0d5;
            border: 6px solid #caac73;
            border-radius: 60px;
            padding: 24px 28px;
            font-size: 1.5rem;
            font-weight: 600;
            color: #251d0f;
            box-shadow: inset 0 4px 12px #ffeeaa, 0 10px 0 #6b4d27;
            margin-bottom: 28px;
            text-align: center;
            font-family: 'Palatino', serif;
        }

        .enemy-stats {
            display: flex;
            justify-content: space-between;
            background: #292415;
            border-radius: 40px;
            padding: 14px 24px;
            margin: 16px 0 24px;
            border: 4px solid #b39047;
            color: #ffe694;
            font-size: 1.4rem;
            font-weight: bold;
            align-items: center;
        }

        .enemy-health {
            background: #793434;
            padding: 8px 30px;
            border-radius: 30px;
            border: 3px solid #ffa76e;
            color: #ffdbaa;
        }

        /* кнопки действий */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            margin: 28px 0 20px;
        }

        .action-btn {
            background: #e5c891;
            border: 5px solid #a97c3e;
            color: #261c0b;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 20px 12px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 8px 0 #72582e, 0 10px 20px rgba(0,0,0,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #72582e, 0 6px 14px black;
        }

        .action-btn:disabled {
            opacity: 0.5;
            transform: translateY(5px);
            box-shadow: 0 3px 0 #4d3d21;
            pointer-events: none;
        }

        .action-btn.special {
            background: #bf9f50;
            border-color: #f3cd81;
            box-shadow: 0 8px 0 #7b621d, 0 10px 20px black;
            color: #231f0a;
        }

        .log-panel {
            background: #221e12;
            border-radius: 40px 40px 30px 30px;
            padding: 16px 22px;
            border: 4px solid #b3974b;
            color: #efdba0;
            font-size: 1.2rem;
            max-height: 100px;
            overflow-y: auto;
            margin-top: 20px;
            box-shadow: inset 0 0 20px #161402;
        }

        .restart-area {
            display: flex;
            justify-content: center;
            margin-top: 12px;
        }

        .restart-btn {
            background: #6f4343;
            border: 4px solid #b1886b;
            color: #ffeac2;
            font-size: 1.5rem;
            padding: 12px 40px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 7px 0 #3c2929;
            transition: 0.08s;
            letter-spacing: 2px;
        }

        .restart-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #3c2929;
        }

        @media (max-width: 600px) {
            .story-text { font-size: 1.2rem; }
            .action-btn { font-size: 1.2rem; padding: 14px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- шапка героя -->
    <div class="header-castle">
        <div class="hero-info">
            <div class="hero-avatar">⚔️</div>
            <div class="stats">
                <div class="stat-item">❤️ <span class="stat-value" id="hpDisplay">30</span></div>
                <div class="stat-item">🔋 <span class="stat-value" id="faithDisplay">10</span></div>
                <div class="stat-item">💰 <span class="stat-value" id="shekelsDisplay">5</span></div>
            </div>
        </div>
        <div class="level-badge" id="levelDisplay">Ур. 1</div>
    </div>

    <!-- арена событий -->
    <div class="arena">
        <div class="event-image" id="eventEmoji">📖</div>
        <div class="story-text" id="storyText">Добро пожаловать, странник! Избери путь...</div>

        <!-- блок противника (появляется в бою) -->
        <div id="enemyPanel" style="display: none;">
            <div class="enemy-stats">
                <span id="enemyName">👿 Велиал</span>
                <span class="enemy-health" id="enemyHpDisplay">❤️ 20</span>
            </div>
        </div>

        <!-- кнопки действий (генерируются динамически) -->
        <div id="actionButtons" class="actions-grid">
            <!-- будут вставлены js -->
        </div>

        <!-- журнал событий -->
        <div class="log-panel" id="logPanel">🕊️ Начни своё странствие...</div>
    </div>

    <!-- кнопка рестарта -->
    <div class="restart-area">
        <button class="restart-btn" id="restartBtn">🔄 Заново (Исповедь)</button>
    </div>
</div>

<script>
    (function() {
        // ---------- Библейская RPG ----------
        // Состояние игрока
        let player = {
            hp: 30,
            maxHp: 30,
            faith: 10,      // очки веры (мана)
            maxFaith: 10,
            shekels: 5,      // сикли (деньги)
            level: 1,
            exp: 0,
            nextExp: 10
        };

        // Текущее событие / враг
        let currentEnemy = null;
        let inBattle = false;
        let battleLog = [];

        // Ссылки на DOM
        const hpDisplay = document.getElementById('hpDisplay');
        const faithDisplay = document.getElementById('faithDisplay');
        const shekelsDisplay = document.getElementById('shekelsDisplay');
        const levelDisplay = document.getElementById('levelDisplay');
        const eventEmoji = document.getElementById('eventEmoji');
        const storyText = document.getElementById('storyText');
        const enemyPanel = document.getElementById('enemyPanel');
        const enemyNameSpan = document.getElementById('enemyName');
        const enemyHpDisplay = document.getElementById('enemyHpDisplay');
        const actionButtonsDiv = document.getElementById('actionButtons');
        const logPanel = document.getElementById('logPanel');
        const restartBtn = document.getElementById('restartBtn');

        // Вспомогательная функция для лога
        function addLog(message, emoji = '📜') {
            battleLog.unshift(`${emoji} ${message}`);
            if (battleLog.length > 5) battleLog.pop();
            logPanel.innerHTML = battleLog.join('<br>');
        }

        // Обновить интерфейс игрока
        function refreshPlayerUI() {
            hpDisplay.textContent = `${player.hp}/${player.maxHp}`;
            faithDisplay.textContent = `${player.faith}/${player.maxFaith}`;
            shekelsDisplay.textContent = player.shekels;
            levelDisplay.textContent = `Ур. ${player.level}`;
        }

        // Проверка смерти / уровня (простой уровень)
        function checkLevelUp() {
            if (player.exp >= player.nextExp) {
                player.level++;
                player.exp -= player.nextExp;
                player.nextExp = Math.floor(player.nextExp * 1.5);
                player.maxHp += 5;
                player.hp = player.maxHp;
                player.maxFaith += 3;
                player.faith = player.maxFaith;
                addLog(`🌟 Уровень повысился! Теперь ${player.level}`, '✨');
                refreshPlayerUI();
            }
        }

        // Проверка game over
        function checkGameOver() {
            if (player.hp <= 0) {
                player.hp = 0;
                refreshPlayerUI();
                storyText.textContent = "😇 Ты упокоился с миром... Начни исповедь заново.";
                actionButtonsDiv.innerHTML = ''; // убираем кнопки
                enemyPanel.style.display = 'none';
                eventEmoji.textContent = '⚰️';
                return true;
            }
            return false;
        }

        // ---------- Класс врага ----------
        class Enemy {
            constructor(name, hp, dmg, rewardExp, rewardShekels, emoji, bibleStory) {
                this.name = name;
                this.hp = hp;
                this.maxHp = hp;
                this.dmg = dmg;           // урон врага
                this.rewardExp = rewardExp;
                this.rewardShekels = rewardShekels;
                this.emoji = emoji;
                this.bibleStory = bibleStory; // описание
            }

            attack() {
                return Math.floor(Math.random() * this.dmg) + 1;
            }
        }

        // Библиотека врагов (библейские противники)
        const enemies = [
            new Enemy("Голиаф", 18, 5, 8, 6, "🗿", "Филистимский великан, вызывающий Израиль."),
            new Enemy("Фараон", 22, 6, 10, 10, "🐍", "Владыка Египта, не желающий отпускать народ."),
            new Enemy("Иерихонская стена", 30, 0, 12, 5, "🧱", "Стены, которые не падут без веры."),
            new Enemy("Змей-искуситель", 15, 4, 6, 3, "🐍", "Древний змей, шепчущий сомнения."),
            new Enemy("Ирод", 20, 7, 9, 8, "👑", "Царь, ищущий убить младенца."),
            new Enemy("Левиафан", 28, 8, 15, 12, "🐉", "Морское чудовище, сила хаоса."),
        ];

        // ---------- Библейские события (не боевые) ----------
        const events = [
            {
                emoji: "🕊️",
                title: "Голубь с маслиной",
                text: "Ной выпускает голубя, и тот приносит ветвь. Мир с Богом.",
                action: ()=> {
                    player.faith = Math.min(player.faith + 4, player.maxFaith);
                    player.hp = Math.min(player.hp + 6, player.maxHp);
                    addLog("Голубь принёс надежду: +6 жизни, +4 веры", "🕊️");
                }
            },
            {
                emoji: "💰",
                title: "Подать кесарю",
                text: "Ты нашёл древнюю монету. Отдать в храм или оставить?",
                choices: [
                    { text: "Отдать в храм (вера +2)", effect: ()=> { player.faith +=2; addLog("Вера возросла","⛪"); } },
                    { text: "Оставить себе (+5 шекелей)", effect: ()=> { player.shekels +=5; addLog("Кошелёк пополнился","💰"); } }
                ]
            },
            {
                emoji: "🏺",
                title: "Елей вдовы",
                text: "Вдова делится последним маслом. Поделиться едой?",
                choices: [
                    { text: "Помочь (-3 шекеля, +5 жизни)", effect: ()=> { player.shekels = Math.max(0, player.shekels-3); player.hp = Math.min(player.hp+5, player.maxHp); addLog("Помощь бедной вдове благословенна","⚱️"); } },
                    { text: "Поблагодарить и уйти (вера +1)", effect: ()=> { player.faith +=1; addLog("Смирение","🙏"); } }
                ]
            },
            {
                emoji: "⚡",
                title: "Пророк Илия",
                text: "Пророк призывает огонь с небес. Ты учишься вере.",
                action: ()=> {
                    player.faith = Math.min(player.faith + 5, player.maxFaith);
                    addLog("Пламя веры: +5 веры","🔥");
                }
            }
        ];

        // ---------- Случайное событие ----------
        function triggerRandomEvent() {
            if (Math.random() < 0.3 && !inBattle) { // 30% шанс события, если не в бою
                let ev = events[Math.floor(Math.random() * events.length)];
                eventEmoji.textContent = ev.emoji;
                storyText.textContent = ev.title + ". " + ev.text;

                // если есть варианты выбора
                if (ev.choices) {
                    renderChoiceButtons(ev.choices);
                } else if (ev.action) {
                    ev.action(); // просто действие без выбора
                    showMainMenuAfterDelay();
                }
                refreshPlayerUI();
                return true;
            }
            return false;
        }

        // Показать главное меню (идти в бой / отдых / купить)
        function showMainMenu() {
            if (checkGameOver()) return;
            // проверяем, не умер ли
            if (player.hp <= 0) return;

            eventEmoji.textContent = "⚔️📖";
            storyText.textContent = "Избери путь: битва с врагом, молитва (отдых) или торговля.";

            enemyPanel.style.display = 'none';
            inBattle = false;
            currentEnemy = null;

            actionButtonsDiv.innerHTML = `
                <button class="action-btn" id="fightBtn">⚔️ Битва (случайный враг)</button>
                <button class="action-btn" id="prayBtn">🕯️ Молитва (+2 веры, -1 шекель)</button>
                <button class="action-btn special" id="shopBtn">🛒 Купить зелье (6 шек.) +8 жизни</button>
                <button class="action-btn" id="restBtn">😴 Отдых (+4 жизни)</button>
            `;

            document.getElementById('fightBtn').addEventListener('click', startBattle);
            document.getElementById('prayBtn').addEventListener('click', prayAction);
            document.getElementById('shopBtn').addEventListener('click', shopHeal);
            document.getElementById('restBtn').addEventListener('click', restAction);
        }

        // Молитва
        function prayAction() {
            if (player.shekels >= 1) {
                player.shekels -= 1;
                player.faith = Math.min(player.faith + 2, player.maxFaith);
                addLog("Молитва укрепила веру (-1 шекель, +2 веры)", "🙏");
            } else {
                addLog("Не хватает шекелей на свечу...", "😞");
            }
            refreshPlayerUI();
            if (!checkGameOver()) showMainMenu();
        }

        // Отдых
        function restAction() {
            player.hp = Math.min(player.hp + 4, player.maxHp);
            addLog("Отдых у источника: +4 жизни", "💤");
            refreshPlayerUI();
            if (!checkGameOver()) showMainMenu();
        }

        // Магазин
        function shopHeal() {
            if (player.shekels >= 6) {
                player.shekels -= 6;
                player.hp = Math.min(player.hp + 8, player.maxHp);
                addLog("Купил целебный бальзам: +8 жизни", "🧪");
            } else {
                addLog("Недостаточно шекелей!", "😕");
            }
            refreshPlayerUI();
            if (!checkGameOver()) showMainMenu();
        }

        // Начать битву
        function startBattle() {
            if (checkGameOver()) return;
            currentEnemy = enemies[Math.floor(Math.random() * enemies.length)];
            // чуть рандомизируем здоровье
            currentEnemy.hp = currentEnemy.maxHp + Math.floor(Math.random() * 4) - 2;
            if (currentEnemy.hp < 5) currentEnemy.hp = 5;

            inBattle = true;
            enemyPanel.style.display = 'block';
            enemyNameSpan.textContent = `${currentEnemy.emoji} ${currentEnemy.name}`;
            updateEnemyUI();

            storyText.textContent = `⚔️ Сражение: ${currentEnemy.name}! ${currentEnemy.bibleStory}`;
            eventEmoji.textContent = currentEnemy.emoji;

            renderBattleButtons();
        }

        function updateEnemyUI() {
            enemyHpDisplay.textContent = `❤️ ${currentEnemy.hp}`;
        }

        // Кнопки боя
        function renderBattleButtons() {
            actionButtonsDiv.innerHTML = `
                <button class="action-btn" id="attackBtn">🗡️ Атаковать (вера 0)</button>
                <button class="action-btn special" id="blessBtn">✨ Благословение (вера -3, мощный удар)</button>
                <button class="action-btn" id="fleeBtn">🏃 Бежать (возможность)</button>
            `;

            document.getElementById('attackBtn').addEventListener('click', playerAttack);
            document.getElementById('blessBtn').addEventListener('click', blessAttack);
            document.getElementById('fleeBtn').addEventListener('click', fleeBattle);
        }

        // Обычная атака
        function playerAttack() {
            if (!currentEnemy || !inBattle) return;
            let dmg = Math.floor(Math.random() * 5) + 3; // 3-7 урона
            currentEnemy.hp -= dmg;
            addLog(`Вы нанесли ${dmg} урона врагу.`, "⚡");
            updateEnemyUI();

            if (currentEnemy.hp <= 0) {
                winBattle();
                return;
            }

            enemyTurn();
        }

        // Благословение (тратим веру)
        function blessAttack() {
            if (!currentEnemy || !inBattle) return;
            if (player.faith < 3) {
                addLog("Недостаточно веры!", "💔");
                return;
            }
            player.faith -= 3;
            let dmg = Math.floor(Math.random() * 8) + 8; // 8-16 урона
            currentEnemy.hp -= dmg;
            addLog(`✨ Небесный огонь! ${dmg} урона.`, "🔥");
            refreshPlayerUI();
            updateEnemyUI();

            if (currentEnemy.hp <= 0) {
                winBattle();
                return;
            }

            enemyTurn();
        }

        // Побег
        function fleeBattle() {
            if (Math.random() < 0.5) {
                addLog("Удалось сбежать!", "🍃");
                showMainMenu();
            } else {
                addLog("Не удалось бежать!", "😰");
                enemyTurn();
            }
        }

        // Ход врага
        function enemyTurn() {
            if (!currentEnemy || !inBattle) return;
            let enemyDmg = currentEnemy.attack();
            player.hp -= enemyDmg;
            addLog(`${currentEnemy.name} атакует на ${enemyDmg}`, "💢");
            refreshPlayerUI();

            if (player.hp <= 0) {
                player.hp = 0;
                refreshPlayerUI();
                checkGameOver();
                inBattle = false;
                enemyPanel.style.display = 'none';
                return;
            }

            // Если враг ещё жив - оставляем кнопки
            if (currentEnemy.hp > 0) {
                renderBattleButtons();  // обновить (на случай ушедших кнопок)
            } else {
                winBattle(); // если вдруг враг пал после контратаки (например, от яда? но у нас нет)
            }
        }

        // Победа
        function winBattle() {
            addLog(`Победа над ${currentEnemy.name}!`, "🏆");
            player.exp += currentEnemy.rewardExp;
            player.shekels += currentEnemy.rewardShekels;
            checkLevelUp();

            // шанс найти что-то
            if (Math.random() < 0.3) {
                player.faith = Math.min(player.faith + 1, player.maxFaith);
                addLog("Обрёл веру в бою", "✨");
            }

            refreshPlayerUI();
            inBattle = false;
            enemyPanel.style.display = 'none';
            if (!checkGameOver()) {
                // Случайное событие после боя?
                if (!triggerRandomEvent()) {
                    showMainMenu();
                }
            }
        }

        // Обработка выбора из событий
        function renderChoiceButtons(choices) {
            actionButtonsDiv.innerHTML = '';
            choices.forEach((ch, idx) => {
                let btn = document.createElement('button');
                btn.className = 'action-btn';
                btn.textContent = ch.text;
                btn.addEventListener('click', ()=>{
                    ch.effect();
                    refreshPlayerUI();
                    if (!checkGameOver()) showMainMenu();
                });
                actionButtonsDiv.appendChild(btn);
            });
        }

        // показать главное меню после действия без выбора
        function showMainMenuAfterDelay() {
            setTimeout(() => {
                if (!checkGameOver() && !inBattle) showMainMenu();
            }, 1500);
        }

        // инициализация/рестарт
        function restartGame() {
            player = {
                hp: 30,
                maxHp: 30,
                faith: 10,
                maxFaith: 10,
                shekels: 5,
                level: 1,
                exp: 0,
                nextExp: 10
            };
            inBattle = false;
            currentEnemy = null;
            battleLog = [];
            addLog("Новая исповедь...", "🌟");
            refreshPlayerUI();
            enemyPanel.style.display = 'none';
            showMainMenu();
        }

        // Запуск
        restartBtn.addEventListener('click', restartGame);
        restartGame();  // первая загрузка
    })();
</script>
</body>
</html>
