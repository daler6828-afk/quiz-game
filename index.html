<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Starship Engineer: Rescue</title>
    <style>
        :root { --neon: #00f2ff; --gold: #f1c40f; }
        body { margin: 0; padding: 0; overflow: hidden; background: #050510; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #hud { position: fixed; inset: 0; pointer-events: none; z-index: 1000; display: none; }
        #quest-box { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(0, 20, 40, 0.9); color: var(--neon); padding: 15px; border-radius: 10px; 
            border: 1px solid var(--neon); font-size: 14px; text-align: center; width: 85%; pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        #stats { position: absolute; top: 100px; left: 20px; color: white; font-size: 12px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }

        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 1px solid var(--neon); pointer-events: auto; }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: var(--neon); border-radius: 50%; box-shadow: 0 0 10px var(--neon); }

        #btns { position: absolute; bottom: 50px; right: 50px; display: flex; gap: 20px; pointer-events: auto; }
        .btn { width: 80px; height: 80px; background: rgba(0, 242, 255, 0.1); border: 2px solid var(--neon); border-radius: 50%; color: var(--neon); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        #act-btn { display: none; background: rgba(0, 242, 255, 0.3); box-shadow: 0 0 20px var(--neon); }

        #menu { position: fixed; inset: 0; background: #050510; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--neon); }
        .m-btn { width: 220px; padding: 20px; margin: 10px; background: transparent; border: 2px solid var(--neon); color: var(--neon); font-weight: bold; font-size: 16px; cursor: pointer; border-radius: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .m-btn:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="letter-spacing: 5px;">LOST IN SPACE</h1>
    <p>Крушение на планете X-24</p>
    <button class="m-btn" onclick="goFull(); start('new')">НАЧАТЬ МИССИЮ</button>
</div>

<div id="hud">
    <div id="quest-box">СИСТЕМА: Собери обломки корабля для крафта инструмента.</div>
    <div id="stats">
        ⚙️ Детали: <span id="s-parts">0</span>/3<br>
        💎 Кристаллы: <span id="s-crys">0</span>/5<br>
        🔧 Мультитул: <span id="s-tool">НЕТ</span>
    </div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="btns">
        <div id="act-btn" class="btn" onclick="handleAction()">ДЕЙСТВИЕ</div>
        <div class="btn" onclick="jump()">ПРЫЖОК</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');

let w, h, active = false, camX = 0;
let parts = 0, crystals = 0, hasTool = false, hasCode = false, маякReady = 0;
let player = { x: 400, y: 0, vx: 0, vy: 0, g: false };

let junk = [{x: 800}, {x: 1000}, {x: 1200}];
let crystalPoints = [{x: 2400}, {x: 2600}, {x: 2800}, {x: 3000}, {x: 3200}];
let маякX = 4500;

function goFull() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
}

function resize() {
    w = cvs.width = window.innerWidth;
    h = cvs.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function start() {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    active = true;
    requestAnimationFrame(loop);
}

// Джойстик
const jBase = document.getElementById('joy-base');
const jStick = document.getElementById('joy-stick');
let joyId = null;

jBase.addEventListener('touchstart', e => { joyId = e.changedTouches[0].identifier; }, {passive: false});
window.addEventListener('touchmove', e => {
    if (joyId === null) return;
    let t = Array.from(e.touches).find(i => i.identifier === joyId);
    if (!t) return;
    let r = jBase.getBoundingClientRect();
    let move = Math.max(-40, Math.min(40, t.clientX - (r.left + 50)));
    jStick.style.transform = `translateX(${move}px)`;
    player.vx = (move / 40) * 8;
}, {passive: false});
window.addEventListener('touchend', () => { jStick.style.transform = 'translateX(0)'; player.vx = 0; joyId = null; });

function jump() { if(player.g) { player.vy = -18; player.g = false; } }

function handleAction() {
    junk.forEach(j => { if(!j.f && Math.abs(player.x - j.x) < 80) { j.f=1; parts++; }});
    if(parts >= 3 && Math.abs(player.x - 300) < 150) hasTool = true;
    crystalPoints.forEach(c => { if(!c.f && Math.abs(player.x - c.x) < 80) { c.f=1; crystals++; }});
    if(crystals >= 5 && Math.abs(player.x - 2000) < 150) hasCode = true;
    if(hasCode && Math.abs(player.x - маякX) < 300) { маякReady = 100; }
    updateHUD();
}

function updateHUD() {
    document.getElementById('s-parts').innerText = parts;
    document.getElementById('s-crys').innerText = crystals;
    document.getElementById('s-tool').innerText = hasTool ? "ГОТОВ" : "НЕТ";
    
    let m = "Найди 3 части обшивки (справа у камней)";
    if(parts >= 3 && !hasTool) m = "Вернись к СТАНЦИИ КРАФТА (дом x:300)";
    else if(hasTool && crystals < 5) m = "Добудь 5 кристаллов в ПЕЩЕРЕ (x:2500)";
    else if(crystals >= 5 && !hasCode) m = "Иди к ДРОИДУ-ХРАНИТЕЛЮ (x:2000)";
    else if(hasCode) m = "АКТИВИРУЙ МАЯК СВЯЗИ (x:4500)!";
    document.getElementById('quest-box').innerText = "СИСТЕМА: " + m;
}

function loop() {
    if(!active) return;
    player.vy += 0.8; player.x += player.vx; player.y += player.vy;
    if(player.y > h - 140) { player.y = h - 140; player.vy = 0; player.g = true; }
    camX += (player.x - w/2 - camX) * 0.1;

    ctx.fillStyle = "#050510"; ctx.fillRect(0,0,w,h);
    
    // Звезды
    ctx.fillStyle = "white";
    for(let i=0; i<50; i++) {
        let sx = (i * 24321) % w; let sy = (i * 12345) % h;
        ctx.fillRect(sx, sy, 2, 2);
    }

    ctx.save();
    ctx.translate(-camX, 0);
    
    // Поверхность
    ctx.fillStyle = "#1a1a2e"; ctx.fillRect(camX, h-80, w, 80);
    
    // Станция крафта (Дом 1)
    ctx.fillStyle = "#2c3e50"; ctx.fillRect(250, h-200, 100, 120);
    ctx.strokeStyle = "#00f2ff"; ctx.strokeRect(250, h-200, 100, 120);
    
    // Дроид (Дом 2)
    ctx.fillStyle = "#34495e"; ctx.beginPath(); ctx.arc(2000, h-130, 40, 0, 7); ctx.fill();
    ctx.strokeStyle = "#f1c40f"; ctx.stroke();

    // Обломки (Серые)
    junk.forEach(j => { if(!j.f) { ctx.fillStyle="#7f8c8d"; ctx.fillRect(j.x, h-100, 30, 20); }});
    
    // Кристаллы (Синие светящиеся)
    crystalPoints.forEach(c => { if(!c.f) { 
        ctx.fillStyle="#00f2ff"; ctx.beginPath(); ctx.moveTo(c.x, h-120); ctx.lineTo(c.x+10, h-90); ctx.lineTo(c.x-10, h-90); ctx.fill(); 
        ctx.shadowBlur = 10; ctx.shadowColor = "#00f2ff";
    }});
    ctx.shadowBlur = 0;

    // Маяк Связи
    ctx.fillStyle = "#2c3e50"; ctx.fillRect(маякX, h-300, 60, 220);
    if(маякReady > 0) {
        ctx.strokeStyle = "#00f2ff"; ctx.beginPath(); ctx.moveTo(маякX+30, h-300); ctx.lineTo(маякX+30, 0); ctx.stroke();
    }

    // Игрок (Скафандр)
    ctx.fillStyle = "white"; ctx.fillRect(player.x, player.y, 40, 60);
    ctx.fillStyle = "#333"; ctx.fillRect(player.x+5, player.y+10, 30, 15); // Шлем

    ctx.restore();

    let near = (parts < 3 && junk.some(j=>!j.f && Math.abs(player.x-j.x)<100)) ||
               (parts >= 3 && !hasTool && Math.abs(player.x-300)<150) ||
               (crystals < 5 && crystalPoints.some(c=>!c.f && Math.abs(player.x-c.x)<100)) ||
               (crystals >= 5 && !hasCode && Math.abs(player.x-2000)<150) ||
               (hasCode && Math.abs(player.x-маякX)<300);
    document.getElementById('act-btn').style.display = near ? 'flex' : 'none';

    requestAnimationFrame(loop);
}
</script>
</body>
</html>
