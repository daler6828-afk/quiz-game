<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Назад во времени: Миссия Ноя</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020111; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .screen { position: absolute; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; z-index: 100; color: white; }
        .btn { padding: 15px 40px; font-size: 24px; color: #fff; border: 2px solid #ffd700; background: rgba(255, 215, 0, 0.1); cursor: pointer; border-radius: 10px; transition: 0.3s; }
        
        /* Стили HUD */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        #dialog-box { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(255,255,255,0.95); border: 4px solid #3e2723; border-radius: 15px; padding: 15px; color: #333; font-weight: bold; text-align: center; display: none; }
        
        #inv-icon { position: absolute; top: 20px; right: 20px; width: 60px; height: 60px; background: rgba(0,0,0,0.5); border: 2px solid #ffd700; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; opacity: 0.3; }
        .has-item { opacity: 1 !important; box-shadow: 0 0 15px #ffd700; }

        /* Контроллеры */
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; display: none; }
        #joy-stick { position: absolute; width: 40px; height: 40px; background: #fff; border-radius: 50%; left: 30px; top: 30px; }
        #jump-btn { position: absolute; bottom: 40px; right: 40px; width: 90px; height: 90px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    </style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui">
    <div id="menu" class="screen">
        <h1 style="color: #ffd700;">НАЗАД ВО ВРЕМЕНИ</h1>
        <p>Глава 1: Потоп и Потерянный Посох</p>
        <div class="btn" onclick="start()">ВСТУПИТЬ В ИСТОРИЮ</div>
    </div>

    <div id="hud" class="hidden">
        <div id="dialog-box"></div>
        <div id="inv-icon">🪄</div>
        <div id="jump-btn">ПРЫЖОК</div>
    </div>
    <div id="joy-base"><div id="joy-stick"></div></div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const dialog = document.getElementById('dialog-box');

let w, h, active = false;
let camera = { x: 0 };
let gameState = "START"; // START, SEARCHING, FOUND, FINISHED

let player = { x: 100, y: 0, vx: 0, vy: 0, w: 35, h: 55, ground: false, hasStaff: false, dir: 1, frame: 0 };
let npc = { x: 300, y: 0, name: "Ной" };
let staff = { x: 2500, y: 0, collected: false };
let portal = { x: 0, y: 0, visible: false };
let platforms = [];

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    platforms = [
        {x: -200, y: h-80, w: 1000, h: 80}, // Начало
        {x: 1000, y: h-80, w: 2500, h: 80}, // Продолжение за пропастью
        {x: 400, y: h-220, w: 200, h: 20},
        {x: 700, y: h-350, w: 200, h: 20},
        {x: 1100, y: h-250, w: 300, h: 20},
        {x: 1500, y: h-400, w: 200, h: 20},
        {x: 1900, y: h-300, w: 400, h: 20},
        {x: 2400, y: h-450, w: 200, h: 20} // Платформа с посохом
    ];
    npc.y = h - 135;
    staff.y = h - 490;
    portal.y = h - 180;
}

window.addEventListener('resize', init);
init();

// --- УПРАВЛЕНИЕ ---
let joy = { id: null, x: 0, dx: 0 };
window.addEventListener('touchstart', e => {
    for(let t of e.changedTouches) {
        if(t.clientX < w/2 && joy.id === null) {
            joy.id = t.identifier; joy.x = t.clientX;
            document.getElementById('joy-base').style.display = 'block';
            document.getElementById('joy-base').style.left = (t.clientX - 50) + 'px';
            document.getElementById('joy-base').style.top = (t.clientY - 50) + 'px';
        } else if(t.clientX >= w/2) { jump(); }
    }
}, {passive: false});

window.addEventListener('touchmove', e => {
    e.preventDefault();
    for(let t of e.changedTouches) {
        if(t.identifier === joy.id) {
            let move = t.clientX - joy.x;
            joy.dx = Math.max(-1, Math.min(1, move / 40));
            document.getElementById('joy-stick').style.transform = `translateX(${joy.dx * 25}px)`;
        }
    }
}, {passive: false});

window.addEventListener('touchend', e => {
    for(let t of e.changedTouches) { if(t.identifier === joy.id) { joy.id = null; joy.dx = 0; document.getElementById('joy-base').style.display = 'none'; } }
});

function jump() { if(player.ground) { player.vy = -18; player.ground = false; } }

function say(text) {
    dialog.innerText = text;
    dialog.style.display = 'block';
    setTimeout(() => { if(dialog.innerText === text) dialog.style.display = 'none'; }, 4000);
}

function start() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    document.getElementById('menu').style.display = 'none';
    document.getElementById('hud').classList.remove('hidden');
    active = true;
    player.y = h - 200;
    say("Я должен найти способ вернуться домой. Но кто это там впереди?");
    loop();
}

function update() {
    player.frame++;
    player.vx = joy.dx * 8;
    if(player.vx !== 0) player.dir = player.vx > 0 ? 1 : -1;
    player.vy += 0.8;
    player.x += player.vx;
    player.y += player.vy;

    camera.x += (player.x - w/2 - camera.x) * 0.1;

    player.ground = false;
    platforms.forEach(p => {
        if(player.x+20 > p.x && player.x < p.x+p.w && player.y+player.h > p.y && player.y+player.h < p.y+p.h+15 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.ground = true;
        }
    });

    // Сюжетные триггеры
    let distToNpc = Math.abs(player.x - npc.x);
    if(gameState === "START" && distToNpc < 100) {
        gameState = "SEARCHING";
        say("Ной: О путник! Помоги мне, великий шторм унес мой Золотой Посох на восток! Без него я не смогу вести животных.");
    }

    if(!staff.collected && Math.abs(player.x - staff.x) < 50 && Math.abs(player.y - staff.y) < 100) {
        staff.collected = true;
        player.hasStaff = true;
        gameState = "FOUND";
        document.getElementById('inv-icon').classList.add('has-item');
        say("Вы нашли Посох Ноя! Нужно отнести его обратно.");
    }

    if(gameState === "FOUND" && distToNpc < 80) {
        gameState = "FINISHED";
        portal.visible = true;
        say("Ной: Спасибо тебе! Ты спас нас. Теперь я открою для тебя временной портал!");
    }

    if(portal.visible && player.x < portal.x + 50) {
        active = false;
        alert("Глава 1 завершена! Вы вошли в портал...");
        location.reload();
    }
}

function draw() {
    ctx.clearRect(0,0,w,h);
    
    // Ночное небо
    let sky = ctx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0, '#020111'); sky.addColorStop(1, '#191970');
    ctx.fillStyle = sky; ctx.fillRect(0,0,w,h);

    ctx.save();
    ctx.translate(-camera.x, 0);

    // Платформы
    platforms.forEach(p => {
        ctx.fillStyle = '#3e2723'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#2e7d32'; ctx.fillRect(p.x, p.y, p.w, 8);
    });

    // Отрисовка Ноя (NPC)
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(npc.x, npc.y, 12, 0, 7); // Голова
    ctx.moveTo(npc.x, npc.y+12); ctx.lineTo(npc.x, npc.y+40); // Тело
    ctx.stroke();
    ctx.fillStyle = "#fff"; ctx.fillText("Ной", npc.x-10, npc.y-20);
    // Борода Ноя
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.moveTo(npc.x-5, npc.y+5); ctx.lineTo(npc.x+5, npc.y+5); ctx.lineTo(npc.x, npc.y+20); ctx.fill();

    // Посох
    if(!staff.collected) {
        ctx.fillStyle = '#ffd700'; ctx.shadowBlur = 20; ctx.shadowColor = "gold";
        ctx.fillRect(staff.x, staff.y, 8, 40);
        ctx.shadowBlur = 0;
    }

    // Портал
    if(portal.visible) {
        let pGrad = ctx.createRadialGradient(portal.x+30, portal.y+50, 5, portal.x+30, portal.y+50, 50);
        pGrad.addColorStop(0, '#fff'); pGrad.addColorStop(1, '#4facfe');
        ctx.fillStyle = pGrad;
        ctx.beginPath(); ctx.ellipse(portal.x+30, portal.y+50, 40, 80, Math.sin(player.frame/10)*0.1, 0, 7); ctx.fill();
    }

    // Игрок с анимацией
    drawPlayer();

    ctx.restore();
}

function drawPlayer() {
    let x = player.x + 17, y = player.y;
    let walk = Math.sin(player.frame/5) * 10;
    let moving = Math.abs(player.vx) > 0.1;

    ctx.strokeStyle = "white"; ctx.lineWidth = 3;
    ctx.save();
    ctx.translate(x, y + 25);
    
    // Анимация головы и тела
    ctx.beginPath(); ctx.arc(0, -15, 10, 0, 7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -5); ctx.lineTo(0, 15); ctx.stroke();
    
    // Ноги и руки
    let offset = moving ? walk : 0;
    ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(-10 + offset, 30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(10 - offset, 30); ctx.stroke();
    
    if(player.hasStaff) {
        ctx.strokeStyle = "#ffd700";
        ctx.beginPath(); ctx.moveTo(15, -10); ctx.lineTo(15, 30); ctx.stroke();
    }
    ctx.restore();
}

function loop() { if(!active) return; update(); draw(); requestAnimationFrame(loop); }
</script>
</body>
</html>
