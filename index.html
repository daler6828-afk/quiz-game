<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINECRAFT ИДЕАЛЬНАЯ ВЕРСИЯ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: black;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 24px;
            border-radius: 30px;
            border: 2px solid #555;
            font-size: 20px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 3px solid white;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            z-index: 15;
            pointer-events: none;
            box-shadow: 0 0 0 2px black, 0 0 10px rgba(255,255,255,0.5);
        }
        #hotbar {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            border-radius: 30px;
            border: 3px solid #666;
            backdrop-filter: blur(5px);
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .hotbar-slot {
            width: 80px;
            height: 80px;
            background: #2a2a2a;
            border: 3px solid #555;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            position: relative;
            color: white;
            transition: all 0.1s;
        }
        .hotbar-slot.active {
            border: 4px solid gold;
            transform: scale(1.1);
            background: #3a3a3a;
            box-shadow: 0 0 20px gold;
        }
        .slot-count {
            position: absolute;
            bottom: 5px;
            right: 8px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 black;
        }
        #controls {
            position: absolute;
            bottom: 200px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
            z-index: 100;
        }
        .joystick {
            pointer-events: auto;
            width: 160px;
            height: 160px;
            background: rgba(20, 20, 30, 0.7);
            border-radius: 80px;
            border: 4px solid white;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #action-panel {
            position: absolute;
            bottom: 350px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }
        .action-btn {
            width: 120px;
            height: 120px;
            background: rgba(0, 0, 0, 0.8);
            border: 4px solid white;
            border-radius: 60px;
            color: white;
            font-size: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.1s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .action-btn:active {
            transform: scale(0.85);
            background: rgba(100, 100, 100, 0.9);
        }
        #fullscreen-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border: 3px solid white;
            color: white;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 200;
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }
        #fullscreen-btn:hover {
            background: rgba(50,50,50,0.9);
        }
        #debug {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="hud">❤️ 100 | БЛОКОВ: <span id="block-counter">64</span> | <span id="block-type">🌿</span></div>
    <div id="crosshair"></div>
    
    <div id="hotbar"></div>

    <div id="controls">
        <div class="joystick" id="left-joystick"></div>
        <div class="joystick" id="right-joystick"></div>
    </div>

    <div id="action-panel">
        <div class="action-btn" id="jump-btn">🦘</div>
        <div class="action-btn" id="break-btn">⛏️</div>
        <div class="action-btn" id="place-btn">🪨</div>
    </div>

    <button id="fullscreen-btn">⛶ ПОЛНЫЙ ЭКРАН</button>
    <div id="debug">СТАТУС: ЗАГРУЗКА...</div>

    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>

    <script>
        (function() {
            console.log('СКРИПТ ЗАПУЩЕН');
            
            // ========== БАЗОВЫЕ НАСТРОЙКИ ==========
            const GRAVITY = 0.02;
            const JUMP_FORCE = 0.35;
            const SPEED = 0.2;
            const REACH = 5;
            
            // ========== СОЗДАНИЕ СЦЕНЫ ==========
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x88ccff); // Ярко-голубое небо
            
            // КАМЕРА
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 10, 15);
            
            // РЕНДЕР
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x88ccff, 1); // Непрозрачный фон
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            // ========== ОСВЕЩЕНИЕ ==========
            // Яркий окружающий свет
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            
            // Основной источник света (солнце)
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(30, 50, 20);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 1;
            sun.shadow.camera.far = 100;
            sun.shadow.camera.left = -30;
            sun.shadow.camera.right = 30;
            sun.shadow.camera.top = 30;
            sun.shadow.camera.bottom = -30;
            scene.add(sun);
            
            // Заполняющий свет снизу
            const fill = new THREE.PointLight(0x88aaff, 0.8);
            fill.position.set(0, 10, 10);
            scene.add(fill);
            
            // ========== ТИПЫ БЛОКОВ ==========
            const blockColors = {
                'grass': 0x7CFC00,   // Ярко-зеленый
                'dirt': 0x8B5A2B,    // Коричневый
                'stone': 0x808080,   // Серый
                'wood': 0x8B4513,    // Темно-коричневый
                'leaf': 0x2E8B57,    // Зеленый
                'brick': 0xB85C38,   // Кирпичный
                'sand': 0xF4E542     // Желтый
            };
            
            const blockEmoji = {
                'grass': '🌿',
                'dirt': '🟫',
                'stone': '🪨',
                'wood': '🪵',
                'leaf': '🍃',
                'brick': '🧱',
                'sand': '⏳'
            };
            
            // МАССИВ ВСЕХ БЛОКОВ
            const blocks = [];
            
            // ========== ФУНКЦИЯ СОЗДАНИЯ БЛОКА ==========
            function createBlock(type, x, y, z) {
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshStandardMaterial({ 
                    color: blockColors[type],
                    emissive: 0x000000,
                    roughness: 0.4,
                    metalness: 0.1
                });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(x, y, z);
                cube.castShadow = true;
                cube.receiveShadow = true;
                
                // Черные ребра (Minecraft стиль)
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
                cube.add(line);
                
                cube.userData = { type: type };
                return cube;
            }
            
            // ========== ГЕНЕРАЦИЯ МИРА ==========
            console.log('Генерация мира...');
            
            // СОЗДАЕМ ОСНОВУ (ТВЕРДЫЙ ПОЛ)
            for (let x = -15; x <= 15; x++) {
                for (let z = -15; z <= 15; z++) {
                    // Слой 0: Трава (видимый слой)
                    const grass = createBlock('grass', x, 0, z);
                    scene.add(grass);
                    blocks.push(grass);
                    
                    // Слой -1: Земля (под травой)
                    const dirt = createBlock('dirt', x, -1, z);
                    scene.add(dirt);
                    blocks.push(dirt);
                    
                    // Слой -2: Камень (глубоко)
                    const stone = createBlock('stone', x, -2, z);
                    scene.add(stone);
                    blocks.push(stone);
                }
            }
            
            // ДОБАВЛЯЕМ НЕСКОЛЬКО ХОЛМИКОВ
            for (let i = 0; i < 20; i++) {
                const x = Math.floor(Math.random() * 20) - 10;
                const z = Math.floor(Math.random() * 20) - 10;
                
                // Холмик из земли
                if (Math.random() > 0.5) {
                    const hillBlock = createBlock('dirt', x, 1, z);
                    scene.add(hillBlock);
                    blocks.push(hillBlock);
                }
            }
            
            // ДОБАВЛЯЕМ ДЕРЕВЬЯ
            for (let i = 0; i < 8; i++) {
                const x = Math.floor(Math.random() * 20) - 10;
                const z = Math.floor(Math.random() * 20) - 10;
                
                // Ствол
                for (let h = 1; h <= 4; h++) {
                    const wood = createBlock('wood', x, h, z);
                    scene.add(wood);
                    blocks.push(wood);
                }
                
                // Листва
                for (let dx = -2; dx <= 2; dx++) {
                    for (let dz = -2; dz <= 2; dz++) {
                        for (let dy = 4; dy <= 5; dy++) {
                            if (dx === 0 && dz === 0) continue;
                            if (Math.abs(dx) + Math.abs(dz) > 3) continue;
                            const leaf = createBlock('leaf', x + dx, dy, z + dz);
                            scene.add(leaf);
                            blocks.push(leaf);
                        }
                    }
                }
            }
            
            console.log('Всего блоков:', blocks.length);
            
            // ========== ПЕРЕМЕННЫЕ ИГРОКА ==========
            const player = {
                x: 0,
                y: 5,
                z: 0,
                velY: 0,
                onGround: false,
                selectedSlot: 0,
                hotbar: ['grass', 'dirt', 'stone', 'wood', 'leaf'],
                inventory: {
                    'grass': 64,
                    'dirt': 64,
                    'stone': 64,
                    'wood': 64,
                    'leaf': 64
                }
            };
            
            // Углы поворота
            let pitch = 0.2;
            let yaw = 0;
            
            // Джойстики
            let moveX = 0, moveY = 0;
            let lookX = 0, lookY = 0;
            
            // ========== ПРОВЕРКА СТОЛКНОВЕНИЙ ==========
            function checkCollision(x, y, z) {
                const playerWidth = 0.3;
                const playerHeight = 1.8;
                
                for (let block of blocks) {
                    const b = block.position;
                    
                    if (x + playerWidth > b.x - 0.5 && x - playerWidth < b.x + 0.5 &&
                        y + playerHeight > b.y - 0.5 && y < b.y + 0.5 &&
                        z + playerWidth > b.z - 0.5 && z - playerWidth < b.z + 0.5) {
                        return true;
                    }
                }
                return false;
            }
            
            // ========== ПОЛУЧЕНИЕ БЛОКА ПОД ПРИЦЕЛОМ ==========
            function getLookedBlock() {
                const raycaster = new THREE.Raycaster();
                const direction = new THREE.Vector3(
                    Math.sin(yaw) * Math.cos(pitch),
                    Math.sin(pitch),
                    Math.cos(yaw) * Math.cos(pitch)
                );
                raycaster.set(camera.position, direction);
                
                const intersects = raycaster.intersectObjects(blocks);
                if (intersects.length > 0 && intersects[0].distance < REACH) {
                    return intersects[0].object;
                }
                return null;
            }
            
            // ========== ЛОМАНИЕ БЛОКА ==========
            function breakBlock() {
                const block = getLookedBlock();
                if (block) {
                    const type = block.userData.type;
                    player.inventory[type] += 1;
                    
                    scene.remove(block);
                    const index = blocks.indexOf(block);
                    if (index > -1) blocks.splice(index, 1);
                    
                    updateHotbar();
                    document.getElementById('debug').textContent = `СЛОМАНО: ${type}`;
                }
            }
            
            // ========== УСТАНОВКА БЛОКА ==========
            function placeBlock() {
                const target = getLookedBlock();
                if (!target) return;
                
                const type = player.hotbar[player.selectedSlot];
                if (player.inventory[type] <= 0) return;
                
                const direction = new THREE.Vector3(
                    Math.sin(yaw) * Math.cos(pitch),
                    Math.sin(pitch),
                    Math.cos(yaw) * Math.cos(pitch)
                );
                
                const pos = target.position.clone().add(direction.clone().multiplyScalar(1.1));
                pos.x = Math.round(pos.x);
                pos.y = Math.round(pos.y);
                pos.z = Math.round(pos.z);
                
                // Проверка на занятость
                let occupied = false;
                for (let b of blocks) {
                    if (Math.abs(b.position.x - pos.x) < 0.1 && 
                        Math.abs(b.position.y - pos.y) < 0.1 && 
                        Math.abs(b.position.z - pos.z) < 0.1) {
                        occupied = true;
                        break;
                    }
                }
                
                // Проверка расстояния до игрока
                const distToPlayer = Math.sqrt(
                    (pos.x - player.x) ** 2 +
                    (pos.y - player.y) ** 2 +
                    (pos.z - player.z) ** 2
                );
                
                if (!occupied && distToPlayer > 1.2) {
                    const newBlock = createBlock(type, pos.x, pos.y, pos.z);
                    scene.add(newBlock);
                    blocks.push(newBlock);
                    player.inventory[type] -= 1;
                    updateHotbar();
                    document.getElementById('debug').textContent = `ПОСТАВЛЕНО: ${type}`;
                }
            }
            
            // ========== ПРЫЖОК ==========
            function jump() {
                if (player.onGround) {
                    player.velY = JUMP_FORCE;
                    player.onGround = false;
                    document.getElementById('debug').textContent = 'ПРЫЖОК';
                }
            }
            
            // ========== ОБНОВЛЕНИЕ ХОТБАРА ==========
            function updateHotbar() {
                const hotbarDiv = document.getElementById('hotbar');
                hotbarDiv.innerHTML = '';
                
                for (let i = 0; i < player.hotbar.length; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'hotbar-slot' + (i === player.selectedSlot ? ' active' : '');
                    
                    const type = player.hotbar[i];
                    slot.textContent = blockEmoji[type] || '⬛';
                    
                    const count = document.createElement('span');
                    count.className = 'slot-count';
                    count.textContent = player.inventory[type];
                    
                    slot.appendChild(count);
                    hotbarDiv.appendChild(slot);
                }
                
                const currentType = player.hotbar[player.selectedSlot];
                document.getElementById('block-counter').textContent = player.inventory[currentType];
                document.getElementById('block-type').textContent = blockEmoji[currentType] || '🌿';
            }
            
            // ========== ОБНОВЛЕНИЕ ФИЗИКИ ==========
            function update() {
                // Поворот камеры
                yaw -= lookX * 0.025;
                pitch += lookY * 0.025;
                
                // Ограничение обзора
                if (pitch > 1.5) pitch = 1.5;
                if (pitch < -1.5) pitch = -1.5;
                
                camera.rotation.order = 'YXZ';
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;
                
                // Гравитация
                player.velY -= GRAVITY;
                
                // Движение
                if (Math.abs(moveX) > 0.1 || Math.abs(moveY) > 0.1) {
                    const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
                    const right = new THREE.Vector3(Math.sin(yaw + Math.PI/2), 0, Math.cos(yaw + Math.PI/2));
                    
                    const dx = (forward.x * -moveY + right.x * moveX) * SPEED;
                    const dz = (forward.z * -moveY + right.z * moveX) * SPEED;
                    
                    // Движение по X
                    let newX = player.x + dx;
                    if (!checkCollision(newX, player.y, player.z)) {
                        player.x = newX;
                    }
                    
                    // Движение по Z
                    let newZ = player.z + dz;
                    if (!checkCollision(player.x, player.y, newZ)) {
                        player.z = newZ;
                    }
                }
                
                // Вертикальное движение
                let newY = player.y + player.velY;
                if (!checkCollision(player.x, newY, player.z)) {
                    player.y = newY;
                    player.onGround = false;
                } else {
                    if (player.velY < 0) {
                        player.onGround = true;
                    }
                    player.velY = 0;
                }
                
                // Предотвращение падения в бездну
                if (player.y < 1.0) {
                    player.y = 1.0;
                    player.velY = 0;
                    player.onGround = true;
                }
                
                // Обновление позиции камеры
                camera.position.x = player.x;
                camera.position.y = player.y;
                camera.position.z = player.z;
            }
            
            // ========== АНИМАЦИЯ ==========
            function animate() {
                requestAnimationFrame(animate);
                update();
                renderer.render(scene, camera);
            }
            animate();
            
            // ========== НАСТРОЙКА ДЖОЙСТИКОВ ==========
            setTimeout(() => {
                if (typeof nipplejs !== 'undefined') {
                    console.log('Настройка джойстиков...');
                    
                    // Левый джойстик (движение)
                    const leftJoy = nipplejs.create({
                        zone: document.getElementById('left-joystick'),
                        mode: 'static',
                        position: { left: '50%', top: '50%' },
                        color: 'white',
                        size: 100,
                        lockY: false,
                        lockX: false
                    });
                    
                    leftJoy.on('move', (evt, nipple) => {
                        moveX = nipple.vector.x;
                        moveY = nipple.vector.y;
                    }).on('end', () => {
                        moveX = 0;
                        moveY = 0;
                    });
                    
                    // Правый джойстик (поворот)
                    const rightJoy = nipplejs.create({
                        zone: document.getElementById('right-joystick'),
                        mode: 'static',
                        position: { left: '50%', top: '50%' },
                        color: 'white',
                        size: 100,
                        lockY: false,
                        lockX: false
                    });
                    
                    rightJoy.on('move', (evt, nipple) => {
                        lookX = nipple.vector.x;
                        lookY = nipple.vector.y;
                    }).on('end', () => {
                        lookX = 0;
                        lookY = 0;
                    });
                    
                    document.getElementById('debug').textContent = 'ДЖОЙСТИКИ ГОТОВЫ';
                }
            }, 500);
            
            // ========== КНОПКИ ДЕЙСТВИЙ ==========
            document.getElementById('jump-btn').addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                jump();
            });
            
            document.getElementById('break-btn').addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                breakBlock();
            });
            
            document.getElementById('place-btn').addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                placeBlock();
            });
            
            // Переключение слотов (цифры 1-5)
            window.addEventListener('keydown', (e) => {
                if (e.key >= '1' && e.key <= '5') {
                    player.selectedSlot = parseInt(e.key) - 1;
                    updateHotbar();
                }
                
                // Пробел для прыжка
                if (e.key === ' ') {
                    e.preventDefault();
                    jump();
                }
            });
            
            // Полный экран
            document.getElementById('fullscreen-btn').addEventListener('click', () => {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            });
            
            // Запрет скролла и контекстного меню
            document.addEventListener('contextmenu', (e) => e.preventDefault());
            document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
            document.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });
            
            // Инициализация
            updateHotbar();
            document.getElementById('debug').textContent = 'ГОТОВО! ИГРАЙТЕ!';
            console.log('ВСЕ ГОТОВО!');
        })();
    </script>
</body>
</html>
