<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>История Времен</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }

        /* ИНТЕРФЕЙС */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; display: none; }
        #inv-btn { position: absolute; top: 15px; right: 15px; width: 55px; height: 55px; background: #8d6e63; border: 2px solid #ffd700; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 25px; pointer-events: auto; }
        
        #inv-panel { position: absolute; bottom: -120px; left: 50%; transform: translateX(-50%); width: 280px; height: 90px; background: rgba(50, 30, 20, 0.95); border: 3px solid #ffd700; border-radius: 15px 15px 0 0; display: flex; justify-content: space-around; align-items: center; transition: 0.3s; pointer-events: auto; }
        .inv-active { bottom: 0px !important; }
        .slot { width: 55px; height: 55px; background: rgba(0,0,0,0.4); border: 1px solid #8d6e63; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 25px; color: white; }
        .slot.selected { border: 2px solid #ffd700; box-shadow: inset 0 0 10px #ffd700; }

        #controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: auto; }
        .btn-ui { width: 75px; height: 75px; background: rgba(255,255,255,0.15); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 12px; }
        #act-btn { background: rgba(255, 0, 0, 0.4); display: none; border-color: #ff0000; }

        /* КРАСНЫЙ ЭФФЕКТ */
        #red-fx { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; box-shadow: inset 0 0 100px rgba(255,0,0,0.5); opacity: 0; transition: opacity 0.2s; z-index: 50; border: 10px solid rgba(255,0,0,0.3); }

        .screen { position: absolute; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 200; pointer-events: auto; text-align: center; }
        .btn-start { padding: 15px 40px; background: #ffd700; color: #000; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div id="red-fx"></div>

<div id="intro-screen" class="screen">
    <h1 id="title" style="color: #ffd700; margin: 10px;">НАЗАД ВО ВРЕМЕНИ</h1>
    <p id="desc" style="max-width: 80%;">Загрузка мира...</p>
    <button class="btn-start" onclick="nextChapterAction()">ПРОДОЛЖИТЬ</button>
</div>

<div id="hud">
    <div id="inv-btn" onclick="toggleInv()">📒</div>
    <div id="inv-panel">
        <div class="slot" id="sl0" onclick="chooseItem(0)"></div>
        <div class="slot" id="sl1" onclick="chooseItem(1)"></div>
        <div class="slot" id="sl2" onclick="chooseItem(2)"></div>
    </div>
    <div id="controls">
        <div id="act-btn" class="btn-ui">ДЕЙСТВИЕ</div>
        <div id="jump-btn" class="btn-ui" ontouchstart="jump()">ПРЫЖОК</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let w, h, active = false, chapter = 1;
let player = { x: 100, y: 0, vx: 0, vy: 0, w: 40, h: 65, ground: false, items: [], activeIdx: -1 };
let camX = 0, treeHealth = 5, transitionY = 0;
let isRed = false;

const items = [
    {x: 700, i: '🪓', ch: 1}, {x: 1500, i: '🪄', ch: 1},
    {x: 1000, i: '🦯', ch: 2}, {x: 2000, i: '🍯', ch: 2},
    {x: 900, i: '🌾', ch: 3}, {x: 1800, i: '🌾', ch: 3}, {x: 2500, i: '🌾', ch: 3}
];

const story = [
    {t: "НОЙ", d: "Собери топор и сруби дерево, чтобы достроить Ковчег!"},
    {t: "МОИСЕЙ", d: "Иди через пустыню к морю. Используй посох, чтобы открыть путь!"},
    {t: "ИОСИФ", d: "Египет ждет голод. Собери все зерно на поле!"}
];

function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(e => console.log(e));
    }
}

function nextChapterAction() {
    toggleFullScreen();
    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    active = true;
    if(chapter === 1) loop();
}

function showIntro() {
    active = false;
    document.getElementById('intro-screen').style.display = 'flex';
    document.getElementById('title').innerText = story[chapter-1].t;
    document.getElementById('desc').innerText = story[chapter-1].d;
}

function jump() { if(player.ground) player.vy = -17; }

function toggleInv() { document.getElementById('inv-panel').classList.toggle('inv-active'); }

function chooseItem(idx) {
    if(player.items[idx]) {
        player.activeIdx = idx;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
        document.getElementById('sl'+idx).classList.add('selected');
    }
}

// УПРАВЛЕНИЕ ЛЕВАЯ ЧАСТЬ (ДЖОЙСТИК)
let touchX = null;
window.addEventListener('touchstart', e => {
    let t = e.touches[0];
    if(t.clientX < w/2) touchX = t.clientX;
    if(e.target.id === 'act-btn') doAction();
});
window.addEventListener('touchmove', e => {
    for(let t of e.touches) {
        if(t.clientX < w/2) {
            let dx = t.clientX - touchX;
            player.vx = Math.sign(dx) * 7;
        }
    }
});
window.addEventListener('touchend', () => { player.vx = 0; touchX = null; });

function doAction() {
    if(chapter === 1) {
        treeHealth--;
        flashRed();
        if(treeHealth <= 0) { player.x += 100; }
    }
    if(chapter === 2) { chapterTransition(); }
}

function flashRed() {
    document.getElementById('red-fx').style.opacity = '1';
    setTimeout(() => document.getElementById('red-fx').style.opacity = '0', 150);
}

function update() {
    if(!active) return;
    player.vy += 0.8;
    player.x += player.vx;
    player.y += player.vy;
    camX += (player.x - w/2 - camX) * 0.1;

    let ground = h - 70;
    if(player.y + player.h > ground) { player.y = ground - player.h; player.vy = 0; player.ground = true; }

    items.forEach(it => {
        if(it.ch === chapter && !it.collected && Math.abs(player.x - it.x) < 50) {
            it.collected = true; player.items.push(it.i);
            document.getElementById('sl'+(player.items.length-1)).innerText = it.i;
        }
    });

    // Кнопка действия
    const ab = document.getElementById('act-btn');
    if(chapter === 1 && Math.abs(player.x - 3000) < 100 && player.items[player.activeIdx] === '🪓' && treeHealth > 0) {
        ab.style.display = 'flex'; ab.innerText = "РУБИТЬ";
    } else if(chapter === 2 && player.x > 3800 && player.items.includes('🦯')) {
        ab.style.display = 'flex'; ab.innerText = "МОРЕ";
    } else { ab.style.display = 'none'; }

    // Условие перехода
    if(chapter === 1 && player.x > 3400 && treeHealth <= 0) chapterTransition();
    if(chapter === 3 && player.items.length >= 3 && player.x > 3000) { alert("ПОБЕДА!"); location.reload(); }
}

function chapterTransition() {
    chapter++;
    if(chapter > 3) chapter = 1;
    player.x = 100; player.items = []; player.activeIdx = -1;
    treeHealth = 5;
    document.querySelectorAll('.slot').forEach(s => s.innerText = "");
    showIntro();
}

function draw() {
    ctx.clearRect(0,0,w,h);
    const bgs = ["#0a1a2a", "#edc9af", "#f4e1ad"];
    ctx.fillStyle = bgs[chapter-1]; ctx.fillRect(0,0,w,h);

    ctx.save(); ctx.translate(-camX, 0);
    const grounds = ["#2e7d32", "#c2b280", "#e3c382"];
    ctx.fillStyle = grounds[chapter-1]; ctx.fillRect(0, h-70, 5000, 70);

    if(chapter === 1) {
        if(treeHealth > 0) { ctx.fillStyle = "#5d4037"; ctx.fillRect(3000, h-270, 20, 200); }
        ctx.fillStyle = "#3e2723"; ctx.fillRect(3400, h-270, 400, 200);
    } else if(chapter === 2) {
        ctx.fillStyle = "#0077be"; ctx.fillRect(4000, 0, 1000, h);
    } else if(chapter === 3) {
        ctx.fillStyle = "#d4af37"; ctx.fillRect(3200, h-370, 300, 300);
    }

    items.forEach(it => {
        if(it.ch === chapter && !it.collected) {
            ctx.font = "35px Arial"; ctx.fillText(it.i, it.x, h-110 + Math.sin(Date.now()/200)*10);
        }
    });

    drawHero(player.x+20, player.y);
    ctx.restore();
}

function drawHero(x, y) {
    const colors = ["#5d4037", "#f5f5f5", "#ffcc00"];
    ctx.fillStyle = colors[chapter-1];
    ctx.beginPath(); ctx.moveTo(x-15, y+65); ctx.lineTo(x+15, y+65); ctx.lineTo(x, y+20); ctx.fill();
    ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x, y+15, 10, 0, 7); ctx.stroke();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();
showIntro();
</script>
</body>
</html>
