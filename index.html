<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Kahoot Клон</title>
    <style>
        /* CSS СТИЛИ */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #46178f; /* Фирменный фиолетовый */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 600px;
            text-align: center;
        }

        .hidden { display: none !important; }

        /* Экран старта */
        input {
            padding: 12px;
            width: 80%;
            margin: 15px 0;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 18px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: #555; }

        /* Сетка ответов */
        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .ans-btn {
            height: 80px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .ans-btn:active { transform: scale(0.95); }

        .red { background-color: #e21b3c; }
        .blue { background-color: #1368ce; }
        .yellow { background-color: #ffa602; }
        .green { background-color: #26890c; }

        /* Таймер и прогресс */
        #timer-display {
            font-size: 24px;
            font-weight: bold;
            color: #46178f;
            margin-bottom: 10px;
        }

        #score-list {
            list-style: none;
            padding: 0;
            text-align: left;
        }

        #score-list li {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <h1 style="color: #46178f;">JS QUIZ</h1>
        <input type="text" id="username" placeholder="Твоё имя..." maxlength="15">
        <br>
        <button onclick="startGame()">Войти в игру</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="timer-display">Осталось: <span id="seconds">10</span>с</div>
        <h2 id="question-text">Загрузка вопроса...</h2>
        <div class="answers-grid">
            <button class="ans-btn red" onclick="checkAnswer(0)"></button>
            <button class="ans-btn blue" onclick="checkAnswer(1)"></button>
            <button class="ans-btn yellow" onclick="checkAnswer(2)"></button>
            <button class="ans-btn green" onclick="checkAnswer(3)"></button>
        </div>
    </div>

    <div id="leaderboard-screen" class="hidden">
        <h2 style="color: #46178f;">Топ Игроков</h2>
        <ul id="score-list"></ul>
        <button onclick="location.reload()" style="background-color: #46178f;">Играть снова</button>
    </div>
</div>

<script>
    // ДАННЫЕ ИГРЫ
    const quizData = [
        { q: "В какой версии Minecraft появились командные блоки?", a: ["1.4.2", "1.4.7", "1.5", "1.3.1"], correct: 0 },
        { q: "Какой тег в HTML самый главный?", a: ["<head>", "<body>", "<html>", "<main>"], correct: 2 },
        { q: "Как расшифровывается CSS?", a: ["Cool Style Sheet", "Cascading Style Sheets", "Computer Style Syntax", "Create Simple Site"], correct: 1 },
        { q: "Что делает команда /tp в Minecraft?", a: ["Убивает", "Дает блоки", "Телепортирует", "Меняет время"], correct: 2 }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let timerInterval;
    let timeLeft = 10;
    let playerName = "";

    // ЛОГИКА
    function startGame() {
        playerName = document.getElementById('username').value.trim();
        if (!playerName) {
            alert("Пожалуйста, введи имя!");
            return;
        }
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQuestionIndex >= quizData.length) {
            return showLeaderboard();
        }

        const currentQ = quizData[currentQuestionIndex];
        document.getElementById('question-text').innerText = currentQ.q;
        
        const buttons = document.querySelectorAll('.ans-btn');
        currentQ.a.forEach((text, i) => {
            buttons[i].innerText = text;
        });

        startTimer();
    }

    function startTimer() {
        timeLeft = 10;
        document.getElementById('seconds').innerText = timeLeft;
        clearInterval(timerInterval);
        
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('seconds').innerText = timeLeft;
            if (timeLeft <= 0) {
                checkAnswer(-1); // Пропуск, если время вышло
            }
        }, 1000);
    }

    function checkAnswer(selectedIndex) {
        clearInterval(timerInterval);
        const correctIndex = quizData[currentQuestionIndex].correct;

        if (selectedIndex === correctIndex) {
            score += (timeLeft * 50) + 100; // Очки зависят от скорости
        }

        currentQuestionIndex++;
        loadQuestion();
    }

    function showLeaderboard() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('leaderboard-screen').classList.remove('hidden');

        // Сохранение в LocalStorage (таблица лидеров на одном ПК)
        let leaderboard = JSON.parse(localStorage.getItem('myQuizLeaderboard')) || [];
        leaderboard.push({ name: playerName, score: score });
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, 5); // Оставляем ТОП-5
        localStorage.setItem('myQuizLeaderboard', JSON.stringify(leaderboard));

        // Отображение
        const list = document.getElementById('score-list');
        list.innerHTML = leaderboard.map((player, index) => 
            `<li><strong>${index + 1}. ${player.name}</strong> <span>${player.score} pts</span></li>`
        ).join('');
    }
</script>

</body>
</html>
