<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>True FPV Simulator</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: sans-serif; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .joystick-zone { position: absolute; bottom: 20px; width: 45%; height: 220px; pointer-events: auto; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
        .controls { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; pointer-events: auto; }
        .btn-ui { padding: 12px; background: rgba(0,0,0,0.8); color: white; border: 1px solid #fff; border-radius: 8px; font-size: 12px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; }
        #start-btn { padding: 20px 40px; font-size: 20px; background: #27ae60; border: none; color: white; border-radius: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">ВЗЛЕТЕТЬ</button>
        <p>Левый стик: Газ и Поворот. Правый: Наклоны.</p>
    </div>

    <div id="ui-layer">
        <div class="controls">
            <button class="btn-ui" id="cam-btn">КАМЕРА: 1st</button>
            <button class="btn-ui" id="reset-btn">СБРОС</button>
        </div>
        <div id="left-zone" class="joystick-zone"></div>
        <div id="right-zone" class="joystick-zone"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        let scene, camera, renderer, drone;
        let isFirstPerson = true;
        let input = { throttle: 0, yaw: 0, pitch: 0, roll: 0 };
        
        // Физические переменные
        let velocity = new THREE.Vector3(0, 0, 0);
        let angularVelocity = new THREE.Vector3(0, 0, 0);
        const gravity = 0.005;
        const drag = 0.99; // Сопротивление воздуха
        const angularDrag = 0.92; // Затухание вращения
        const power = 0.015; // Мощность моторов

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 20, 200);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(50, 100, 50);
            scene.add(sun, new THREE.AmbientLight(0xffffff, 0.6));

            createLandscape();
            createDrone();
            setupJoysticks();
            
            document.getElementById('cam-btn').onclick = (e) => {
                isFirstPerson = !isFirstPerson;
                e.target.innerText = isFirstPerson ? "КАМЕРА: 1st" : "КАМЕРА: 3rd";
            };
            
            document.getElementById('reset-btn').onclick = () => {
                drone.position.set(0, 5, 0);
                drone.rotation.set(0, 0, 0);
                velocity.set(0,0,0);
                angularVelocity.set(0,0,0);
            };

            animate();
        }

        function createLandscape() {
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(1000, 1000),
                new THREE.MeshStandardMaterial({ color: 0x3d7a3a })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Объекты для ориентира
            for(let i=0; i<100; i++) {
                const x = Math.random() * 400 - 200;
                const z = Math.random() * 400 - 200;
                const h = Math.random() * 10 + 2;
                const box = new THREE.Mesh(new THREE.BoxGeometry(4, h, 4), new THREE.MeshStandardMaterial({color: 0x777777}));
                box.position.set(x, h/2, z);
                scene.add(box);
            }
        }

        function createDrone() {
            drone = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.4), new THREE.MeshStandardMaterial({color: 0x222}));
            drone.add(body);
            const nose = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.2), new THREE.MeshStandardMaterial({color: 0xff0000}));
            nose.position.z = -0.25;
            drone.add(nose);
            scene.add(drone);
            drone.position.y = 5;
        }

        function setupJoysticks() {
            const left = nipplejs.create({ zone: document.getElementById('left-zone'), mode: 'static', position: {left: '50%', bottom: '50%'}, color: 'white' });
            left.on('move', (e, d) => { input.throttle = d.vector.y; input.yaw = -d.vector.x; });
            left.on('end', () => { input.throttle = 0; input.yaw = 0; });

            const right = nipplejs.create({ zone: document.getElementById('right-zone'), mode: 'static', position: {left: '50%', bottom: '50%'}, color: 'white' });
            right.on('move', (e, d) => { input.pitch = d.vector.y; input.roll = -d.vector.x; });
            right.on('end', () => { input.pitch = 0; input.roll = 0; });
        }

        function animate() {
            requestAnimationFrame(animate);

            // 1. Вращение (Acro Mode)
            // Мы добавляем ввод к угловой скорости, а не напрямую к углу
            angularVelocity.x += input.pitch * 0.005;
            angularVelocity.z += input.roll * 0.005;
            angularVelocity.y += input.yaw * 0.005;

            // Применяем вращение
            drone.rotateX(angularVelocity.x);
            drone.rotateY(angularVelocity.y);
            drone.rotateZ(angularVelocity.z);

            // Затухание вращения (чтобы дрон не крутился вечно)
            angularVelocity.multiplyScalar(angularDrag);

            // 2. Линейное движение
            // Тяга вверх относительно дрона
            if (input.throttle > -0.5) { // если стик газа хотя бы немного поднят
                const thrustAmt = (input.throttle + 1) * power; // нормализуем газ
                const thrustVector = new THREE.Vector3(0, thrustAmt, 0);
                thrustVector.applyQuaternion(drone.quaternion);
                velocity.add(thrustVector);
            }

            // Гравитация
            velocity.y -= gravity;

            // Сопротивление воздуха и применение скорости
            velocity.multiplyScalar(drag);
            drone.position.add(velocity);

            // Столкновение с землей
            if (drone.position.y < 0.2) {
                drone.position.y = 0.2;
                velocity.set(0, 0, 0);
            }

            // 3. Камера
            if (isFirstPerson) {
                camera.position.copy(drone.position);
                camera.quaternion.copy(drone.quaternion);
            } else {
                const idealOffset = new THREE.Vector3(0, 1.5, 4).applyMatrix4(drone.matrixWorld);
                camera.position.lerp(idealOffset, 0.1);
                camera.lookAt(drone.position);
            }

            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = () => {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            document.getElementById('overlay').style.display = 'none';
            init();
        };
    </script>
</body>
</html>
