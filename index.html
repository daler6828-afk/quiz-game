<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Назад во времени - Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .screen { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #2a5298, #1e3c72); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; z-index: 100; color: white; }
        
        .btn { 
            padding: 20px 50px; margin: 15px; font-size: 24px; color: white; 
            border: 3px solid #fff; background: rgba(255,255,255,0.1); 
            cursor: pointer; border-radius: 50px; transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn:active { transform: scale(0.95); background: white; color: #1e3c72; }

        /* Элементы управления */
        .touch-ctrl { position: absolute; pointer-events: none; opacity: 0.7; }
        #joy-bg { width: 120px; height: 120px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; display: none; }
        #joy-stick { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; left: 35px; top: 35px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        #jump-btn { 
            position: absolute; bottom: 50px; right: 50px; width: 100px; height: 100px; 
            background: rgba(255,255,255,0.3); border: 4px solid #fff; border-radius: 50%; 
            pointer-events: auto; display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; font-size: 18px; box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
    <div id="menu" class="screen">
        <h1 style="font-size: 40px; text-shadow: 0 5px 10px rgba(0,0,0,0.5);">НАЗАД ВО ВРЕМЕНИ</h1>
        <div class="btn" onclick="startGame()">ИГРАТЬ</div>
        <p style="opacity: 0.8;">Паркур-квест по библейским сюжетам</p>
    </div>

    <div id="joy-bg" class="touch-ctrl"><div id="joy-stick"></div></div>
    
    <div id="jump-btn" class="hidden">ПРЫЖОК</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const joyBg = document.getElementById('joy-bg');
const joyStick = document.getElementById('joy-stick');
const jumpBtn = document.getElementById('jump-btn');

let w, h;
let active = false;
let player = { x: 100, y: 100, vx: 0, vy: 0, w: 40, h: 60, ground: false };
let platforms = [];

// Мультитач данные
let touches = {}; 
let joyId = null;
let joyData = { startX: 0, startY: 0, moveX: 0 };

function initLevel() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    platforms = [
        {x: 0, y: h - 80, w: w * 2, h: 80}, // Земля
        {x: 250, y: h - 220, w: 150, h: 25},
        {x: 500, y: h - 350, w: 150, h: 25},
        {x: 100, y: h - 450, w: 150, h: 25}
    ];
}
window.addEventListener('resize', initLevel);
initLevel();

// --- УПРАВЛЕНИЕ MULTI-TOUCH ---
window.addEventListener('touchstart', e => {
    for (let t of e.changedTouches) {
        if (t.clientX < w / 2 && joyId === null) {
            // Активация джойстика
            joyId = t.identifier;
            joyData.startX = t.clientX;
            joyData.startY = t.clientY;
            joyBg.style.display = 'block';
            joyBg.style.left = (t.clientX - 60) + 'px';
            joyBg.style.top = (t.clientY - 60) + 'px';
        } else if (t.clientX >= w / 2) {
            // Прыжок (правая сторона)
            doJump();
        }
    }
}, {passive: false});

window.addEventListener('touchmove', e => {
    e.preventDefault();
    for (let t of e.changedTouches) {
        if (t.identifier === joyId) {
            let dx = t.clientX - joyData.startX;
            let limit = 50;
            let dist = Math.max(-limit, Math.min(limit, dx));
            joyData.moveX = dist / limit;
            joyStick.style.transform = `translateX(${joyData.moveX * 35}px)`;
        }
    }
}, {passive: false});

window.addEventListener('touchend', e => {
    for (let t of e.changedTouches) {
        if (t.identifier === joyId) {
            joyId = null;
            joyData.moveX = 0;
            joyBg.style.display = 'none';
        }
    }
});

// Клавиатура для теста на ПК
let keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space') doJump(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });

function doJump() {
    if (player.ground) {
        player.vy = -18;
        player.ground = false;
    }
}

function startGame() {
    document.getElementById('menu').classList.add('hidden');
    jumpBtn.classList.remove('hidden');
    active = true;
    loop();
}

function update() {
    // Движение (джойстик или стрелки)
    let move = joyData.moveX;
    if (keys['ArrowLeft']) move = -1;
    if (keys['ArrowRight']) move = 1;
    
    player.vx = move * 8;
    player.vy += 0.8;
    player.x += player.vx;
    player.y += player.vy;

    player.ground = false;
    platforms.forEach(p => {
        if (player.x + player.w > p.x && player.x < p.x + p.w &&
            player.y + player.h > p.y && player.y + player.h < p.y + p.h + 15 && player.vy >= 0) {
            player.y = p.y - player.h;
            player.vy = 0;
            player.ground = true;
        }
    });

    if (player.x < 0) player.x = 0;
}

function draw() {
    // Красивое небо
    let sky = ctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, '#4facfe');
    sky.addColorStop(1, '#00f2fe');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);

    // Солнце
    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.beginPath(); ctx.arc(w - 100, 100, 60, 0, Math.PI*2); ctx.fill();

    // Платформы
    platforms.forEach(p => {
        ctx.fillStyle = '#5d4037'; // Коричневый (земля)
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#43a047'; // Зеленый (трава)
        ctx.fillRect(p.x, p.y, p.w, 10);
    });

    // Персонаж
    drawPlayer(player.x + 20, player.y);
}

function drawPlayer(x, y) {
    ctx.strokeStyle = "#333";
    ctx.lineWidth = 4;
    ctx.lineCap = "round";
    // Тело и голова
    ctx.beginPath();
    ctx.arc(x, y + 12, 10, 0, Math.PI*2); // Голова
    ctx.moveTo(x, y + 22); ctx.lineTo(x, y + 45); // Туловище
    // Руки
    ctx.moveTo(x, y + 30); ctx.lineTo(x - 15, y + 40);
    ctx.moveTo(x, y + 30); ctx.lineTo(x + 15, y + 40);
    // Ноги
    ctx.moveTo(x, y + 45); ctx.lineTo(x - 12, y + 60);
    ctx.moveTo(x, y + 45); ctx.lineTo(x + 12, y + 60);
    ctx.stroke();
    // Лицо (глазки)
    ctx.fillStyle = "#333";
    ctx.beginPath(); ctx.arc(x-3, y+10, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+3, y+10, 1.5, 0, Math.PI*2); ctx.fill();
}

function loop() {
    if (!active) return;
    update();
    draw();
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
