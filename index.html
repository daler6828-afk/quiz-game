<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JS Builder 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        
        /* Сцена */
        #viewport {
            perspective: 1000px;
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        #world {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s linear;
        }

        /* Куб */
        .cube {
            position: absolute;
            width: 60px; height: 60px;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .side {
            position: absolute;
            width: 60px; height: 60px;
            border: 1px solid rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .front  { transform: translateZ(30px); background: #55a630; }
        .back   { transform: rotateY(180deg) translateZ(30px); background: #2b9348; }
        .right  { transform: rotateY(90deg) translateZ(30px); background: #80b918; }
        .left   { transform: rotateY(-90deg) translateZ(30px); background: #80b918; }
        .top    { transform: rotateX(90deg) translateZ(30px); background: #aacc00; }
        .bottom { transform: rotateX(-90deg) translateZ(30px); background: #386641; }

        /* Интерфейс */
        #ui { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.5); color: white; padding: 10px; border-radius: 5px; pointer-events: none; }
        
        #controls {
            position: fixed; bottom: 20px; right: 20px;
            display: grid; grid-template-columns: repeat(3, 60px); gap: 10px;
        }

        .btn {
            width: 60px; height: 60px; background: rgba(255,255,255,0.8);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; user-select: none;
        }

        #mode-indicator {
            position: fixed; top: 10px; right: 10px;
            padding: 10px; background: #ff4757; color: white; border-radius: 5px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">Клик: Поставить блок<br>Удерживай кнопку "L": Ломать</div>
    <div id="mode-indicator">РЕЖИМ: СТРОЙКА</div>

    <div id="viewport">
        <div id="world">
            </div>
    </div>

    <div id="controls">
        <div class="btn" style="grid-column: 2" onpointerdown="move('w')">▲</div>
        <div class="btn" style="grid-column: 1" onpointerdown="move('a')">◀</div>
        <div class="btn" style="grid-column: 2" onpointerdown="move('s')">▼</div>
        <div class="btn" style="grid-column: 3" onpointerdown="move('d')">▶</div>
        <div id="destroy-btn" class="btn" style="grid-column: 1; background: #ff4757; color: white;">L</div>
    </div>

    <script>
        const world = document.getElementById('world');
        const modeInd = document.getElementById('mode-indicator');
        let camX = 0, camY = -150, camZ = -600;
        let rotY = 0;
        let isDestroyMode = false;

        // Переключение режима Ломать/Ставить
        const dBtn = document.getElementById('destroy-btn');
        dBtn.onpointerdown = () => { 
            isDestroyMode = true; 
            modeInd.innerText = "РЕЖИМ: ЛОМАТЬ";
            modeInd.style.background = "#2ed573";
        };
        dBtn.onpointerup = () => { 
            isDestroyMode = false; 
            modeInd.innerText = "РЕЖИМ: СТРОЙКА";
            modeInd.style.background = "#ff4757";
        };

        function createCube(x, y, z) {
            const cube = document.createElement('div');
            cube.className = 'cube';
            cube.style.transform = `translate3d(${x}px, ${y}px, ${z}px)`;
            
            const sides = ['front', 'back', 'right', 'left', 'top', 'bottom'];
            sides.forEach(s => {
                const div = document.createElement('div');
                div.className = `side ${s}`;
                cube.appendChild(div);
            });

            cube.onclick = (e) => {
                e.stopPropagation();
                if (isDestroyMode) {
                    cube.remove();
                } else {
                    // Ставим блок сверху (y - 60)
                    createCube(x, y - 60, z);
                }
            };

            world.appendChild(cube);
        }

        // Создаем начальный пол 5x5
        for(let i = -2; i <= 2; i++) {
            for(let j = -2; j <= 2; j++) {
                createCube(i * 60, 0, j * 60);
            }
        }

        function move(dir) {
            if(dir === 'w') camZ += 30;
            if(dir === 's') camZ -= 30;
            if(dir === 'a') rotY -= 15;
            if(dir === 'd') rotY += 15;
            update();
        }

        function update() {
            world.style.transform = `rotateY(${rotY}deg) translate3d(${-camX}px, ${-camY}px, ${-camZ}px)`;
        }

        update();
    </script>
</body>
</html>
