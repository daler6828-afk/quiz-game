<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ноев Ковчег: Испытание</title>
    <style>
        :root { --wood: #5d4037; --sky: #4a90e2; --gold: #f1c40f; }
        body { margin: 0; padding: 0; overflow: hidden; background: #222; font-family: 'Georgia', serif; touch-action: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* ОКНО ДИАЛОГА */
        #dialog-box { position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%); 
            background: rgba(255, 248, 220, 0.95); color: #333; padding: 20px; border-radius: 10px; 
            border: 3px solid var(--wood); width: 85%; display: none; z-index: 5000; pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #dialog-name { color: var(--wood); font-weight: bold; margin-bottom: 5px; font-size: 20px; border-bottom: 1px solid #ccc; }
        #dialog-text { font-size: 17px; font-style: italic; }

        /* ИНТЕРФЕЙС */
        #hud { position: fixed; inset: 0; pointer-events: none; z-index: 1000; display: none; }
        #quest-status { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); color: white; padding: 10px; border-radius: 5px; font-size: 14px; border-left: 5px solid var(--gold); }

        /* УПРАВЛЕНИЕ */
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: var(--wood); border-radius: 50%; border: 2px solid white; }
        #btns { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px; pointer-events: auto; }
        .btn { width: 80px; height: 80px; background: var(--wood); border: 3px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; text-shadow: 1px 1px 2px black; }
        #act-btn { display: none; background: #2ecc71; animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #menu { position: fixed; inset: 0; background: linear-gradient(#4a90e2, #222); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .m-btn { width: 250px; padding: 20px; background: var(--wood); border: 2px solid white; border-radius: 10px; color: white; font-weight: bold; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="font-size: 45px; margin-bottom: 10px;">ВРЕМЯ КОВЧЕГА</h1>
    <p style="margin-bottom: 30px;">"Верою Ной... приготовил ковчег для спасения дома своего"</p>
    <button class="m-btn" onclick="startGame()">ВОЙТИ В ИСТОРИЮ</button>
</div>

<div id="dialog-box" onclick="closeDialog()">
    <div id="dialog-name">Персонаж</div>
    <div id="dialog-text">...</div>
    <div style="font-size: 10px; margin-top: 10px; color: #666; text-align: center;">(нажми на свиток, чтобы продолжить)</div>
</div>

<div id="hud">
    <div id="quest-status">Миссия: Поговори с семьей</div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="btns">
        <div id="act-btn" class="btn" onclick="handleAction()">ОТВЕТИТЬ</div>
        <div class="btn" onclick="jump()">ПРЫЖОК</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');

let w, h, active = false, camX = 0;
let player = { x: 100, y: 300, vx: 0, vy: 0, g: false, jumps: 0 };
let worldStep = 0; // 0: диалог с женой, 1: сбор дров, 2: животные

// Платформы (Скалы и Ковчег)
const platforms = [
    {x: 0, y: 550, w: 600, h: 100, color: "#4d3a24"},   // Начало
    {x: 700, y: 450, w: 200, h: 30, color: "#5d4037"},
    {x: 1000, y: 350, w: 200, h: 30, color: "#5d4037"},
    {x: 1300, y: 250, w: 250, h: 30, color: "#5d4037"},
    {x: 1600, y: 400, w: 800, h: 200, color: "#3e2723"}  // Место стройки Ковчега
];

const npc = {
    wife: {x: 350, y: 490, name: "Жена Ноя", text: "Небо темнеет, Ной. Нужно скорее достроить верхнюю палубу! Собери дерево на скалах."},
    son: {x: 1800, y: 340, name: "Сим", text: "Отец, животные уже на подходе. Помоги им подняться по платформам!"}
};

function startGame() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    document.getElementById('menu').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    active = true;
    resize();
    requestAnimationFrame(loop);
}

function resize() {
    w = cvs.width = window.innerWidth;
    h = cvs.height = window.innerHeight;
}
window.addEventListener('resize', resize);

// Управление
let joyId = null;
const jBase = document.getElementById('joy-base');
const jStick = document.getElementById('joy-stick');

jBase.addEventListener('touchstart', e => { joyId = e.changedTouches[0].identifier; }, {passive: false});
window.addEventListener('touchmove', e => {
    if (joyId === null) return;
    let t = Array.from(e.touches).find(i => i.identifier === joyId);
    if (!t) return;
    let r = jBase.getBoundingClientRect();
    let move = Math.max(-40, Math.min(40, t.clientX - (r.left + 50)));
    jStick.style.transform = `translateX(${move}px)`;
    player.vx = (move / 40) * 8;
}, {passive: false});
window.addEventListener('touchend', () => { jStick.style.transform = 'translateX(0)'; player.vx = 0; joyId = null; });

function jump() {
    if(player.g) { player.vy = -16; player.g = false; player.jumps = 1; }
    else if(player.jumps < 2) { player.vy = -14; player.jumps = 2; }
}

function handleAction() {
    if(Math.abs(player.x - npc.wife.x) < 100) {
        showDialog(npc.wife.name, npc.wife.text);
        document.getElementById('quest-status').innerText = "Миссия: Пройди паркур до Сима";
    }
    if(Math.abs(player.x - npc.son.x) < 100) {
        showDialog(npc.son.name, npc.son.text);
        document.getElementById('quest-status').innerText = "Миссия: Ковчег почти готов!";
    }
}

function showDialog(name, text) {
    document.getElementById('dialog-name').innerText = name;
    document.getElementById('dialog-text').innerText = text;
    document.getElementById('dialog-box').style.display = 'block';
}
function closeDialog() { document.getElementById('dialog-box').style.display = 'none'; }

function loop() {
    if(!active) return;

    player.vy += 0.8; player.x += player.vx; player.y += player.vy;
    player.g = false;

    platforms.forEach(p => {
        if(player.x + 30 > p.x && player.x < p.x + p.w && player.y + 60 > p.y && player.y + 60 < p.y + p.h && player.vy >= 0) {
            player.y = p.y - 60; player.vy = 0; player.g = true; player.jumps = 0;
        }
    });

    if(player.y > h + 100) { player.x = 100; player.y = 300; player.vy = 0; }
    camX += (player.x - w/2 - camX) * 0.1;

    // ГРАФИКА
    ctx.fillStyle = "#4a90e2"; ctx.fillRect(0,0,w,h); // Небо
    
    ctx.save();
    ctx.translate(-camX, 0);

    // Платформы
    platforms.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // NPC (Семья)
    ctx.fillStyle = "#e67e22"; ctx.fillRect(npc.wife.x, npc.wife.y, 30, 60); // Жена
    ctx.fillStyle = "#3498db"; ctx.fillRect(npc.son.x, npc.son.y, 30, 60);  // Сим

    // Игрок (Ной)
    ctx.fillStyle = "#8b4513"; 
    ctx.fillRect(player.x, player.y, 35, 60);
    ctx.fillStyle = "#ffdbac"; ctx.fillRect(player.x+5, player.y-15, 25, 25); // Голова
    ctx.fillStyle = "white"; ctx.fillRect(player.x+5, player.y-5, 25, 15); // Борода

    ctx.restore();

    let near = (Math.abs(player.x - npc.wife.x) < 100) || (Math.abs(player.x - npc.son.x) < 100);
    document.getElementById('act-btn').style.display = near ? 'flex' : 'none';

    requestAnimationFrame(loop);
}
</script>
</body>
</html>
