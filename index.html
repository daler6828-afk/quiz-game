<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixed Physics Platformer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: sans-serif; }
        canvas { display: block; background: #111; }
        .controls {
            position: absolute; bottom: 30px; width: 100%;
            display: flex; justify-content: space-around; pointer-events: none;
        }
        .btn {
            width: 75px; height: 75px; background: rgba(255,255,255,0.1);
            border: 2px solid #00ffcc; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: #00ffcc; font-size: 35px; pointer-events: auto;
            touch-action: manipulation; user-select: none;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }
        .btn:active { background: rgba(0, 255, 204, 0.4); transform: scale(0.9); }
    </style>
</head>
<body>

<canvas id="game"></canvas>

<div class="controls">
    <div style="display: flex; gap: 15px;">
        <div class="btn" id="btnLeft">←</div>
        <div class="btn" id="btnRight">→</div>
    </div>
    <div class="btn" id="btnJump">↑</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const player = {
    x: 100,
    y: 50,
    w: 40,
    h: 40,
    dy: 0,
    speed: 5,
    jump: 14,
    grounded: false
};

const move = { left: false, right: false, up: false };

// Исправленная привязка кнопок
function bind(id, action) {
    const el = document.getElementById(id);
    const set = (val) => (e) => { e.preventDefault(); move[action] = val; };
    el.onmousedown = el.ontouchstart = set(true);
    el.onmouseup = el.onmouseleave = el.ontouchend = set(false);
}

bind('btnLeft', 'left');
bind('btnRight', 'right');
bind('btnJump', 'up');

// Платформы (добавил побольше, чтобы было где прыгать)
const platforms = [
    { x: 0, y: canvas.height - 60, w: canvas.width, h: 60 },
    { x: 150, y: canvas.height - 200, w: 200, h: 25 },
    { x: 450, y: canvas.height - 350, w: 200, h: 25 },
    { x: 100, y: canvas.height - 500, w: 150, h: 25 }
];

function update() {
    // Движение
    if (move.left) player.x -= player.speed;
    if (move.right) player.x += player.speed;

    // Прыжок
    if (move.up && player.grounded) {
        player.dy = -player.jump;
        player.grounded = false;
    }

    // Гравитация
    player.dy += 0.7;
    player.y += player.dy;

    // Сброс состояния земли
    player.grounded = false;

    // ПРОВЕРКА КОЛЛИЗИЙ (Исправлено!)
    for (let p of platforms) {
        if (player.x < p.x + p.w &&
            player.x + player.w > p.x &&
            player.y < p.y + p.h &&
            player.y + player.h > p.y) {
            
            // Если игрок падает сверху
            if (player.dy > 0 && player.y + player.h - player.dy <= p.y + 5) {
                player.dy = 0;
                player.y = p.y - player.h;
                player.grounded = true;
            }
        }
    }

    // Границы экрана
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > canvas.width) player.x = canvas.width - player.w;
    
    // Респаун если все-таки выпал
    if (player.y > canvas.height) {
        player.x = 100;
        player.y = 50;
        player.dy = 0;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Отрисовка платформ
    ctx.fillStyle = '#333';
    ctx.strokeStyle = '#00ffcc';
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // Отрисовка игрока
    ctx.fillStyle = '#ff0055';
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ff0055';
    ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.shadowBlur = 0;

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
