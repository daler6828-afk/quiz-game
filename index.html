<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Drone Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: sans-serif; touch-action: none; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .joystick-zone { position: absolute; bottom: 20px; width: 45%; height: 220px; pointer-events: auto; }
        #left-zone { left: 0; }
        #right-zone { right: 0; }
        .controls { position: absolute; top: 10px; right: 10px; display: flex; gap: 10px; pointer-events: auto; }
        .btn-ui { padding: 12px; background: rgba(0,0,0,0.6); color: white; border: 1px solid #fff; border-radius: 5px; font-size: 12px; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; color: white; }
        #start-btn { padding: 20px 40px; font-size: 20px; background: #e74c3c; border: none; color: white; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">ПОЛЕТЕЛИ!</button>
    </div>

    <div id="ui-layer">
        <div class="controls">
            <button class="btn-ui" id="cam-btn">CAM: 3RD</button>
            <button class="btn-ui" id="mode-btn">MODE: STAB</button>
        </div>
        <div id="left-zone" class="joystick-zone"></div>
        <div id="right-zone" class="joystick-zone"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        let scene, camera, renderer, drone;
        let isFirstPerson = false;
        let isAcroMode = false; // FPV режим
        let moveInput = { throttle: 0, yaw: 0, pitch: 0, roll: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.Fog(0x87ceeb, 20, 150);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            // Ландшафт
            const groundGeo = new THREE.PlaneGeometry(200, 200, 40, 40);
            const posAttr = groundGeo.attributes.position;
            for (let i = 0; i < posAttr.count; i++) {
                let x = posAttr.getX(i);
                let y = posAttr.getY(i);
                posAttr.setZ(i, Math.sin(x/5) * Math.cos(y/5) * 2); // Холмы
            }
            groundGeo.computeVertexNormals();
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, wireframe: false });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            // Дрон
            drone = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.4), new THREE.MeshStandardMaterial({color: 0x222}));
            drone.add(body);
            
            // "Глаза" дрона (чтобы понимать где перед)
            const eyes = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.1), new THREE.MeshStandardMaterial({color: 0x00ffff}));
            eyes.position.z = -0.2;
            drone.add(eyes);

            scene.add(drone);
            drone.position.y = 5;

            setupJoysticks();
            setupButtons();
            animate();
        }

        function setupButtons() {
            document.getElementById('cam-btn').onclick = (e) => {
                isFirstPerson = !isFirstPerson;
                e.target.innerText = isFirstPerson ? "CAM: 1ST" : "CAM: 3RD";
            };
            document.getElementById('mode-btn').onclick = (e) => {
                isAcroMode = !isAcroMode;
                e.target.innerText = isAcroMode ? "MODE: ACRO" : "MODE: STAB";
            };
        }

        function setupJoysticks() {
            const left = nipplejs.create({ zone: document.getElementById('left-zone'), mode: 'static', position: {left: '50%', bottom: '50%'}, color: 'white' });
            left.on('move', (e, data) => {
                moveInput.throttle = data.vector.y;
                moveInput.yaw = -data.vector.x;
            });
            left.on('end', () => { moveInput.throttle = 0; moveInput.yaw = 0; });

            const right = nipplejs.create({ zone: document.getElementById('right-zone'), mode: 'static', position: {left: '50%', bottom: '50%'}, color: 'white' });
            right.on('move', (e, data) => {
                moveInput.pitch = data.vector.y;
                moveInput.roll = -data.vector.x;
            });
            right.on('end', () => { moveInput.pitch = 0; moveInput.roll = 0; });
        }

        function animate() {
            requestAnimationFrame(animate);

            const speed = 0.2;
            const sensitivity = 0.05;

            // Физика полета
            if (isAcroMode) {
                // В ACRO дрон просто вращается и летит туда, куда направлен газ
                drone.rotation.x += moveInput.pitch * sensitivity;
                drone.rotation.z += moveInput.roll * sensitivity;
            } else {
                // В STAB (обычный) дрон наклоняется и возвращается
                drone.rotation.x = THREE.MathUtils.lerp(drone.rotation.x, moveInput.pitch * 0.6, 0.1);
                drone.rotation.z = THREE.MathUtils.lerp(drone.rotation.z, moveInput.roll * 0.6, 0.1);
            }
            
            drone.rotation.y += moveInput.yaw * 0.04;

            // Тяга (всегда вверх относительно дрона)
            const thrust = new THREE.Vector3(0, moveInput.throttle * speed, 0);
            thrust.applyQuaternion(drone.quaternion);
            drone.position.add(thrust);

            // Гравитация (чуть-чуть тянет вниз)
            drone.position.y -= 0.02;
            if(drone.position.y < 0.5) drone.position.y = 0.5;

            // Камера
            if (isFirstPerson) {
                camera.position.copy(drone.position);
                camera.quaternion.copy(drone.quaternion);
                camera.translateZ(-0.1); // Сдвиг чуть вперед от центра дрона
            } else {
                const offset = new THREE.Vector3(0, 1.5, 5).applyMatrix4(drone.matrixWorld);
                camera.position.lerp(offset, 0.1);
                camera.lookAt(drone.position);
            }

            renderer.render(scene, camera);
        }

        document.getElementById('start-btn').onclick = () => {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            document.getElementById('overlay').style.display = 'none';
            init();
        };
    </script>
</body>
</html>
