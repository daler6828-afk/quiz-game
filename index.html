<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Mobile Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }

        #menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 2000;
        }
        .btn-play { 
            padding: 20px 50px; font-size: 28px; background: #2d9e2d; color: white; 
            border: 4px solid #1a5e1a; border-radius: 10px; cursor: pointer;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            border: 2px solid white; transform: translate(-50%, -50%);
            pointer-events: none; mix-blend-mode: difference; z-index: 50;
        }

        /* Кнопки справа */
        .controls-right {
            position: absolute; bottom: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 100;
        }
        .btn-game {
            width: 75px; height: 75px; background: rgba(0,0,0,0.6);
            border: 3px solid white; border-radius: 15px; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; user-select: none; font-size: 12px;
        }
        #place-btn { background: rgba(45, 158, 45, 0.7); }
        #break-btn { background: rgba(158, 45, 45, 0.7); }
        #jump-btn { background: rgba(100, 100, 100, 0.7); }

        /* Джойстик слева */
        #move-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 130px; height: 130px; background: rgba(255,255,255,0.1);
            border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); z-index: 100;
        }
        #move-stick {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%);
        }

        #hotbar {
            position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 5px; background: rgba(0,0,0,0.8); padding: 5px; border-radius: 8px; z-index: 100;
        }
        .slot {
            width: 40px; height: 40px; border: 2px solid #555; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; color: white; font-size: 7px;
        }
        .slot.active { border-color: #00ff00; background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div id="menu-overlay">
    <h1 style="color: white; font-size: 36px; margin-bottom: 20px;">MINECRAFT MOBILE</h1>
    <button class="btn-play" onclick="startGame()">ИГРАТЬ</button>
</div>

<div id="crosshair"></div>
<div id="move-zone"><div id="move-stick"></div></div>

<div class="controls-right">
    <div id="place-btn" class="btn-game">СТАВИТЬ</div>
    <div id="break-btn" class="btn-game">ЛОМАТЬ</div>
    <div id="jump-btn" class="btn-game">ПРЫЖОК</div>
</div>

<div id="hotbar">
    <div class="slot active" data-color="0x2d9e2d">ТРАВА</div>
    <div class="slot" data-color="0x7a7a7a">КАМЕНЬ</div>
    <div class="slot" data-color="0x5c4033">ЗЕМЛЯ</div>
    <div class="slot" data-color="0x8B4513">ДУБ</div>
    <div class="slot" data-color="0x228B22">ЛИСТЬЯ</div>
    <div class="slot" data-color="0xB22222">КИРПИЧ</div>
    <div class="slot" data-color="0xe6c300">ЗОЛОТО</div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 15, 60);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.9));
    const sun = new THREE.DirectionalLight(0xffffff, 0.5);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    const player = new THREE.Group();
    player.position.set(0, 5, 0);
    scene.add(player);
    player.add(camera);

    const blocks = [];
    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const raycaster = new THREE.Raycaster();

    function addBlock(x, y, z, color) {
        const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ color: parseInt(color) }));
        mesh.position.set(Math.round(x), Math.round(y), Math.round(z));
        
        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
        mesh.add(line);

        scene.add(mesh);
        blocks.push(mesh);
        return mesh;
    }

    // Генерация мира
    for(let x = -8; x <= 8; x++) {
        for(let z = -8; z <= 8; z++) {
            addBlock(x, 0, z, 0x2d9e2d);
            if (Math.random() > 0.97 && (Math.abs(x) > 3 || Math.abs(z) > 3)) {
                for(let h = 1; h <= 3; h++) addBlock(x, h, z, 0x8B4513);
                for(let lx = -1; lx <= 1; lx++) {
                    for(let lz = -1; lz <= 1; lz++) addBlock(x+lx, 4, z+lz, 0x228B22);
                }
            }
        }
    }

    let moveX = 0, moveZ = 0, lookYaw = 0, lookPitch = 0;
    let velY = 0, jumping = false, selectedColor = "0x2d9e2d";
    let lastX = 0, lastY = 0;

    window.startGame = () => {
        document.getElementById('menu-overlay').style.display = 'none';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    };

    // --- Кнопка СТАВИТЬ ---
    document.getElementById('place-btn').addEventListener('touchstart', (e) => {
        e.preventDefault(); e.stopPropagation();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        const hits = raycaster.intersectObjects(blocks);
        if (hits.length > 0) {
            const hit = hits[0];
            const p = hit.object.position.clone().add(hit.face.normal);
            addBlock(p.x, p.y, p.z, selectedColor);
        }
    });

    // --- Кнопка ЛОМАТЬ ---
    document.getElementById('break-btn').addEventListener('touchstart', (e) => {
        e.preventDefault(); e.stopPropagation();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        const hits = raycaster.intersectObjects(blocks);
        if (hits.length > 0) {
            const obj = hits[0].object;
            if (obj.position.y !== 0) { // Не ломать землю
                scene.remove(obj);
                blocks.splice(blocks.indexOf(obj), 1);
            }
        }
    });

    // --- Кнопка ПРЫЖОК ---
    document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
        e.preventDefault(); e.stopPropagation();
        if (!jumping) { velY = 0.12; jumping = true; }
    });

    // Хотбар
    document.querySelectorAll('.slot').forEach(s => {
        s.addEventListener('touchstart', (e) => {
            e.preventDefault(); e.stopPropagation();
            document.querySelectorAll('.slot').forEach(x => x.classList.remove('active'));
            s.classList.add('active');
            selectedColor = s.dataset.color;
        });
    });

    // Управление камерой и джойстик
    window.addEventListener('touchstart', (e) => {
        const t = e.touches[e.touches.length-1];
        if (t.clientX > window.innerWidth / 2) {
            lastX = t.clientX; lastY = t.clientY;
        }
    });

    window.addEventListener('touchmove', (e) => {
        for (let t of e.touches) {
            if (t.clientX < window.innerWidth / 2) {
                // Левая сторона: Джойстик
                const rect = document.getElementById('move-zone').getBoundingClientRect();
                const dx = t.clientX - (rect.left + rect.width/2);
                const dy = t.clientY - (rect.top + rect.height/2);
                const d = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                const a = Math.atan2(dy, dx);
                document.getElementById('move-stick').style.transform = `translate(calc(-50% + ${Math.cos(a)*d}px), calc(-50% + ${Math.sin(a)*d}px))`;
                moveX = Math.cos(a) * (d/50); moveZ = -Math.sin(a) * (d/50);
            } else {
                // Правая сторона: Обзор (если не на кнопке)
                if (t.target.className.indexOf('btn-game') === -1) {
                    if (lastX !== 0) {
                        lookYaw -= (t.clientX - lastX) * 0.007;
                        lookPitch -= (t.clientY - lastY) * 0.007;
                        lookPitch = Math.max(-1.5, Math.min(1.5, lookPitch));
                    }
                    lastX = t.clientX; lastY = t.clientY;
                }
            }
        }
    });

    window.addEventListener('touchend', (e) => {
        if (e.touches.length === 0) {
            moveX = 0; moveZ = 0; lastX = 0;
            document.getElementById('move-stick').style.transform = 'translate(-50%, -50%)';
        }
    });

    function update() {
        requestAnimationFrame(update);
        player.rotation.y = lookYaw;
        camera.rotation.x = lookPitch;
        player.translateX(moveX * 0.12);
        player.translateZ(-moveZ * 0.12);

        // Физика
        player.position.y += velY;
        if (player.position.y > 2.2) velY -= 0.008;
        else { player.position.y = 2.2; velY = 0; jumping = false; }

        renderer.render(scene, camera);
    }
    update();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
