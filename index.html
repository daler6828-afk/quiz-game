<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>David's Journey RPG</title>
    <style>
        body {
            background: #2c241e;
            color: #f4e4bc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        #game-container {
            width: 800px;
            background: #3e352a;
            border: 5px solid #8b5a2b;
            padding: 20px;
            margin-top: 50px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #8b5a2b;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        #battle-screen {
            height: 300px;
            background: #5c4d3c;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-radius: 10px;
            position: relative;
        }

        .entity {
            text-align: center;
            transition: transform 0.2s;
        }

        .sprite {
            font-size: 80px;
            display: block;
        }

        .hp-bar {
            width: 100px;
            height: 10px;
            background: #ff4d4d;
            border: 1px solid #000;
            margin: 10px auto;
        }

        .hp-fill {
            height: 100%;
            background: #2ecc71;
            width: 100%;
            transition: width 0.3s;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            background: #8b5a2b;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 3px solid #5d3a1c;
        }

        button:hover { background: #a06a3a; }
        button:active { border-bottom: none; transform: translateY(3px); }

        #log {
            height: 100px;
            overflow-y: auto;
            background: #1a1510;
            padding: 10px;
            margin-top: 20px;
            font-size: 14px;
            border: 1px inset #8b5a2b;
        }

        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            50% { transform: translate(-1px, 2px) rotate(1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-bar">
        <span>Герой: <b>Давид</b></span>
        <span>Уровень: <span id="lvl">1</span></span>
        <span>Опыт: <span id="exp">0</span>/100</span>
    </div>

    <div id="battle-screen">
        <div class="entity" id="player-unit">
            <span class="sprite">👤</span>
            <div class="hp-bar"><div id="player-hp" class="hp-fill"></div></div>
            <span>Давид</span>
        </div>

        <div class="entity" id="enemy-unit">
            <span id="enemy-sprite" class="sprite">🦁</span>
            <div class="hp-bar"><div id="enemy-hp" class="hp-fill"></div></div>
            <span id="enemy-name">Дикий лев</span>
        </div>
    </div>

    <div class="controls">
        <button onclick="attack('sling')">🪨 Праща (Точность)</button>
        <button onclick="attack('staff')">🦯 Посох (Сила)</button>
        <button onclick="heal()">📜 Молитва (Лечение)</button>
    </div>

    <div id="log">Добро пожаловать в Иудейскую пустыню. Береги овец от хищников!</div>
</div>

<script>
    let player = { hp: 100, maxHp: 100, dmg: 15, exp: 0, lvl: 1 };
    let enemy = { hp: 50, maxHp: 50, dmg: 10, name: "Дикий лев" };

    function log(msg) {
        const logDiv = document.getElementById('log');
        logDiv.innerHTML += `<div>${msg}</div>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function updateBars() {
        document.getElementById('player-hp').style.width = (player.hp / player.maxHp * 100) + "%";
        document.getElementById('enemy-hp').style.width = (enemy.hp / enemy.maxHp * 100) + "%";
        document.getElementById('exp').innerText = player.exp;
        document.getElementById('lvl').innerText = player.lvl;
    }

    function enemyAttack() {
        if (enemy.hp <= 0) return;
        
        let damage = Math.floor(Math.random() * enemy.dmg) + 5;
        player.hp -= damage;
        document.getElementById('player-unit').classList.add('shake');
        setTimeout(() => document.getElementById('player-unit').classList.remove('shake'), 500);
        
        log(`🦁 ${enemy.name} наносит вам ${damage} урона!`);
        
        if (player.hp <= 0) {
            log("💀 Вы пали в бою... Игра окончена.");
            player.hp = 0;
            disableButtons();
        }
        updateBars();
    }

    function attack(type) {
        let damage = type === 'sling' ? 
            Math.floor(Math.random() * 25) : 
            Math.floor(Math.random() * 15) + 5;

        enemy.hp -= damage;
        document.getElementById('enemy-unit').classList.add('shake');
        setTimeout(() => document.getElementById('enemy-unit').classList.remove('shake'), 500);
        
        log(`⚔️ Вы использовали ${type === 'sling' ? 'пращу' : 'посох'} и нанесли ${damage} урона!`);

        if (enemy.hp <= 0) {
            enemy.hp = 0;
            log(`🏆 ${enemy.name} побежден! +50 опыта.`);
            gainExp(50);
            setTimeout(nextEnemy, 1500);
        } else {
            setTimeout(enemyAttack, 800);
        }
        updateBars();
    }

    function heal() {
        let healAmt = 20;
        player.hp = Math.min(player.maxHp, player.hp + healAmt);
        log("✨ Молитва восстановила вам 20 ОЗ.");
        updateBars();
        setTimeout(enemyAttack, 800);
    }

    function gainExp(amount) {
        player.exp += amount;
        if (player.exp >= 100) {
            player.lvl++;
            player.exp = 0;
            player.maxHp += 20;
            player.hp = player.maxHp;
            player.dmg += 5;
            log("🌟 УРОВЕНЬ ПОВЫШЕН! Вы стали сильнее.");
        }
    }

    function nextEnemy() {
        enemy.maxHp += 20;
        enemy.hp = enemy.maxHp;
        enemy.dmg += 3;
        
        // Рандомный выбор следующего врага
        const monsters = [
            {n: "Медведь", s: "🐻"},
            {n: "Филистимлянин", s: "⚔️"},
            {n: "Великан", s: "👹"}
        ];
        let pick = monsters[Math.floor(Math.random() * monsters.length)];
        enemy.name = pick.n;
        document.getElementById('enemy-sprite').innerText = pick.s;
        document.getElementById('enemy-name').innerText = pick.n;
        
        log(`⚠️ Появился новый враг: ${enemy.name}!`);
        updateBars();
    }

    function disableButtons() {
        const btns = document.querySelectorAll('button');
        btns.forEach(b => b.disabled = true);
    }
</script>

</body>
</html>
