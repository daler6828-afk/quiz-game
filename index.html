<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Mobile JS</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        /* Стили для левого джойстика (движение) */
        #move-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        #move-stick {
            position: absolute;
            top: 50%; left: 50%;
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        /* Кнопка прыжка */
        #jump-btn {
            position: absolute;
            bottom: 50px;
            right: 40px;
            width: 80px;
            height: 80px;
            background: rgba(0, 0, 0, 0.3);
            border: 3px solid #fff;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            user-select: none;
            z-index: 10;
        }

        #ui-info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui-info">Левый джойстик: Ходьба<br>Правая часть: Обзор</div>
<div id="move-zone"><div id="move-stick"></div></div>
<div id="jump-btn">UP</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    // --- Инициализация ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Свет
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));

    // Мир (земля из блоков)
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    const grassMat = new THREE.MeshStandardMaterial({ color: 0x55aa55 });
    for(let x = -15; x < 15; x++) {
        for(let z = -15; z < 15; z++) {
            const block = new THREE.Mesh(boxGeo, grassMat);
            block.position.set(x, 0, z);
            scene.add(block);
        }
    }

    // --- Переменные состояния ---
    const player = new THREE.Group();
    player.position.y = 2;
    scene.add(player);
    player.add(camera);

    let moveX = 0, moveZ = 0; // Для ходьбы
    let lookYaw = 0, lookPitch = 0; // Для поворота головы
    let velocityY = 0;
    let isJumping = false;

    // --- Управление обзором (Правая часть экрана) ---
    let lastTouchX = 0, lastTouchY = 0;
    
    window.addEventListener('touchstart', (e) => {
        // Запрос полного экрана при первом тапе
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        
        const touch = e.touches[0];
        if (touch.clientX > window.innerWidth / 2) {
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
        }
    });

    window.addEventListener('touchmove', (e) => {
        for (let i = 0; i < e.touches.length; i++) {
            const touch = e.touches[i];
            // Если палец в правой половине экрана — это вращение
            if (touch.clientX > window.innerWidth / 2) {
                const deltaX = touch.clientX - lastTouchX;
                const deltaY = touch.clientY - lastTouchY;
                
                lookYaw -= deltaX * 0.005;
                lookPitch -= deltaY * 0.005;
                lookPitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, lookPitch));
                
                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
            }
        }
    });

    // --- Управление движением (Левый джойстик) ---
    const moveZone = document.getElementById('move-zone');
    const moveStick = document.getElementById('move-stick');
    
    moveZone.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.targetTouches[0];
        const rect = moveZone.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 60);
        const angle = Math.atan2(dy, dx);

        moveStick.style.left = `calc(50% + ${Math.cos(angle) * dist}px)`;
        moveStick.style.top = `calc(50% + ${Math.sin(angle) * dist}px)`;

        moveZ = -Math.sin(angle) * (dist / 60);
        moveX = Math.cos(angle) * (dist / 60);
    });

    moveZone.addEventListener('touchend', () => {
        moveStick.style.left = '50%';
        moveStick.style.top = '50%';
        moveX = 0; moveZ = 0;
    });

    // Прыжок
    document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!isJumping) {
            velocityY = 0.15;
            isJumping = true;
        }
    });

    // --- Цикл игры ---
    function update() {
        requestAnimationFrame(update);

        // Вращение
        player.rotation.y = lookYaw;
        camera.rotation.x = lookPitch;

        // Движение относительно взгляда
        const speed = 0.1;
        player.translateX(moveX * speed);
        player.translateZ(-moveZ * speed);

        // Физика (прыжок и пол)
        player.position.y += velocityY;
        if (player.position.y > 2) {
            velocityY -= 0.008;
        } else {
            player.position.y = 2;
            velocityY = 0;
            isJumping = false;
        }

        renderer.render(scene, camera);
    }

    update();

    // Ресайз
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
