<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BOMBUZA: НОМЕР И НАЗВАНИЕ</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --tile: #334155; --font: 'Segoe UI', sans-serif; }
        .theme-space { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --tile: #334155; }
        .theme-cyberpunk { --bg: #0a0e17; --card: #141a29; --accent: #ff007f; --text: #fff; --tile: #1f293a; }
        .theme-matrix { --bg: #000; --card: #0d0d0d; --accent: #00ff41; --text: #00ff41; --tile: #1a1a1a; --font: 'Courier New', monospace; }
        .theme-glacier { --bg: #e0f2fe; --card: #ffffff; --accent: #0284c7; --text: #0c4a6e; --tile: #bae6fd; }
        .theme-vintage { --bg: #fdf6e3; --card: #eee8d5; --accent: #b58900; --text: #657b83; --tile: #dacfc0; }
        .theme-emerald { --bg: #064e3b; --card: #065f46; --accent: #34d399; --text: #ecfdf5; --tile: #064e3b; }

        body { font-family: var(--font); background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.5s; }
        .panel { background: var(--card); padding: 30px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); max-width: 900px; margin: 0 auto; }
        .setup-section { background: rgba(0,0,0,0.1); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--accent); }
        input, select { padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: inherit; font-size: 15px; }

        .scoreboard { display: flex; gap: 15px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
        .team-box { min-width: 140px; background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 4px solid transparent; transition: 0.4s; }
        .team-box.active { border-color: var(--accent); transform: scale(1.05); box-shadow: 0 0 15px var(--accent); }
        .score { font-size: 36px; font-weight: 900; color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; }
        .tile { aspect-ratio: 1/1; background: var(--tile); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.2s; position: relative; border-bottom: 4px solid rgba(0,0,0,0.2); }
        .tile:hover { background: var(--accent); color: #000; transform: translateY(-3px); }
        .tile.used { pointer-events: none; opacity: 0.1; background: #000 !important; }
        .tile.used::after { content: "❌"; position: absolute; font-size: 40px; color: #ef4444; inset: 0; display: flex; align-items: center; justify-content: center; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card); width: 90%; max-width: 550px; padding: 40px; border-radius: 35px; text-align: center; border: 3px solid var(--accent); }
        .btn { padding: 14px 28px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; margin: 8px; transition: 0.2s; }
        .btn-check { background: var(--accent); color: #000; width: 100%; }
        .btn-win { background: #22c55e; color: white; }
        .btn-lose { background: #ef4444; color: white; }
    </style>
</head>
<body class="theme-space" id="main-body">

<div class="panel" id="setup">
    <h2 style="text-align:center; margin-top:0; color:var(--accent)">BOMBUZA: НОМЕР-ОТВЕТ</h2>
    
    <div class="setup-section">
        <label>🎨 ВЫБЕРИ ТЕМУ</label>
        <select onchange="document.getElementById('main-body').className = this.value" style="width:100%; margin-top:10px">
            <option value="theme-space">🌌 Космос</option>
            <option value="theme-cyberpunk">💖 Киберпанк</option>
            <option value="theme-matrix">📟 Матрица</option>
            <option value="theme-glacier">❄️ Ледник</option>
            <option value="theme-vintage">📜 Винтаж</option>
            <option value="theme-emerald">🌲 Изумруд</option>
        </select>
    </div>

    <div class="setup-section">
        <label>⚙️ НАСТРОЙКИ</label>
        <input type="number" id="v-total" value="44" style="width: 100%; font-size: 24px; text-align: center; border: 2px solid var(--accent); margin-top:10px">
        <div class="setup-grid" style="margin-top:20px">
            <div class="group"><label>Команды</label><input type="text" id="v-teams" value="Команда 1, Команда 2"></div>
            <div class="group"><label>Очки+</label><input type="number" id="v-win" value="15"></div>
            <div class="group"><label>Бомба-</label><input type="number" id="v-bomb" value="20"></div>
        </div>
    </div>

    <button class="btn btn-check" onclick="init()">ИГРАТЬ</button>
</div>

<div id="game-ui" style="display:none">
    <div class="scoreboard" id="score-board"></div>
    <div class="grid" id="game-grid"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div id="m-icon" style="font-size:70px">❓</div>
        <h2 id="m-title" style="color:var(--accent)"></h2>
        <p id="m-text" style="font-size:28px; margin:20px 0; font-weight: bold;"></p>
        <button id="m-rev-btn" class="btn btn-check" onclick="show()">УЗНАТЬ ОТВЕТ</button>
        <div id="m-ans-box" style="display:none; background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; margin-bottom:15px">
            <b id="m-ans-text" style="font-size:24px; color:var(--accent)"></b>
        </div>
        <div id="m-ctrl" style="display:none">
            <button class="btn btn-win" onclick="fin(true)">ВЕРНО</button>
            <button class="btn btn-lose" onclick="fin(false)">НЕВЕРНО</button>
        </div>
        <button id="m-ok-btn" class="btn btn-check" style="display:none" onclick="nxt()">ДАЛЬШЕ</button>
    </div>
</div>

<script>
const list = [
    "О борьбе между Христом и сатаной в теч 7000 лет", "Пророчество Еноха", "Пророчество о потопе", "Пророчество Ноя о его потомках", "430 лет", "Пророчество Иакова", "Пророчество Иова", "40 лет странствования по пустыне", "Пророчество Моисея о Христе как пророке", "70 лет Вавилонского плена", "Великий пророческий истукан", "Четыре больших зверя", "Овен и козёл", "2300 вечеров и утр (лет)", "70 седьмин", "1260 дней (лет)", "1290 дней (лет)", "1335 дней (лет)", "Великое пророчество Иисуса Христа", "Пророч. ап. Павла о вел. отступл. в христ-ве", "Семь церквей", "Семь печатей", "Удержание ветров и окончание запечатления", "Семь труб", "Время Филадельф. Адвент. в симв. Ангела обл. в обл.", "Особое время, не измеряемое тростью ВНЗ", "1260 лет Библия во вретище", "Церковь Божья всех веков", "Время папского Рима", "Двурогий зверь - лжепротестантизм", "Время формирован. и запечатл. 144 000 искупл.", "Время трёхангельской вести", "Две жатвы", "Песнь Моисея и Агнца перед язвами", "Закрытие благодати", "Излитие семи посл. чаш (язв) гнева Б. на землю", "Два зверя и их участие в последней вел. борьбе", "Весть Иного Ангела. Посл. предупрежд. миру", "Наказание Вавилона", "Радость неба о правосудии над Вавилоном", "4 посл. вест. имени Хр. и 4 стадии раб. Иного Анг.", "Великая вечеря птиц", "1000-летнее царство и суд", "Город Новый Иерусалим - Жена невеста Агнца"
];

let g = { teams:[], scores:[], shields:[], cur:0, deck:[], w:15, b:20, extra:false };

function init() {
    g.teams = document.getElementById('v-teams').value.split(',').map(n => n.trim());
    g.scores = g.teams.map(() => 0);
    g.shields = g.teams.map(() => false);
    g.w = parseInt(document.getElementById('v-win').value);
    g.b = parseInt(document.getElementById('v-bomb').value);
    
    let limit = parseInt(document.getElementById('v-total').value);
    let deck = [];

    const addB = (id, type, icon, t, d) => {
        let n = parseInt(document.getElementById(id).value);
        for(let i=0; i<n; i++) if(deck.length < limit) deck.push({type, icon, t, d});
    };

    addB('c-b', 'b', '💣', 'БОМБА!', `Штраф ${g.b}`);
    addB('c-g', 'g', '💎', 'АЛМАЗ!', '+50 очков!');
    addB('c-r', 'r', '🚀', 'РАКЕТА!', 'Ходи еще раз!');
    addB('c-s', 's', '🛡️', 'ЩИТ!', 'Защита от бомбы!');

    let left = limit - deck.length;
    for(let i=0; i < left; i++) {
        let num = (i % 44) + 1;
        deck.push({type:'q', title:`ЦЕПЬ №${num}`, q: `Какая ${num} цепь?`, a: list[num-1]});
    }

    g.deck = deck.sort(() => Math.random() - 0.5);
    render();
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
}

function render() {
    const sb = document.getElementById('score-board');
    sb.innerHTML = g.teams.map((n, i) => `
        <div class="team-box ${i===g.cur ? 'active' : ''}">
            <div style="font-size:12px">${n} ${g.shields[i] ? '🛡️' : ''}</div>
            <div class="score">${g.scores[i]}</div>
        </div>
    `).join('');
    const grid = document.getElementById('game-grid');
    grid.innerHTML = g.deck.map((item, i) => `<div class="tile ${item.type==='used'?'used':''}" onclick="openT(${i})">${i+1}</div>`).join('');
}

function openT(idx) {
    const it = g.deck[idx];
    if(it.type === 'used') return;
    window.activeIdx = idx;
    const m = document.getElementById('modal');
    ['m-rev-btn', 'm-ans-box', 'm-ctrl', 'm-ok-btn'].forEach(id => document.getElementById(id).style.display = 'none');
    
    document.getElementById('m-icon').innerText = it.icon || '❓';
    document.getElementById('m-title').innerText = it.title || it.t;
    document.getElementById('m-text').innerText = it.q || it.d;

    if(it.type === 'q') {
        document.getElementById('m-rev-btn').style.display = 'block';
        document.getElementById('m-ans-text').innerText = it.a;
    } else {
        document.getElementById('m-ok-btn').style.display = 'block';
        apply(it);
    }
    m.style.display = 'flex';
}

function apply(it) {
    let c = g.cur;
    if(it.type === 'b') { if(g.shields[c]) g.shields[c] = false; else g.scores[c] -= g.b; }
    if(it.type === 'g') g.scores[c] += 50;
    if(it.type === 's') g.shields[c] = true;
    if(it.type === 'r') g.extra = true;
}

function show() {
    document.getElementById('m-rev-btn').style.display = 'none';
    document.getElementById('m-ans-box').style.display = 'block';
    document.getElementById('m-ctrl').style.display = 'flex';
}

function fin(win) {
    if(win) g.scores[g.cur] += g.w;
    nxt();
}

function nxt() {
    document.getElementById('modal').style.display = 'none';
    g.deck[window.activeIdx] = { type: 'used' };
    if(!g.extra) g.cur = (g.cur + 1) % g.teams.length;
    g.extra = false;
    render();
}
</script>
</body>
</html>
