<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ной: Миссия Спасения</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050a10; font-family: 'Arial', sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }

        /* Кнопка инвентаря */
        #inv-toggle { position: absolute; top: 20px; right: 20px; width: 60px; height: 60px; background: rgba(255,215,0,0.3); border: 2px solid #ffd700; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; pointer-events: auto; z-index: 200; }

        /* Инвентарь снизу (как на листочке) */
        #inv-panel { position: absolute; bottom: -120px; left: 50%; transform: translateX(-50%); width: 90%; height: 100px; background: rgba(30, 30, 30, 0.9); border: 4px solid #3e2723; border-radius: 15px 15px 0 0; display: flex; align-items: center; justify-content: space-around; padding: 10px; transition: bottom 0.4s; z-index: 150; pointer-events: auto; }
        .inv-panel-open { bottom: 0px !important; }
        .slot { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 2px dashed #666; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .slot.filled { border: 2px solid #ffd700; background: rgba(255,215,0,0.1); }

        /* Джойстик и кнопки */
        #joy-base { position: absolute; bottom: 120px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; }
        #joy-stick { position: absolute; width: 40px; height: 40px; background: #fff; border-radius: 50%; left: 30px; top: 30px; }
        #jump-btn { position: absolute; bottom: 120px; right: 40px; width: 90px; height: 90px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        #dialog { position: absolute; top: 100px; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(0,0,0,0.85); color: white; padding: 15px; border-radius: 10px; text-align: center; display: none; z-index: 100; border: 1px solid #ffd700; }
    </style>
</head>
<body>

<div id="inv-toggle" onclick="toggleInv()">🎒</div>
<div id="inv-panel">
    <div class="slot" id="s0"></div>
    <div class="slot" id="s1"></div>
    <div class="slot" id="s2"></div>
    <div class="slot" id="s3"></div>
</div>

<div id="dialog"></div>

<div id="joy-base"><div id="joy-stick"></div></div>
<div id="jump-btn">ПРЫЖОК</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let w, h, active = true, frame = 0;
let player = { x: 100, y: 0, vx: 0, vy: 0, w: 40, h: 65, ground: false, items: [] };
let cameraX = 0;
let waterLevel = 0; // Вода будет подниматься!

const itemsToCollect = [
    {x: 800, y: 0, id: '🪓', name: 'Топор', collected: false},
    {x: 1600, y: 0, id: '🪵', name: 'Древесина', collected: false},
    {x: 2300, y: 0, id: '🪄', name: 'Посох', collected: false}
];

let platforms = [];

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    player.y = h - 200;
    
    platforms = [
        {x: 0, y: h-80, w: 3000, h: 80, color: '#2e7d32'}, // Длинная земля
        {x: 500, y: h-220, w: 200, h: 20},
        {x: 900, y: h-350, w: 200, h: 20},
        {x: 1400, y: h-250, w: 300, h: 20},
        {x: 1800, y: h-400, w: 200, h: 20},
        {x: 2200, y: h-480, w: 250, h: 20}
    ];

    itemsToCollect[0].y = h - 260;
    itemsToCollect[1].y = h - 440;
    itemsToCollect[2].y = h - 520;
}

// УПРАВЛЕНИЕ
let joy = { id: null, x: 0, dx: 0 };
window.addEventListener('touchstart', e => {
    for(let t of e.changedTouches) {
        if(t.clientX < w/2 && joy.id === null) {
            joy.id = t.identifier; joy.x = t.clientX;
            document.getElementById('joy-base').style.display = 'block';
            document.getElementById('joy-base').style.left = (t.clientX - 50) + 'px';
            document.getElementById('joy-base').style.top = (t.clientY - 50) + 'px';
        } else if(t.clientX >= w/2) { jump(); }
    }
}, {passive: false});

window.addEventListener('touchmove', e => {
    for(let t of e.changedTouches) {
        if(t.identifier === joy.id) {
            joy.dx = Math.max(-1, Math.min(1, (t.clientX - joy.x) / 40));
            document.getElementById('joy-stick').style.transform = `translateX(${joy.dx * 25}px)`;
        }
    }
}, {passive: false});

window.addEventListener('touchend', e => {
    for(let t of e.changedTouches) if(t.identifier === joy.id) { joy.id = null; joy.dx = 0; document.getElementById('joy-base').style.display = 'none'; }
});

function jump() { if(player.ground) { player.vy = -18; player.ground = false; } }

function toggleInv() {
    document.getElementById('inv-panel').classList.toggle('inv-panel-open');
}

function showMsg(txt) {
    const d = document.getElementById('dialog');
    d.innerText = txt; d.style.display = 'block';
    setTimeout(() => d.style.display = 'none', 3000);
}

function update() {
    frame++;
    player.vx = joy.dx * 7;
    player.vy += 0.8;
    player.x += player.vx;
    player.y += player.vy;

    cameraX += (player.x - w/2 - cameraX) * 0.1;

    player.ground = false;
    platforms.forEach(p => {
        if(player.x+25 > p.x && player.x < p.x+p.w && player.y+player.h > p.y && player.y+player.h < p.y+20 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.ground = true;
        }
    });

    // Сбор предметов
    itemsToCollect.forEach(item => {
        if(!item.collected && Math.abs(player.x - item.x) < 40 && Math.abs(player.y - item.y) < 60) {
            item.collected = true;
            player.items.push(item.id);
            document.getElementById('s' + (player.items.length-1)).innerText = item.id;
            document.getElementById('s' + (player.items.length-1)).classList.add('filled');
            showMsg("Вы нашли: " + item.name);
        }
    });

    // Вода поднимается после сбора первого предмета
    if(player.items.length > 0) waterLevel += 0.2;
    if(player.y + player.h > h - waterLevel) {
        showMsg("Вода настигла вас! Попробуйте снова.");
        player.x = 100; waterLevel = 0; player.items = [];
        itemsToCollect.forEach(i => i.collected = false);
        for(let i=0; i<4; i++) { document.getElementById('s'+i).innerText = ''; document.getElementById('s'+i).classList.remove('filled'); }
    }
}

function draw() {
    ctx.clearRect(0,0,w,h);
    
    // Небо
    let sky = ctx.createLinearGradient(0,0,0,h);
    sky.addColorStop(0, '#0a1a2a'); sky.addColorStop(1, '#203a43');
    ctx.fillStyle = sky; ctx.fillRect(0,0,w,h);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Платформы
    platforms.forEach(p => {
        ctx.fillStyle = '#3e2723'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#2e7d32'; ctx.fillRect(p.x, p.y, p.w, 10);
    });

    // Предметы
    itemsToCollect.forEach(item => {
        if(!item.collected) {
            ctx.font = "30px Arial";
            ctx.fillText(item.id, item.x, item.y + Math.sin(frame/10)*10);
        }
    });

    // РИСУЕМ НОЯ (Персонаж)
    drawNoah(player.x + 20, player.y);

    ctx.restore();

    // ВОДА (Потоп)
    ctx.fillStyle = "rgba(0, 100, 255, 0.6)";
    ctx.fillRect(0, h - waterLevel, w, waterLevel);
    // Пена воды
    ctx.fillStyle = "white";
    ctx.fillRect(0, h - waterLevel, w, 2);
}

function drawNoah(x, y) {
    ctx.lineWidth = 3; ctx.lineCap = "round";
    let isMoving = Math.abs(joy.dx) > 0.1;
    let anim = Math.sin(frame/5) * 10;

    // Мантия (тело)
    ctx.fillStyle = "#5d4037";
    ctx.beginPath();
    ctx.moveTo(x-15, y+65); ctx.lineTo(x+15, y+65); ctx.lineTo(x, y+20);
    ctx.fill();

    // Голова и Борода
    ctx.strokeStyle = "white";
    ctx.beginPath(); ctx.arc(x, y+15, 10, 0, 7); ctx.stroke(); // Голова
    ctx.fillStyle = "white"; // Борода
    ctx.beginPath(); ctx.moveTo(x-6, y+18); ctx.lineTo(x+6, y+18); ctx.lineTo(x, y+35); ctx.fill();

    // Руки
    ctx.strokeStyle = "#e0ac69";
    let off = isMoving ? anim : 0;
    ctx.beginPath(); ctx.moveTo(x, y+25); ctx.lineTo(x-18, y+40+off); ctx.stroke(); // Левая
    ctx.beginPath(); ctx.moveTo(x, y+25); ctx.lineTo(x+18, y+40-off); ctx.stroke(); // Правая

    // Посох в руке (если собран)
    if(player.items.includes('🪄')) {
        ctx.strokeStyle = "gold"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(x+18, y+20-off); ctx.lineTo(x+18, y+60-off); ctx.stroke();
    }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

window.addEventListener('resize', init);
init();
showMsg("Собери Топор, Дерево и Посох, пока вода не поднялась!");
loop();
</script>
</body>
</html>
