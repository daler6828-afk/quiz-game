
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ark Survival: Fix Edition</title>
    <style>
        :root { --gold: #f1c40f; }
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; touch-action: none; user-select: none; }
        
        canvas { display: block; width: 100vw; height: 100vh; }

        /* ИНТЕРФЕЙС - Теперь он всегда поверх всего */
        #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10000; display: none; }

        #quest-msg { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); 
            background: rgba(0,0,0,0.8); color: white; padding: 12px 20px; border-radius: 20px; 
            border: 2px solid var(--gold); font-size: 14px; text-align: center; width: 80%; pointer-events: auto; }

        /* ДЖОЙСТИК - Закреплен жестко слева внизу */
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 110px; height: 110px; 
            background: rgba(255,255,255,0.15); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); 
            pointer-events: auto; backdrop-filter: blur(5px); }
        #joy-stick { position: absolute; top: 35px; left: 35px; width: 40px; height: 40px; 
            background: var(--gold); border-radius: 50%; box-shadow: 0 0 15px var(--gold); }

        /* КНОПКИ - Закреплены жестко справа внизу */
        #btns { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 20px; pointer-events: auto; }
        .btn { width: 85px; height: 85px; background: rgba(255,255,255,0.2); border: 3px solid white; 
            border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 14px; backdrop-filter: blur(5px); text-shadow: 1px 1px 2px black; }
        #act-btn { border-color: #2ecc71; color: #2ecc71; display: none; }

        /* МЕНЮ */
        #menu { position: fixed; inset: 0; background: #1a1a2e; z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .m-btn { width: 220px; padding: 18px; margin: 10px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 0 #b7950b; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="margin-bottom: 30px; text-shadow: 0 0 15px var(--gold);">ARK ADVENTURE</h1>
    <button class="m-btn" onclick="start()">ИГРАТЬ</button>
</div>

<div id="hud">
    <div id="quest-msg">Собери 3 камня у гор</div>
    
    <div id="joy-base">
        <div id="joy-stick"></div>
    </div>

    <div id="btns">
        <div id="act-btn" class="btn" onclick="handleAction()">ДЕЙСТВИЕ</div>
        <div class="btn" onclick="jump()">ПРЫЖОК</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');

let w, h, active = false, zoom = 1;
let wood = 0, stones = 0, apples = 0, hasAxe = false, hasPlan = false, hasNail = false;
let player = { x: 400, y: 0, vx: 0, vy: 0, g: false };

// Объекты мира
let worldStones = [{x: 1000}, {x: 1300}, {x: 1600}];
let worldApples = [{x: 2500}, {x: 2700}, {x: 2900}, {x: 3100}, {x: 3300}];
let trees = [{x: 3800, hp:3}, {x: 4300, hp:3}];
let arkX = 6000;

function resize() {
    w = cvs.width = window.innerWidth;
    h = cvs.height = window.innerHeight;
    // Масштаб игры: на маленьких экранах камера чуть дальше
    zoom = w < 600 ? w / 600 : 1; 
}
window.addEventListener('resize', resize);
resize();

function start() {
    // Вход в полный экран
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
    }
    document.getElementById('menu').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    active = true;
    requestAnimationFrame(loop);
}

// УПРАВЛЕНИЕ ДЖОЙСТИКОМ (Исправлено для Touch)
const jBase = document.getElementById('joy-base');
const jStick = document.getElementById('joy-stick');
let joyTouchId = null;

jBase.addEventListener('touchstart', (e) => {
    joyTouchId = e.changedTouches[0].identifier;
}, {passive: false});

window.addEventListener('touchmove', (e) => {
    if (joyTouchId === null) return;
    let touch = Array.from(e.touches).find(t => t.identifier === joyTouchId);
    if (!touch) return;

    let rect = jBase.getBoundingClientRect();
    let centerX = rect.left + rect.width / 2;
    let dx = touch.clientX - centerX;
    let move = Math.max(-40, Math.min(40, dx));
    
    jStick.style.transform = `translateX(${move}px)`;
    player.vx = (move / 40) * 8;
}, {passive: false});

window.addEventListener('touchend', (e) => {
    if (joyTouchId !== null) {
        jStick.style.transform = `translateX(0px)`;
        player.vx = 0;
        joyTouchId = null;
    }
});

function jump() { if(player.g) { player.vy = -16; player.g = false; } }

function handleAction() {
    // Сбор и проверка квестов
    worldStones.forEach(s => { if(!s.f && Math.abs(player.x - s.x) < 80) { s.f=1; stones++; }});
    if(stones >= 3 && Math.abs(player.x - 300) < 150) hasAxe = true;
    worldApples.forEach(a => { if(!a.f && Math.abs(player.x - a.x) < 80) { a.f=1; apples++; }});
    updateHUD();
}

function updateHUD() {
    let msg = "Собери 3 камня";
    if(stones >= 3 && !hasAxe) msg = "Иди в КУЗНИЦУ (x:300)";
    else if(hasAxe && apples < 5) msg = "Собери 5 яблок (x:2500)";
    else if(apples >= 5) msg = "Иди строить КОВЧЕГ (x:6000)";
    document.getElementById('quest-msg').innerText = "КВЕСТ: " + msg;
}

function loop() {
    if(!active) return;

    // Физика
    player.vy += 0.8; player.x += player.vx; player.y += player.vy;
    let groundLine = h - 80;
    if(player.y > groundLine - 60) { player.y = groundLine - 60; player.vy = 0; player.g = true; }

    // Отрисовка с учетом масштаба
    ctx.clearRect(0,0,w,h);
    ctx.save();
    ctx.scale(zoom, zoom);
    ctx.translate(-player.x + (w/2)/zoom, 0);

    // Фон (Небо)
    ctx.fillStyle = "#aaccff"; ctx.fillRect(player.x - w/zoom, 0, w*2/zoom, h/zoom);

    // Земля
    ctx.fillStyle = "#3d2b1f"; ctx.fillRect(player.x - w/zoom, h/zoom - 80, w*2/zoom, 80);

    // Кузница
    ctx.fillStyle = "#5d4037"; ctx.fillRect(250, h/zoom-230, 100, 150);

    // Камни и Яблоки
    worldStones.forEach(s => { if(!s.f) { ctx.fillStyle="gray"; ctx.beginPath(); ctx.arc(s.x, h/zoom-95, 15, 0, 7); ctx.fill(); }});
    worldApples.forEach(a => { if(!a.f) { ctx.fillStyle="red"; ctx.beginPath(); ctx.arc(a.x, h/zoom-100, 10, 0, 7); ctx.fill(); }});

    // Игрок
    ctx.fillStyle = "#e67e22"; ctx.fillRect(player.x, player.y, 40, 60);
    ctx.fillStyle = "#ffdbac"; ctx.beginPath(); ctx.arc(player.x+20, player.y-10, 15, 0, 7); ctx.fill();

    ctx.restore();

    // Кнопка Действие
    let near = stones < 3 && worldStones.some(s=>!s.f && Math.abs(player.x-s.x)<80);
    if(!near) near = stones >= 3 && !hasAxe && Math.abs(player.x - 300) < 150;
    if(!near) near = worldApples.some(a=>!a.f && Math.abs(player.x-a.x)<80);
    document.getElementById('act-btn').style.display = near ? 'flex' : 'none';

    requestAnimationFrame(loop);
}
</script>
</body>
</html>
