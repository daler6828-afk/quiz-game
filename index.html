<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библейская викторина</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #2b3a2b 0%, #1e2b1e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }
        .game-container {
            max-width: 700px;
            width: 100%;
            background: #fef7e0;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,245,215,0.6) 0%, transparent 30%);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.5), 0 0 0 2px #c9b27e inset, 0 0 0 6px #6b4f2f inset;
            padding: 24px 24px 32px;
            border: 2px solid #e4d5b6;
        }
        /* свиток-шапка */
        .header-scroll {
            background: #dac29c;
            border-radius: 60px 60px 30px 30px;
            padding: 18px 20px 12px;
            text-align: center;
            border-bottom: 6px solid #8b6f47;
            box-shadow: 0 8px 0 #5e3f28, inset 0 2px 8px #fff3d1;
            margin-bottom: 28px;
        }
        h1 {
            font-family: 'Times New Roman', serif;
            font-size: 2.3rem;
            font-weight: 700;
            color: #2b2216;
            text-shadow: 2px 2px 0 #bd9f6e, 4px 4px 0 #4a3a28;
            letter-spacing: 2px;
            word-break: break-word;
        }
        .subhead {
            font-size: 1.1rem;
            font-style: italic;
            color: #2b4a2b;
            background: #eedbbc;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            margin-top: 6px;
            border: 2px solid #b39863;
            font-weight: 500;
        }
        /* вопрос и прогресс */
        .question-panel {
            background: #e5d5b3;
            border-radius: 70px;
            padding: 20px 20px 14px;
            border: 4px solid #a58350;
            box-shadow: inset 0 2px 8px #aa8b55, 0 8px 0 #6a4f2b;
            margin-bottom: 28px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #3f3527;
            color: #ffefcf;
            border-radius: 50px;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 18px;
            border: 2px solid #cdb28b;
            box-shadow: inset 0 2px 5px #1f1a12;
        }
        .score {
            background: #e8b12c;
            color: #221c0f;
            padding: 5px 18px;
            border-radius: 30px;
            border: 2px solid #ffe5a3;
        }
        .question-text {
            font-size: 1.8rem;
            line-height: 1.2;
            font-weight: 600;
            color: #221e14;
            text-align: center;
            min-height: 4rem;
            padding: 6px 6px 12px;
            background: #fcf3da;
            border-radius: 50px 50px 30px 30px;
            border: 3px solid #b48d4e;
            box-shadow: inset 0 0 0 2px #f9eac1;
            margin-bottom: 8px;
            font-family: 'Georgia', serif;
        }
        /* варианты ответов — кнопки */
        .answers-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }
        .answer-btn {
            background: #f4e6cc;
            border: 4px solid #936e3e;
            color: #281f12;
            font-size: 1.4rem;
            font-weight: 600;
            padding: 16px 20px;
            border-radius: 60px;
            text-align: left;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 6px 0 #624a2c, 0 8px 12px rgba(0,0,0,0.3);
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .answer-btn:hover:not(:disabled) {
            background: #ffeac2;
            border-color: #b8803a;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #624a2c, 0 12px 18px rgba(0,0,0,0.3);
        }
        .answer-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #624a2c, 0 6px 12px rgba(0,0,0,0.2);
        }
        .answer-btn.disabled-true, .answer-btn:disabled {
            opacity: 0.7;
            filter: grayscale(0.6);
            cursor: not-allowed;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #624a2c, 0 4px 8px rgba(0,0,0,0.2);
        }
        .prefix {
            background: #5f4a2e;
            color: #f7e4be;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            border: 3px solid #fcd28c;
            box-shadow: inset 0 -2px 0 #32281b;
        }
        /* панель управления и сообщения */
        .footer-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #dbbd8d;
            border-radius: 40px;
            padding: 12px 18px;
            border: 3px solid #896f41;
            box-shadow: 0 5px 0 #614a2b, inset 0 2px 10px #f7e7c8;
        }
        .message-box {
            background: #1f2e1f;
            color: #eedbaa;
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 500;
            min-width: 170px;
            text-align: center;
            border: 2px solid #dba959;
            box-shadow: inset 0 0 8px #5c4b2b;
        }
        .next-btn {
            background: #c49a6c;
            border: none;
            border-bottom: 6px solid #6d492b;
            font-size: 1.8rem;
            font-weight: bold;
            color: #202010;
            padding: 10px 32px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 5px 0 #4f3a21, 0 6px 12px black;
            letter-spacing: 2px;
        }
        .next-btn:active {
            transform: translateY(4px);
            border-bottom-width: 2px;
            box-shadow: 0 2px 0 #4f3a21, 0 4px 8px black;
        }
        .next-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            transform: translateY(3px);
        }
        .restart-btn {
            background: #2f4630;
            border: 2px solid #bd9f60;
            color: #faf0cf;
            font-size: 1.3rem;
            border-radius: 50px;
            padding: 8px 18px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 0 #1e2b1e;
            transition: 0.1s;
        }
        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        @media (max-width: 500px) {
            h1 { font-size: 1.8rem; }
            .question-text { font-size: 1.4rem; }
            .answer-btn { font-size: 1.2rem; padding: 14px; }
            .prefix { width: 35px; height: 35px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header-scroll">
        <h1>📖 БИБЛЕЙСКИЙ КВИЗ</h1>
        <div class="subhead">Проверь знание Священного Писания</div>
    </div>

    <div class="question-panel">
        <div class="stats">
            <span>Вопрос <span id="current-q-num">1</span>/<span id="total-q-count">10</span></span>
            <span class="score" id="scoreDisplay">⚡ 0</span>
        </div>
        <div class="question-text" id="questionDisplay">Загрузка...</div>
    </div>

    <div id="answersContainer" class="answers-grid">
        <!-- генерируем кнопки через js -->
    </div>

    <div class="footer-controls">
        <div class="message-box" id="messageBox">🤔 Выбери ответ</div>
        <button class="restart-btn" id="restartBtn">🔄 Сначала</button>
        <button class="next-btn" id="nextBtn">➡️ Далее</button>
    </div>
</div>

<script>
    (function(){
        // ------------- БИБЛЕЙСКИЕ ВОПРОСЫ -------------
        const questions = [
            {
                question: "Кто построил ковчег, чтобы спастись от потопа?",
                answers: ["Авраам", "Ной", "Моисей", "Илия"],
                correct: 1
            },
            {
                question: "Сколько заповедей получил Моисей на горе Синай?",
                answers: ["5", "10", "12", "7"],
                correct: 1
            },
            {
                question: "Какой город рухнул от звука труб и крика народа?",
                answers: ["Содом", "Вавилон", "Иерихон", "Ниневия"],
                correct: 2
            },
            {
                question: "Кто предал Иисуса за 30 сребреников?",
                answers: ["Пётр", "Иоанн", "Иуда", "Фома"],
                correct: 2
            },
            {
                question: "Сколько дней и ночей лил дождь во время потопа?",
                answers: ["7", "20", "40", "90"],
                correct: 2
            },
            {
                question: "Кто был первым царём Израиля?",
                answers: ["Давид", "Саул", "Соломон", "Самуил"],
                correct: 1
            },
            {
                question: "Как звали великана, которого победил Давид?",
                answers: ["Голиаф", "Самсон", "Иаир", "Ог"],
                correct: 0
            },
            {
                question: "В какой книге Библии описано сотворение мира?",
                answers: ["Исход", "Псалтирь", "Бытие", "Откровение"],
                correct: 2
            },
            {
                question: "Кого Бог повелел принести в жертву, но заменил овном?",
                answers: ["Исаака", "Иакова", "Авеля", "Иосифа"],
                correct: 0
            },
            {
                question: "Как звали мать Иисуса Христа?",
                answers: ["Елисавета", "Марфа", "Мария", "Анна"],
                correct: 2
            }
        ];

        // ---------- состояние игры ----------
        let currentIndex = 0;               // 0-индекс текущего вопроса
        let score = 0;
        let isAnswered = false;             // отвечено ли на текущий вопрос
        let totalQuestions = questions.length;

        // DOM элементы
        const questionEl = document.getElementById('questionDisplay');
        const answersContainer = document.getElementById('answersContainer');
        const currentQNumSpan = document.getElementById('current-q-num');
        const totalQCountSpan = document.getElementById('total-q-count');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const messageBox = document.getElementById('messageBox');
        const nextBtn = document.getElementById('nextBtn');
        const restartBtn = document.getElementById('restartBtn');

        // инициализация счётчика всего вопросов
        totalQCountSpan.textContent = totalQuestions;

        // ---------- вспомогательные функции ----------
        function updateScoreAndNum() {
            scoreDisplay.textContent = `⚡ ${score}`;
            currentQNumSpan.textContent = currentIndex + 1;
        }

        // Очистить и создать кнопки ответов (все активны)
        function renderAnswers() {
            const q = questions[currentIndex];
            // создаём 4 кнопки с нуля
            answersContainer.innerHTML = '';
            const letters = ['А', 'Б', 'В', 'Г'];
            for (let i = 0; i < q.answers.length; i++) {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.dataset.index = i;
                btn.innerHTML = `<span class="prefix">${letters[i]}</span>${q.answers[i]}`;
                btn.disabled = false;
                btn.addEventListener('click', answerClickHandler);
                answersContainer.appendChild(btn);
            }
        }

        // обработчик клика на ответ
        function answerClickHandler(e) {
            if (isAnswered) return; // уже ответили

            const btn = e.currentTarget;
            const selectedIdx = parseInt(btn.dataset.index);
            const currentQ = questions[currentIndex];
            const correctIdx = currentQ.correct;

            // отмечаем, что ответили
            isAnswered = true;

            // деактивируем все кнопки
            const allBtns = document.querySelectorAll('.answer-btn');
            allBtns.forEach(b => b.disabled = true);

            // стилизуем правильный/неправильный
            allBtns.forEach((b, idx) => {
                if (idx === correctIdx) {
                    b.style.background = '#3d9e4d';  // зелёный
                    b.style.borderColor = '#e3c874';
                    b.style.color = 'white';
                    b.style.textShadow = '1px 1px 0 black';
                } else if (idx === selectedIdx && idx !== correctIdx) {
                    b.style.background = '#b03d3d';  // красный
                    b.style.borderColor = '#efa0a0';
                    b.style.color = 'white';
                    b.style.textShadow = '1px 1px 0 black';
                }
            });

            // увеличиваем счёт, если ответ правильный
            if (selectedIdx === correctIdx) {
                score++;
                messageBox.textContent = '✅ Верно! +1';
            } else {
                messageBox.textContent = `❌ Неверно. Правильно: ${currentQ.answers[correctIdx]}`;
            }

            updateScoreAndNum();
        }

        // загрузка текущего вопроса (без сброса счёта)
        function loadQuestion() {
            const q = questions[currentIndex];
            questionEl.textContent = q.question;
            renderAnswers();
            // сброс сообщения
            messageBox.textContent = isAnswered ? (messageBox.textContent.includes('Верно') ? '✅ Ещё вопрос?' : '❌ Идём дальше') : '🤔 Выбери ответ';
            // корректировка сообщения если isAnswered (например при переключении назад - не нужно, но next не даст)
            // но мы используем только вперёд, поэтому норм.
        }

        // переход к следующему вопросу (или финал)
        function goToNext() {
            // если ещё не отвечали — не пускать или просто сообщим (можно пусть нажимают, но не переключаем)
            if (!isAnswered) {
                messageBox.textContent = '⚠️ Сначала ответь!';
                return;
            }

            // если есть следующий вопрос
            if (currentIndex + 1 < totalQuestions) {
                currentIndex++;
                isAnswered = false;           // новый вопрос не отвечен
                loadQuestion();
                // восстановить стандартный цвет сообщения
                messageBox.textContent = '🤔 Выбери ответ';
                updateScoreAndNum();           // обновить номер
            } else {
                // игра окончена — показываем поздравление
                messageBox.textContent = '🏁 КОНЕЦ! Слава Богу!';
                // деактивируем все кнопки, если активны (на всякий случай)
                document.querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
                // можно заблокировать next (но он и так не переключит)
                nextBtn.disabled = true;       // больше некуда идти
                // дополнительное сообщение со счётом
                messageBox.innerHTML = `🎉 Итог: ${score}/${totalQuestions}`;
            }
        }

        // ПОЛНЫЙ СБРОС (рестарт)
        function restartGame() {
            currentIndex = 0;
            score = 0;
            isAnswered = false;
            nextBtn.disabled = false;   // разблокировать кнопку далее

            loadQuestion();              // отрисовка первого вопроса
            updateScoreAndNum();

            // сброс цветов кнопок (рендер сам создаст новые)
            messageBox.textContent = '🤔 Выбери ответ';

            // дополнительно убедиться, что кнопки не заблокированы (рендер создаст активные)
        }

        // ---------- установка слушателей ----------
        nextBtn.addEventListener('click', goToNext);
        restartBtn.addEventListener('click', restartGame);

        // старт игры
        restartGame();  // сразу устанавливает первый вопрос и счёт

        // блокировка next, если не ответили (но логика внутри goToNext не даст переключить, плюс для красоты можно менять стиль next?
        // но и так ок. Можно добавить визуальное изменение:
        // (по желанию) при ответе можно акцентировать, но необязательно.

        // дополнительно: обработка случая, когда нажали дальше, а потом захотели рестарт — всё сбросится.
    })();
</script>
</body>
</html>
