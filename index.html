<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Давид против Голиафа — Библейский кликер</title>
    <style>
        body {
            margin:0; padding:0; font-family:Arial,sans-serif; background:#1e3a5f; color:#fff;
            min-height:100vh; display:flex; flex-direction:column; align-items:center;
            touch-action:manipulation; user-select:none;
        }
        h1 { color:#ffd700; text-shadow:0 0 15px #ffd700; margin:20px 0; font-size:2.2rem; }
        #scene { font-size:1.4rem; margin:10px; text-align:center; min-height:80px; }
        #david { font-size:120px; cursor:pointer; margin:20px; transition:transform 0.1s; }
        #david:active { transform:scale(1.15); }
        #stats { font-size:1.5rem; margin:15px; }
        .upgrade {
            background:rgba(255,215,0,0.25); border:2px solid #ffd700; border-radius:12px;
            padding:15px; margin:12px; width:80%; max-width:400px; text-align:left;
            cursor:pointer; transition:all 0.2s;
        }
        .upgrade:hover { background:rgba(255,215,0,0.4); transform:translateY(-4px); }
        .upgrade.locked { opacity:0.5; pointer-events:none; background:rgba(100,100,100,0.3); }
        #progress { width:85%; max-width:500px; height:30px; background:#333; border-radius:15px; overflow:hidden; margin:20px 0; }
        #bar { height:100%; width:0%; background:linear-gradient(to right, #22c55e, #86efac); transition:width 0.4s; }
        #win { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); flex-direction:column; align-items:center; justify-content:center; color:#ffd700; font-size:2rem; z-index:100; }
        button { padding:12px 30px; font-size:1.3rem; margin:20px; background:#4a90e2; color:white; border:none; border-radius:10px; cursor:pointer; }
    </style>
</head>
<body>

<h1>🪨 Давид и Голиаф 🪨</h1>
<div id="scene">Тапай по Давиду — собирай камни для пращи!<br>Победи великана и стань царём!</div>

<div id="david">🧑‍🦰</div>

<div id="stats">
    Камни: <span id="stones">0</span><br>
    Вера в секунду: <span id="faithPerSec">0</span><br>
    Прогресс к победе: <span id="progressPct">0</span>%
</div>

<div id="progress"><div id="bar"></div></div>

<div id="upgrades"></div>

<div id="win">
    <div>ПОБЕДА!</div>
    <div style="font-size:1.6rem; margin:30px 0;">Ты поразил Голиафа!<br>Теперь ты — царь Давид!<br>«Господь — Пастырь мой...» 🪈</div>
    <button onclick="resetGame()">ИГРАТЬ СНОВА</button>
</div>

<script>
let stones = 0;
let faithPerSec = 0;
let progress = 0; // 0..100
let gameWon = false;

const upgrades = [
    { name: "Лучшие камни", cost: 15, increase: 0.2, desc: "+0.2 веры/сек", owned: 0 },
    { name: "Пастушья праща", cost: 60, increase: 1, desc: "+1 вера/сек", owned: 0 },
    { name: "Молитва псалма", cost: 200, increase: 4, desc: "+4 веры/сек", owned: 0 },
    { name: "Помазание Самуила", cost: 800, increase: 15, desc: "+15 веры/сек", owned: 0 },
    { name: "Победа над львом", cost: 2500, increase: 50, desc: "+50 веры/сек", owned: 0 },
    { name: "Царский венец", cost: 10000, increase: 200, desc: "+200 веры/сек (финал)", owned: 0 }
];

function updateDisplay() {
    document.getElementById('stones').textContent = Math.floor(stones);
    document.getElementById('faithPerSec').textContent = faithPerSec.toFixed(1);
    document.getElementById('progressPct').textContent = Math.floor(progress);
    document.getElementById('bar').style.width = progress + '%';

    if (progress >= 100 && !gameWon) {
        gameWon = true;
        document.getElementById('win').style.display = 'flex';
    }
}

function clickDavid() {
    if (gameWon) return;
    stones += 1 + faithPerSec * 0.1; // бонус от пассивок за клик
    progress += 0.4 + (faithPerSec * 0.05);
    updateDisplay();
}

function buyUpgrade(idx) {
    const up = upgrades[idx];
    if (stones >= up.cost && !up.owned) {
        stones -= up.cost;
        faithPerSec += up.increase;
        up.owned = 1;
        up.cost = Math.floor(up.cost * 3); // можно купить несколько раз, цена растёт
        renderUpgrades();
        updateDisplay();
    }
}

function renderUpgrades() {
    const div = document.getElementById('upgrades');
    div.innerHTML = '';
    upgrades.forEach((up, i) => {
        const el = document.createElement('div');
        el.className = 'upgrade' + (stones >= up.cost && !up.owned ? '' : ' locked');
        el.innerHTML = `<strong>\( {up.name}</strong><br> \){up.desc}<br>Цена: ${up.cost} камней<br>Куплено: ${up.owned ? 'Да' : 'Нет'}`;
        el.onclick = () => buyUpgrade(i);
        div.appendChild(el);
    });
}

function gameLoop() {
    if (!gameWon) {
        stones += faithPerSec / 10; // 10 тиков в секунду
        progress += faithPerSec / 200;
        updateDisplay();
    }
    setTimeout(gameLoop, 100);
}

function resetGame() {
    stones = 0;
    faithPerSec = 0;
    progress = 0;
    gameWon = false;
    upgrades.forEach(u => { u.owned = 0; u.cost = Math.floor(u.cost / 3) || 15; }); // сброс цен примерно
    document.getElementById('win').style.display = 'none';
    renderUpgrades();
    updateDisplay();
}

document.getElementById('david').onclick = clickDavid;
document.getElementById('david').addEventListener('touchstart', e => { e.preventDefault(); clickDavid(); });

renderUpgrades();
gameLoop();
</script>
</body>
</html>
