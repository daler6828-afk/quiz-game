<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ноев Ковчег: Следящая Камера</title>
    <style>
        :root { --wood: #5d4037; --gold: #f1c40f; }
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #hud { position: fixed; inset: 0; pointer-events: none; z-index: 1000; display: none; }
        #quest-box { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 20px; border: 2px solid var(--gold); font-size: 14px; text-align: center; width: 70%; }

        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); pointer-events: auto; }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 40px; height: 40px; background: var(--gold); border-radius: 50%; }

        #btns { position: absolute; bottom: 40px; right: 40px; display: flex; gap: 15px; pointer-events: auto; }
        .btn { width: 85px; height: 85px; background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; }
        
        #menu { position: fixed; inset: 0; background: #2c3e50; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .m-btn { width: 200px; padding: 20px; background: var(--gold); border: none; border-radius: 10px; font-weight: bold; font-size: 18px; color: #3e2723; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="text-align: center;">ИСПЫТАНИЕ НОЯ</h1>
    <button class="m-btn" onclick="start()">ИГРАТЬ</button>
</div>

<div id="hud">
    <div id="quest-box">Иди вправо и прыгай по скалам к Ковчегу!</div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="btns">
        <div class="btn" onclick="jump()">ПРЫЖОК</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');

let w, h, active = false;
let camX = 0, camY = 0; // Теперь следим и по Y
let player = { x: 100, y: 400, vx: 0, vy: 0, g: false, jumps: 0 };

// Платформы стали крупнее
const platforms = [
    {x: 0, y: 500, w: 500, h: 200},   
    {x: 600, y: 350, w: 200, h: 50},
    {x: 900, y: 200, w: 250, h: 50},
    {x: 1300, y: 300, w: 200, h: 50},
    {x: 1600, y: 150, w: 600, h: 400} // Ковчег
];

function start() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    document.getElementById('menu').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    active = true;
    resize();
    requestAnimationFrame(loop);
}

function resize() {
    w = cvs.width = window.innerWidth;
    h = cvs.height = window.innerHeight;
}
window.addEventListener('resize', resize);

// Управление джойстиком
let joyId = null;
const jBase = document.getElementById('joy-base');
const jStick = document.getElementById('joy-stick');

jBase.addEventListener('touchstart', e => { joyId = e.changedTouches[0].identifier; }, {passive: false});
window.addEventListener('touchmove', e => {
    if (joyId === null) return;
    let t = Array.from(e.touches).find(i => i.identifier === joyId);
    if (!t) return;
    let r = jBase.getBoundingClientRect();
    let dx = t.clientX - (r.left + 50);
    let move = Math.max(-40, Math.min(40, dx));
    jStick.style.transform = `translateX(${move}px)`;
    player.vx = (move / 40) * 7;
}, {passive: false});
window.addEventListener('touchend', () => { jStick.style.transform = 'translateX(0)'; player.vx = 0; joyId = null; });

function jump() {
    if(player.g) { player.vy = -15; player.g = false; player.jumps = 1; }
    else if(player.jumps < 2) { player.vy = -13; player.jumps = 2; }
}

function loop() {
    if(!active) return;

    // Физика
    player.vy += 0.7; 
    player.x += player.vx;
    player.y += player.vy;
    player.g = false;

    // Проверка столкновений
    platforms.forEach(p => {
        if(player.x + 30 > p.x && player.x < p.x + p.w &&
           player.y + 60 > p.y && player.y + 60 < p.y + p.h && player.vy >= 0) {
            player.y = p.y - 60;
            player.vy = 0;
            player.g = true;
            player.jumps = 0;
        }
    });

    // Респаун
    if(player.y > 1000) { player.x = 100; player.y = 400; player.vy = 0; }

    // УМНАЯ КАМЕРА: Плавно следит за Ноем по центру экрана
    let targetCamX = player.x - w / 2;
    let targetCamY = player.y - h / 2;
    camX += (targetCamX - camX) * 0.1;
    camY += (targetCamY - camY) * 0.1;

    // Отрисовка
    ctx.fillStyle = "#4a90e2"; // Небо
    ctx.fillRect(0, 0, w, h);
    
    ctx.save();
    ctx.translate(-camX, -camY); // Сдвигаем мир за камерой

    // Рисуем платформы
    platforms.forEach(p => {
        ctx.fillStyle = "#5d4037"; // Цвет дерева/земли
        ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // Ной
    ctx.fillStyle = "#8b4513"; ctx.fillRect(player.x, player.y, 35, 60); // Одежда
    ctx.fillStyle = "#ffdbac"; ctx.fillRect(player.x+5, player.y-15, 25, 25); // Лицо
    ctx.fillStyle = "white"; ctx.fillRect(player.x+5, player.y-5, 25, 15); // Борода

    ctx.restore();

    requestAnimationFrame(loop);
}
</script>
</body>
</html>
