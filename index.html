<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Голубь Ноя — Библейская игра</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000;
            touch-action: none;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        #joystick {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 130px;
            height: 130px;
            z-index: 100;
            opacity: 0.85;
        }
        #base {
            position: absolute;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.25);
            border: 6px solid rgba(255, 255, 255, 0.6);
        }
        #handle {
            position: absolute;
            width: 52px;
            height: 52px;
            top: 39px;
            left: 39px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        #score {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            z-index: 100;
            pointer-events: none;
        }
        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="joystick">
        <div id="base">
            <div id="handle"></div>
        </div>
    </div>
    <div id="score">Счёт: 0</div>

    <div id="startScreen">
        <h1 style="font-size: 42px; margin-bottom: 10px; color: #ffdd00;">🕊️ ГОЛУБЬ НОЯ 🕊️</h1>
        <p style="font-size: 22px; max-width: 80%; line-height: 1.4;">
            Библейская история!<br>
            Управляй голубем Ноя.<br>
            Собирай ветки оливы 🌿 — знак мира.<br>
            Избегай грозовых облаков ☁️
        </p>
        <p style="margin-top: 30px; font-size: 20px; color: #ffdd00;">
            На телефоне — джойстик слева<br>
            На ПК — стрелки или WASD
        </p>
        <button onclick="startGame()" 
                style="margin-top: 40px; padding: 15px 40px; font-size: 24px; background: #ffdd00; color: #000; border: none; border-radius: 12px; cursor: pointer;">
            НАЧАТЬ ИГРУ
        </button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let WIDTH = 0, HEIGHT = 0;

        function resize() {
            WIDTH = window.innerWidth;
            HEIGHT = window.innerHeight;
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
        }
        window.addEventListener('resize', resize);
        resize();

        // Игрок
        let player = { x: 0, y: 0, size: 48 };

        // Переменные игры
        let score = 0;
        let gameRunning = false;
        let gameOverFlag = false;
        let collectibles = [];
        let enemies = [];

        // Джойстик
        let joystickActive = false;
        let joyDX = 0, joyDY = 0;
        const baseEl = document.getElementById('base');
        const handleEl = document.getElementById('handle');
        let touchIdentifier = null;

        function initJoystick() {
            const base = document.getElementById('joystick');
            base.addEventListener('touchstart', onTouchStart, { passive: false });
            base.addEventListener('touchmove', onTouchMove, { passive: false });
            base.addEventListener('touchend', onTouchEnd, { passive: false });
            base.addEventListener('touchcancel', onTouchEnd, { passive: false });
        }

        function onTouchStart(e) {
            if (!gameRunning || gameOverFlag) return;
            e.preventDefault();
            if (touchIdentifier === null && e.changedTouches.length > 0) {
                touchIdentifier = e.changedTouches[0].identifier;
                updateJoystickPosition(e.changedTouches[0]);
            }
        }

        function onTouchMove(e) {
            if (!gameRunning || gameOverFlag) return;
            e.preventDefault();
            for (let t of e.changedTouches) {
                if (t.identifier === touchIdentifier) {
                    updateJoystickPosition(t);
                    return;
                }
            }
        }

        function onTouchEnd(e) {
            e.preventDefault();
            touchIdentifier = null;
            joyDX = 0;
            joyDY = 0;
            handleEl.style.transform = 'translate(0px, 0px)';
        }

        function updateJoystickPosition(touch) {
            const rect = baseEl.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 55;

            if (distance > maxRadius) {
                dx = (dx / distance) * maxRadius;
                dy = (dy / distance) * maxRadius;
            }

            handleEl.style.transform = `translate(${dx}px, ${dy}px)`;

            joyDX = dx / maxRadius;
            joyDY = dy / maxRadius;
        }

        // Клавиатура (для ПК)
        const keys = {};
        window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

        // Спавн объектов
        function spawnCollectible() {
            collectibles.push({
                x: Math.random() * WIDTH,
                y: Math.random() * (HEIGHT * 0.7),
                size: 32,
                emoji: '🌿'
            });
        }

        function spawnEnemy() {
            enemies.push({
                x: Math.random() * WIDTH,
                y: -60,
                size: 48,
                emoji: '☁️',
                vx: (Math.random() - 0.5) * 3.5,
                vy: 1.8 + Math.random() * 1.2
            });
        }

        // Основной цикл
        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, WIDTH, HEIGHT);

            // Фон неба
            const gradient = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            gradient.addColorStop(0, '#5eb8ff');
            gradient.addColorStop(1, '#a0d8ff');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Движение игрока
            let speed = 6.5;
            let moveX = 0, moveY = 0;

            // Джойстик
            if (Math.abs(joyDX) > 0.1 || Math.abs(joyDY) > 0.1) {
                moveX += joyDX * speed;
                moveY += joyDY * speed;
            }

            // Клавиатура
            if (keys['arrowleft'] || keys['a']) moveX -= speed;
            if (keys['arrowright'] || keys['d']) moveX += speed;
            if (keys['arrowup'] || keys['w']) moveY -= speed;
            if (keys['arrowdown'] || keys['s']) moveY += speed;

            player.x += moveX;
            player.y += moveY;

            // Границы экрана
            player.x = Math.max(player.size / 2, Math.min(WIDTH - player.size / 2, player.x));
            player.y = Math.max(player.size / 2, Math.min(HEIGHT - player.size / 2, player.y));

            // Рисуем игрока — голубь
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🕊️', player.x, player.y);

            // Коллекционные ветки
            for (let i = collectibles.length - 1; i >= 0; i--) {
                const c = collectibles[i];
                ctx.fillText(c.emoji, c.x, c.y);

                // Столкновение
                const dx = player.x - c.x;
                const dy = player.y - c.y;
                if (Math.sqrt(dx * dx + dy * dy) < player.size / 2 + c.size / 2) {
                    score += 20;
                    document.getElementById('score').textContent = `Счёт: ${score}`;
                    collectibles.splice(i, 1);
                    spawnCollectible();
                }
            }

            // Враги — облака
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.x += e.vx;
                e.y += e.vy;

                // Отскок от боков
                if (e.x < 30 || e.x > WIDTH - 30) e.vx *= -1;

                ctx.fillText(e.emoji, e.x, e.y);

                // Столкновение
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                if (Math.sqrt(dx * dx + dy * dy) < player.size / 2 + e.size / 2 + 8) {
                    gameOver();
                    return;
                }

                // Удаляем улетевшие вниз
                if (e.y > HEIGHT + 80) {
                    enemies.splice(i, 1);
                }
            }

            // Поддержание количества объектов
            if (collectibles.length < 6 && Math.random() < 0.06) spawnCollectible();
            if (enemies.length < 5 && Math.random() < 0.035) spawnEnemy();

            // Библейская надпись внизу
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('«И голубь вернулся к нему вечером, и вот, в устах его сорванный лист маслины» — Бытие 8:11', WIDTH / 2, HEIGHT - 25);

            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameRunning = false;
            gameOverFlag = true;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            ctx.fillStyle = '#ffdd00';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('ИГРА ОКОНЧЕНА', WIDTH / 2, HEIGHT / 2 - 60);

            ctx.fillStyle = '#fff';
            ctx.font = '32px Arial';
            ctx.fillText(`Твой счёт: ${score}`, WIDTH / 2, HEIGHT / 2 + 10);

            ctx.font = '24px Arial';
            ctx.fillText('Нажми или тапни для рестарта', WIDTH / 2, HEIGHT / 2 + 80);
        }

        function resetGame() {
            player.x = WIDTH / 2;
            player.y = HEIGHT / 2;
            score = 0;
            document.getElementById('score').textContent = 'Счёт: 0';
            collectibles = [];
            enemies = [];
            joyDX = 0;
            joyDY = 0;
            handleEl.style.transform = 'translate(0px, 0px)';

            for (let i = 0; i < 6; i++) spawnCollectible();
            for (let i = 0; i < 3; i++) spawnEnemy();
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameOverFlag = false;
            gameRunning = true;
            resetGame();
            gameLoop();
        }

        // Рестарт по тапу/клику после Game Over
        function handleRestart(e) {
            if (gameOverFlag) {
                gameOverFlag = false;
                gameRunning = true;
                resetGame();
                gameLoop();
            }
        }
        canvas.addEventListener('click', handleRestart);
        canvas.addEventListener('touchstart', handleRestart);

        // Запуск
        initJoystick();
        // Игра ждёт нажатия кнопки "НАЧАТЬ ИГРУ"
    </script>
</body>
</html>
