<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ark Survival: Pro Edition</title>
    <style>
        :root { --gold: #f1c40f; --dark: #0a0a1a; }
        body { margin: 0; overflow: hidden; background: var(--dark); font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }

        /* ИНТЕРФЕЙС КВЕСТОВ */
        #quest-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.85); color: white; padding: 30px; border: 3px solid var(--gold); 
            border-radius: 20px; text-align: center; display: none; z-index: 2000; pointer-events: auto; }

        /* HUD */
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 100; display: none; }
        #stats { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px; border-left: 5px solid var(--gold); }
        
        /* ДЖОЙСТИК */
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); pointer-events: auto; }
        #joy-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 15px var(--gold); }

        /* КНОПКИ */
        #btns { position: absolute; bottom: 50px; right: 40px; display: flex; gap: 20px; pointer-events: auto; }
        .action-btn { width: 85px; height: 85px; background: rgba(255,255,255,0.15); border: 3px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; backdrop-filter: blur(5px); }
        #act-btn { border-color: #2ecc71; color: #2ecc71; display: none; }

        #menu { position: absolute; inset: 0; background: radial-gradient(circle, #1a2a6c, #050505); z-index: 3000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; gap: 20px; }
        .m-btn { width: 240px; padding: 18px; background: var(--gold); border: none; border-radius: 15px; font-weight: bold; font-size: 18px; cursor: pointer; }

        #build-gui { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 1500; display: none; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .grid { display: grid; grid-template-columns: repeat(5, 60px); gap: 10px; padding: 20px; border: 4px solid #5d4037; background: #222; }
        .cell { width: 60px; height: 60px; border: 1px dashed #555; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .filled { background: #5d4037; border: 2px solid var(--gold); }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="font-size: 45px; text-shadow: 0 0 20px var(--gold);">ARK SURVIVAL PRO</h1>
    <button class="m-btn" onclick="initGame('new')">НОВАЯ ИГРА</button>
    <button class="m-btn" id="btn-load" onclick="initGame('load')" disabled>ПРОДОЛЖИТЬ</button>
</div>

<div id="quest-overlay">
    <h2 id="q-title" style="color: var(--gold);">НОВОЕ ЗАДАНИЕ</h2>
    <p id="q-desc" style="font-size: 18px;"></p>
    <button class="m-btn" onclick="closeQuest()" style="width: 150px;">ПОНЯЛ</button>
</div>

<div id="build-gui">
    <h2>ЧЕРТЕЖ КОВЧЕГА</h2>
    <div class="grid" id="grid"></div>
    <button class="m-btn" onclick="closeBuild()" style="margin-top:20px; background: #e67e22;">ВЕРНУТЬСЯ</button>
</div>

<div id="hud">
    <div id="stats">
        🪵 Дерево: <span id="s-wood">0</span><br>
        💎 Камни: <span id="s-stone">0</span>/3
    </div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="btns">
        <div id="act-btn" class="action-btn" onclick="doAction()">ДЕЙСТВИЕ</div>
        <div class="action-btn" onclick="jump()">ПРЫЖОК</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');

let w, h, camX = 0, active = false, inUI = false;
let wood = 0, stones = 0, hasAxe = false, hasPlan = false, buildProgress = [];
let questStep = 0; // 0: камни, 1: топор, 2: чертежи, 3: стройка

let player = { x: 500, y: 0, vx: 0, vy: 0, g: false, anim: 0 };
let worldStones = [{x: 1200, f:false}, {x: 1600, f:false}, {x: 2200, f:false}];
let trees = [{x: 3000, hp:5}, {x: 3500, hp:5}, {x: 4000, hp:5}];
let arkX = 5500;

function resize() { w = cvs.width = window.innerWidth; h = cvs.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

if(localStorage.getItem('ark_save_pro')) document.getElementById('btn-load').disabled = false;

function initGame(type) {
    if (cvs.requestFullscreen) cvs.requestFullscreen();
    document.getElementById('menu').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    
    if(type === 'load') {
        let s = JSON.parse(localStorage.getItem('ark_save_pro'));
        wood = s.wood; stones = s.stones; hasAxe = s.hasAxe; hasPlan = s.hasPlan;
        buildProgress = s.progress; questStep = s.step;
    }
    
    active = true;
    initGrid();
    if(questStep === 0) showQuest("НАЧАЛО ПУТИ", "Собери 3 куска камня у гор, чтобы Кузнец смог выковать тебе топор.");
    requestAnimationFrame(loop);
}

function showQuest(title, desc) {
    inUI = true;
    document.getElementById('q-title').innerText = title;
    document.getElementById('q-desc').innerText = desc;
    document.getElementById('quest-overlay').style.display = 'block';
}

function closeQuest() { 
    document.getElementById('quest-overlay').style.display = 'none'; 
    inUI = false; 
}

function initGrid() {
    const g = document.getElementById('grid'); g.innerHTML = '';
    for(let i=0; i<20; i++) {
        let c = document.createElement('div');
        c.className = 'cell' + (buildProgress.includes(i) ? ' filled' : '');
        if(buildProgress.includes(i)) c.innerText = "🪵";
        c.onclick = () => {
            if(wood > 0 && !buildProgress.includes(i)) {
                buildProgress.push(i); c.classList.add('filled'); c.innerText = "🪵";
                wood--; updateUI();
            }
        };
        g.appendChild(c);
    }
}

// ДЖОЙСТИК ЛОГИКА
let joyActive = false;
const jBase = document.getElementById('joy-base');
const jStick = document.getElementById('joy-stick');

jBase.addEventListener('touchstart', (e) => joyActive = true);
window.addEventListener('touchmove', (e) => {
    if(!joyActive) return;
    let touch = e.touches[0];
    let rect = jBase.getBoundingClientRect();
    let centerX = rect.left + rect.width/2;
    let dx = touch.clientX - centerX;
    let limit = 40;
    let move = Math.max(-limit, Math.min(limit, dx));
    jStick.style.transform = `translateX(${move}px)`;
    player.vx = (move / limit) * 8;
});
window.addEventListener('touchend', () => {
    joyActive = false;
    jStick.style.transform = `translateX(0px)`;
    player.vx = 0;
});

function jump() { if(player.g) { player.vy = -18; player.g = false; } }

function doAction() {
    // 1. Сбор камней
    worldStones.forEach(s => { 
        if(!s.f && Math.abs(player.x - s.x) < 80) { 
            s.f = true; stones++; updateUI();
            if(stones === 3) showQuest("ТОПОР ЖДЕТ", "Отлично! Камни собраны. Беги к Кузнецу (первый дом) за инструментом.");
        } 
    });
    // 2. Кузница (x=300)
    if(stones >= 3 && !hasAxe && Math.abs(player.x - 300) < 150) {
        hasAxe = true; questStep = 1; updateUI();
        showQuest("ИНСТРУМЕНТ ПОЛУЧЕН", "Теперь у тебя есть топор. Но без плана ничего не построить. Найди Чертежи в Архиве (второй дом).");
    }
    // 3. Архив (x=900)
    if(hasAxe && !hasPlan && Math.abs(player.x - 900) < 150) {
        hasPlan = true; questStep = 2; updateUI();
        showQuest("ПОРА ЗА РАБОТУ", "Чертежи у тебя! Теперь руби деревья и неси их к месту постройки Ковчега в конце пути.");
    }
    // 4. Рубка
    if(hasAxe) {
        trees.forEach(t => { if(t.hp > 0 && Math.abs(player.x - t.x) < 100) { t.hp--; wood++; updateUI(); } });
    }
    // 5. Стройка
    if(hasPlan && Math.abs(player.x - arkX) < 300) {
        inUI = true; document.getElementById('build-gui').style.display = 'flex';
    }
}

function updateUI() {
    document.getElementById('s-wood').innerText = wood;
    document.getElementById('s-stone').innerText = stones;
    localStorage.setItem('ark_save_pro', JSON.stringify({
        wood, stones, hasAxe, hasPlan, progress: buildProgress, step: questStep
    }));
}

function closeBuild() { inUI = false; document.getElementById('build-gui').style.display = 'none'; }

function loop() {
    if(!active || inUI) { requestAnimationFrame(loop); return; }
    
    player.vy += 0.8; player.x += player.vx; player.y += player.vy;
    camX += (player.x - w/2 - camX) * 0.1;
    if(player.y > h - 145) { player.y = h - 145; player.vy = 0; player.g = true; }

    // ФОН (ГОРЫ)
    ctx.fillStyle = "#1a1a2e"; ctx.fillRect(0,0,w,h);
    for(let i=0; i<3; i++) {
        ctx.fillStyle = "#16213e";
        ctx.beginPath();
        let gx = (i*800 - camX*0.3) % 2400;
        ctx.moveTo(gx, h-70); ctx.lineTo(gx+400, h-500); ctx.lineTo(gx+800, h-70);
        ctx.fill();
    }

    ctx.save(); ctx.translate(-camX, 0);
    ctx.fillStyle = "#2c1e14"; ctx.fillRect(camX, h-70, w, 70); // Земля

    // ДОМА
    ctx.fillStyle = "#5d4037"; ctx.fillRect(250, h-220, 120, 150); // Кузница
    ctx.fillStyle = "#4e342e"; ctx.fillRect(850, h-220, 120, 150); // Архив
    
    // КАМНИ
    worldStones.forEach(s => { if(!s.f) { ctx.fillStyle = "#777"; ctx.beginPath(); ctx.arc(s.x, h-85, 15, 0, 7); ctx.fill(); } });

    // ДЕРЕВЬЯ
    trees.forEach(t => { if(t.hp > 0) {
        ctx.fillStyle = "#3e2723"; ctx.fillRect(t.x, h-250, 25, 180);
        ctx.fillStyle = "#1b5e20"; ctx.beginPath(); ctx.arc(t.x+12, h-260, 60, 0, 7); ctx.fill();
    }});

    // КОВЧЕГ
    ctx.fillStyle = "#5d4037";
    ctx.fillRect(arkX, h-70-(buildProgress.length*10), 500, buildProgress.length*10);
    ctx.strokeStyle = varGold(); ctx.lineWidth = 3; ctx.strokeRect(arkX, h-270, 500, 200);

    // ИГРОК
    ctx.fillStyle = "#e67e22"; ctx.fillRect(player.x+7, player.y+25, 30, 40); // Тело
    ctx.fillStyle = "#ffdbac"; ctx.beginPath(); ctx.arc(player.x+22, player.y+15, 15, 0, 7); ctx.fill(); // Голова
    if(hasAxe) { ctx.fillStyle = "silver"; ctx.fillRect(player.x+35, player.y+30, 20, 5); }

    ctx.restore();

    // ПРОВЕРКА КНОПКИ ДЕЙСТВИЯ
    let near = stones < 3 && worldStones.some(s => !s.f && Math.abs(player.x - s.x) < 80);
    if(!near) near = stones >= 3 && !hasAxe && Math.abs(player.x - 300) < 150;
    if(!near) near = hasAxe && !hasPlan && Math.abs(player.x - 900) < 150;
    if(!near) near = hasAxe && trees.some(t => t.hp > 0 && Math.abs(player.x - t.x) < 100);
    if(!near) near = hasPlan && Math.abs(player.x - arkX) < 300;
    document.getElementById('act-btn').style.display = near ? 'flex' : 'none';

    requestAnimationFrame(loop);
}
function varGold() { return "#f1c40f"; }
</script>
</body>
</html>
