<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dungeon Survivor</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#111;
font-family:Arial;
}

canvas{
display:block;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

let player={
x:200,
y:200,
size:30,
speed:0.2
};

let enemies=[];
let bullets=[];
let score=0;

let touchX=null;
let touchY=null;

canvas.addEventListener("touchmove",e=>{
touchX=e.touches[0].clientX;
touchY=e.touches[0].clientY;
});

function spawnEnemy(){

let side=Math.floor(Math.random()*4);

let x,y;

if(side==0){x=0;y=Math.random()*canvas.height;}
if(side==1){x=canvas.width;y=Math.random()*canvas.height;}
if(side==2){x=Math.random()*canvas.width;y=0;}
if(side==3){x=Math.random()*canvas.width;y=canvas.height;}

enemies.push({x,y,size:25,speed:1+Math.random()});

}

setInterval(spawnEnemy,900);

function shoot(){

let closest=null;
let dist=999999;

enemies.forEach(e=>{
let d=Math.hypot(e.x-player.x,e.y-player.y);
if(d<dist){
dist=d;
closest=e;
}
});

if(closest){

let angle=Math.atan2(closest.y-player.y,closest.x-player.x);

bullets.push({
x:player.x,
y:player.y,
vx:Math.cos(angle)*6,
vy:Math.sin(angle)*6,
size:8
});

}

}

setInterval(shoot,400);

function update(){

if(touchX!=null){

player.x+= (touchX-player.x)*player.speed;
player.y+= (touchY-player.y)*player.speed;

}

bullets.forEach(b=>{
b.x+=b.vx;
b.y+=b.vy;
});

enemies.forEach(e=>{

let angle=Math.atan2(player.y-e.y,player.x-e.x);

e.x+=Math.cos(angle)*e.speed;
e.y+=Math.sin(angle)*e.speed;

if(Math.hypot(player.x-e.x,player.y-e.y)<25){

alert("Game Over! Score: "+score);
location.reload();

}

});

bullets.forEach((b,bi)=>{

enemies.forEach((e,ei)=>{

if(Math.hypot(b.x-e.x,b.y-e.y)<20){

enemies.splice(ei,1);
bullets.splice(bi,1);
score++;

}

});

});

}

function draw(){

ctx.fillStyle="#111";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="red";

enemies.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
ctx.fill();
});

ctx.fillStyle="yellow";

bullets.forEach(b=>{
ctx.beginPath();
ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
ctx.fill();
});

ctx.fillStyle="white";
ctx.font="22px Arial";
ctx.fillText("Score: "+score,20,30);

}

function loop(){

update();
draw();
requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
