<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BOMBUZA: FIXED LIMIT</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --tile: #334155; }
        .theme-dark { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        .theme-neon { --bg: #000; --card: #111; --accent: #0f0; --text: #fff; --tile: #222; }
        .theme-lava { --bg: #290000; --card: #4a0000; --accent: #ff4500; --text: #fff; }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.5s; }
        .panel { background: var(--card); padding: 30px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); max-width: 900px; margin: 0 auto; }
        .setup-section { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--accent); }
        input, select { padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: inherit; font-size: 15px; }

        .scoreboard { display: flex; gap: 15px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
        .team-box { min-width: 140px; background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 4px solid transparent; transition: 0.4s; }
        .team-box.active { border-color: var(--accent); transform: scale(1.05); }
        .score { font-size: 36px; font-weight: 900; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; }
        .tile { aspect-ratio: 1/1; background: var(--tile); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.2s; position: relative; }
        .tile:hover { background: var(--accent); color: #000; transform: scale(1.05); }
        .tile.used { pointer-events: none; opacity: 0.2; background: #000 !important; }
        .tile.used::after { content: "❌"; position: absolute; font-size: 40px; color: #ef4444; inset: 0; display: flex; align-items: center; justify-content: center; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card); width: 90%; max-width: 500px; padding: 40px; border-radius: 35px; text-align: center; border: 2px solid var(--accent); }
        .btn { padding: 14px 28px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; margin: 8px; }
        .btn-check { background: var(--accent); color: #000; width: 100%; }
        .btn-win { background: #22c55e; color: white; }
        .btn-lose { background: #ef4444; color: white; }
    </style>
</head>
<body class="theme-dark" id="main-body">

<div class="panel" id="setup">
    <h2 style="text-align:center; margin-top:0">BOMBUZA: ТОЧНЫЙ ЛИМИТ</h2>
    
    <div class="setup-section">
        <label>⚙️ ВСЕГО КАРТОЧЕК НА ЭКРАНЕ</label>
        <div style="margin-bottom: 15px;">
            <input type="number" id="v-total-tiles" value="20" style="width: 100%; font-size: 24px; text-align: center; border: 2px solid var(--accent);">
            <p style="font-size: 12px; opacity: 0.7; text-align: center;">(Программа сама разделит это число на вопросы и бонусы)</p>
        </div>
        
        <div class="setup-grid">
            <div class="group"><label>Тема</label>
                <select onchange="document.getElementById('main-body').className = this.value">
                    <option value="theme-dark">🌌 Космос</option>
                    <option value="theme-neon">⚡ Неон</option>
                    <option value="theme-lava">🌋 Лава</option>
                </select>
            </div>
            <div class="group"><label>Команды</label><input type="text" id="v-teams" value="Команда 1, Команда 2"></div>
            <div class="group"><label>Очки+</label><input type="number" id="v-win" value="15"></div>
            <div class="group"><label>Штраф-</label><input type="number" id="v-bomb" value="20"></div>
        </div>
    </div>

    <div class="setup-section">
        <label>🎁 ИЗ НИХ БОНУСОВ (ШТ)</label>
        <div class="setup-grid">
            <div class="group"><label>💣 Бомбы</label><input type="number" id="c-b" value="3"></div>
            <div class="group"><label>💎 Алмазы</label><input type="number" id="c-g" value="2"></div>
            <div class="group"><label>🚀 Ракета</label><input type="number" id="c-r" value="1"></div>
            <div class="group"><label>🛡️ Щиты</label><input type="number" id="c-s" value="1"></div>
        </div>
    </div>

    <button class="btn btn-check" onclick="initGame()">ЗАПУСТИТЬ (РОВНО <span id="btn-count">20</span> КЛЕТОК)</button>
</div>

<div id="game-ui" style="display:none">
    <div class="scoreboard" id="score-board"></div>
    <div class="grid" id="game-grid"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div id="m-icon" style="font-size:70px"></div>
        <h2 id="m-title" style="color:var(--accent)"></h2>
        <p id="m-text" style="font-size:22px; margin:20px 0"></p>
        <button id="m-rev-btn" class="btn btn-check" onclick="showAns()">ПРОВЕРИТЬ</button>
        <div id="m-ans-box" style="display:none; background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:15px">
            <b id="m-ans-text" style="font-size:20px"></b>
        </div>
        <div id="m-ctrl" style="display:none">
            <button class="btn btn-win" onclick="finish(true)">ВЕРНО</button>
            <button class="btn btn-lose" onclick="finish(false)">ОШИБКА</button>
        </div>
        <button id="m-ok-btn" class="btn btn-check" style="display:none" onclick="next()">ПОНЯТНО</button>
    </div>
</div>

<script>
const baseQ = [
    "О борьбе между Христом и сатаной (Бытие 3:15)", "Еноха о Втором Пришествии (Иуды 14-15)", "О потопе (Бытие 6-7)", "Потомки Ноя (Бытие 9:25-27)", "430 лет (Бытие 15:13)", "Шило (Бытие 49:10)", "Иов (Иов 19:25-27)", "40 лет (Числа 14)", "Пророк (Втор 18)", "70 лет (Иер 25)", "Истукан (Дан 2)", "Звери (Дан 7)", "Овен и козел (Дан 8)", "2300 (Дан 8:14)", "70 седьмин (Дан 9)", "1260 (Откр 11)", "1290 (Дан 12:11)", "1335 (Дан 12:12)", "Матфея 24", "Отступление (2 Фесс 2)", "7 церквей (Откр 2)", "7 печатей (Откр 6)", "4 ветра (Откр 7)", "7 труб (Откр 8)", "Книга (Откр 10)", "Храм (Откр 11:1)", "Вретище (Откр 11)", "Жена (Откр 12)", "Зверь из моря (Откр 13)", "Двурогий зверь (Откр 13:11)", "144 000 (Откр 14)", "3 ангела (Откр 14)", "2 жатвы (Откр 14:14)", "Песнь (Откр 15)", "Благодать (Откр 15:8)", "7 чаш (Откр 16)", "Блудница (Откр 17)", "Выйди (Откр 18)", "Падение (Откр 18)", "Вечеря (Откр 19)", "Всадник (Откр 19)", "Птицы (Откр 19:17)", "1000 лет (Откр 20)", "Иерусалим (Откр 21)"
];

let state = { teams:[], scores:[], shields:[], cur:0, deck:[], w:15, b:20, extra:false };

// Слушатель для обновления текста на кнопке
document.getElementById('v-total-tiles').addEventListener('input', (e) => {
    document.getElementById('btn-count').innerText = e.target.value || 0;
});

function initGame() {
    state.teams = document.getElementById('v-teams').value.split(',').map(n => n.trim());
    state.scores = state.teams.map(() => 0);
    state.shields = state.teams.map(() => false);
    state.w = parseInt(document.getElementById('v-win').value);
    state.b = parseInt(document.getElementById('v-bomb').value);
    
    let totalNeeded = parseInt(document.getElementById('v-total-tiles').value);
    let deck = [];

    // 1. Сначала добавляем бонусы
    const addB = (id, type, icon, t, d) => {
        let n = parseInt(document.getElementById(id).value);
        for(let i=0; i<n; i++) if(deck.length < totalNeeded) deck.push({type, icon, t, d});
    };

    addB('c-b', 'b', '💣', 'БАБАХ!', `Минус ${state.b} очков!`);
    addB('c-g', 'g', '💎', 'АЛМАЗ!', '+50 очков!');
    addB('c-r', 'r', '🚀', 'РАКЕТА!', 'Еще один ход!');
    addB('c-s', 's', '🛡️', 'ЩИТ!', 'Защита от бомбы!');

    // 2. Остальное место забиваем вопросами
    let questionsNeeded = totalNeeded - deck.length;
    for(let i=0; i < questionsNeeded; i++) {
        let qText = baseQ[i % baseQ.length];
        deck.push({type:'q', title:`Вопрос #${i+1}`, q:`Назовите содержание этой цепи:`, a: qText});
    }

    state.deck = deck.sort(() => Math.random() - 0.5);
    render();
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
}

function render() {
    const sb = document.getElementById('score-board');
    sb.innerHTML = state.teams.map((n, i) => `
        <div class="team-box ${i===state.cur ? 'active' : ''}">
            <div style="font-size:12px">${n} ${state.shields[i] ? '🛡️' : ''}</div>
            <div class="score">${state.scores[i]}</div>
        </div>
    `).join('');
    const g = document.getElementById('game-grid');
    g.innerHTML = state.deck.map((item, i) => `<div class="tile ${item.type==='used'?'used':''}" onclick="openT(${i})">${i+1}</div>`).join('');
}

function openT(idx) {
    const item = state.deck[idx];
    if(item.type === 'used') return;
    window.activeIdx = idx;
    const m = document.getElementById('modal');
    ['m-rev-btn', 'm-ans-box', 'm-ctrl', 'm-ok-btn'].forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById('m-icon').innerText = item.icon || '📖';
    document.getElementById('m-title').innerText = item.title || item.t;
    document.getElementById('m-text').innerText = item.q || item.d;
    if(item.type === 'q') {
        document.getElementById('m-rev-btn').style.display = 'block';
        document.getElementById('m-ans-text').innerText = item.a;
    } else {
        document.getElementById('m-ok-btn').style.display = 'block';
        applyBonus(item);
    }
    m.style.display = 'flex';
}

function applyBonus(item) {
    let c = state.cur;
    if(item.type === 'b') { if(state.shields[c]) state.shields[c] = false; else state.scores[c] -= state.b; }
    if(item.type === 'g') state.scores[c] += 50;
    if(item.type === 's') state.shields[c] = true;
    if(item.type === 'r') state.extra = true;
}

function showAns() {
    document.getElementById('m-rev-btn').style.display = 'none';
    document.getElementById('m-ans-box').style.display = 'block';
    document.getElementById('m-ctrl').style.display = 'flex';
}

function finish(win) {
    if(win) state.scores[state.cur] += state.w;
    next();
}

function next() {
    document.getElementById('modal').style.display = 'none';
    state.deck[window.activeIdx] = { type: 'used' };
    if(!state.extra) state.cur = (state.cur + 1) % state.teams.length;
    state.extra = false;
    render();
}
</script>
</body>
</html>
