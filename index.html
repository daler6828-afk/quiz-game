<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Kahoot Clone</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --p: #46178f; --r: #e21b3c; --b: #1368ce; --y: #ffa602; --g: #26890c; }
        body { font-family: sans-serif; background: var(--p); color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: white; color: #333; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .hidden { display: none !important; }
        input, select { padding: 12px; width: 90%; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn { background: var(--p); color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 18px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .ans { height: 70px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .timer { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 15px; overflow: hidden; }
        #fill { height: 100%; background: var(--g); width: 100%; transition: width 1s linear; }
        #scores { list-style: none; padding: 0; text-align: left; max-height: 200px; overflow-y: auto; }
        #scores li { background: #f9f9f9; padding: 8px; margin-bottom: 5px; border-radius: 5px; display: flex; justify-content: space-between; border-left: 4px solid var(--p); }
    </style>
</head>
<body>

<div class="box">
    <div id="s1">
        <h1 style="color: var(--p);">Global Quiz</h1>
        <input type="text" id="nick" placeholder="Твой ник..." maxlength="12">
        <select id="cat">
            <option value="geo">География 🌍</option>
            <option value="food">Еда мира 🍕</option>
            <option value="sport">Спорт ⚽</option>
            <option value="tech">Технологии 💻</option>
        </select>
        <button class="btn" onclick="start()">ИГРАТЬ</button>
    </div>

    <div id="s2" class="hidden">
        <div class="timer"><div id="fill"></div></div>
        <h3 id="q">Вопрос...</h3>
        <div class="grid">
            <button class="ans" style="background:var(--r)" onclick="ans(0)"></button>
            <button class="ans" style="background:var(--b)" onclick="ans(1)"></button>
            <button class="ans" style="background:var(--y)" onclick="ans(2)"></button>
            <button class="ans" style="background:var(--g)" onclick="ans(3)"></button>
        </div>
    </div>

    <div id="s3" class="hidden">
        <h2 style="color: var(--p);">Финиш! Очки: <span id="res">0</span></h2>
        <h4 style="margin-bottom: 5px;">Общая таблица лидеров:</h4>
        <ul id="scores">Загрузка...</ul>
        <button class="btn" onclick="location.reload()">Еще раз</button>
    </div>
</div>

<script>
    // ВСТАВЬ СВОИ ДАННЫЕ ИЗ FIREBASE ТУТ:
    const firebaseConfig = {
        apiKey: "ТВОЙ_API_KEY",
        databaseURL: "ТВОЙ_DATABASE_URL",
        projectId: "ТВОЙ_PROJECT_ID",
        appId: "ТВОЙ_APP_ID"
    };
    
    // Инициализация (если конфиг пустой, будет работать только локально)
    if (firebaseConfig.apiKey !== "ТВОЙ_API_KEY") {
        firebase.initializeApp(firebaseConfig);
    }

    const libs = {
        geo: [
            {q: "Столица Японии?", a: ["Пекин", "Сеул", "Токио", "Бангкок"], c: 2},
            {q: "Самая длинная река?", a: ["Амазонка", "Нил", "Волга", "Янцзы"], c: 0},
            {q: "В какой стране Эйфелева башня?", a: ["Италия", "Германия", "Франция", "Испания"], c: 2}
        ],
        food: [
            {q: "Родина пиццы?", a: ["Франция", "Италия", "США", "Китай"], c: 1},
            {q: "Из чего делают суши?", a: ["Хлеб", "Рис", "Картошка", "Тесто"], c: 1},
            {q: "Какой фрукт называют королем?", a: ["Манго", "Ананас", "Дуриан", "Банан"], c: 2}
        ],
        sport: [
            {q: "Сколько игроков в футбольной команде?", a: ["11", "10", "12", "9"], c: 0},
            {q: "В каком виде спорта используют шайбу?", a: ["Футбол", "Теннис", "Хоккей", "Баскетбол"], c: 2},
            {q: "Как часто проходят Олимпиады?", a: ["Раз в 2 года", "Раз в 4 года", "Раз в год", "Раз в 5 лет"], c: 1}
        ],
        tech: [
            {q: "Кто создал Apple?", a: ["Билл Гейтс", "Стив Джобс", "Марк Цукерберг", "Илон Маск"], c: 1},
            {q: "Какая ОС у iPhone?", a: ["Android", "Windows", "iOS", "Linux"], c: 2},
            {q: "Что такое 'мышь' в ПК?", a: ["Процессор", "Монитор", "Устройство ввода", "Вирус"], c: 2}
        ]
    };

    let curQ = [], idx = 0, pts = 0, tmr, left = 10;

    function start() {
        if (!document.getElementById('nick').value) return alert("Введи ник!");
        curQ = libs[document.getElementById('cat').value];
        document.getElementById('s1').classList.add('hidden');
        document.getElementById('s2').classList.remove('hidden');
        load();
    }

    function load() {
        if (idx >= curQ.length) return finish();
        const q = curQ[idx];
        document.getElementById('q').innerText = q.q;
        const btns = document.querySelectorAll('.ans');
        q.a.forEach((t, i) => btns[i].innerText = t);
        left = 10;
        tick();
    }

    function tick() {
        document.getElementById('fill').style.width = (left/10)*100 + "%";
        clearInterval(tmr);
        tmr = setInterval(() => {
            left--;
            document.getElementById('fill').style.width = (left/10)*100 + "%";
            if (left <= 0) ans(-1);
        }, 1000);
    }

    function ans(i) {
        clearInterval(tmr);
        if (i === curQ[idx].c) pts += 500 + (left * 50);
        idx++;
        load();
    }

    function finish() {
        document.getElementById('s2').classList.add('hidden');
        document.getElementById('s3').classList.remove('hidden');
        document.getElementById('res').innerText = pts;
        
        const name = document.getElementById('nick').value;
        
        // Отправка в Firebase
        if (firebase.apps.length) {
            firebase.database().ref('scores').push({ name, pts });
            showGlobal();
        } else {
            document.getElementById('scores').innerHTML = "Firebase не настроен. Видно только локально.";
        }
    }

    function showGlobal() {
        firebase.database().ref('scores').orderByChild('pts').limitToLast(10).on('value', snap => {
            let data = [];
            snap.forEach(child => { data.push(child.val()); });
            data.reverse();
            document.getElementById('scores').innerHTML = data.map(p => `<li><b>${p.name}</b> <span>${p.pts}</span></li>`).join('');
        });
    }
</script>
</body>
</html>
