<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINECRAFT ПРОСТОЙ И РАБОЧИЙ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            overflow: hidden;
            touch-action: none;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            z-index: 10;
            font-size: 16px;
            pointer-events: none;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            border: 2px solid white;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            z-index: 15;
            pointer-events: none;
        }
        #hotbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.6);
            padding: 5px;
            border-radius: 10px;
            z-index: 20;
        }
        .hotbar-slot {
            width: 60px;
            height: 60px;
            background: #888;
            border: 2px solid #555;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            position: relative;
            color: white;
        }
        .hotbar-slot.active {
            border: 3px solid yellow;
        }
        .slot-count {
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 14px;
            color: white;
            text-shadow: 1px 1px 0 black;
        }
        #controls {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 100;
        }
        .joystick-area {
            pointer-events: auto;
            width: 120px;
            height: 120px;
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            border: 2px solid white;
            backdrop-filter: blur(4px);
        }
        #action-buttons {
            position: absolute;
            bottom: 250px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        .action-btn {
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.6);
            border: 2px solid white;
            border-radius: 40px;
            color: white;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .action-btn:active {
            background: rgba(100,100,100,0.8);
            transform: scale(0.95);
        }
        #fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="info">❤️ 100 | БЛОКОВ: <span id="block-counter">20</span></div>
    <div id="crosshair"></div>
    
    <div id="hotbar"></div>

    <div id="controls">
        <div class="joystick-area" id="left-joystick"></div>
        <div class="joystick-area" id="right-joystick"></div>
    </div>

    <div id="action-buttons">
        <div class="action-btn" id="jump-btn">🦘</div>
        <div class="action-btn" id="break-btn">⛏️</div>
        <div class="action-btn" id="place-btn">🪨</div>
    </div>

    <button id="fullscreen-btn">⛶ ПОЛНЫЙ ЭКРАН</button>

    <!-- Подключаем библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>

    <script>
        // Ждем загрузку страницы
        window.addEventListener('load', function() {
            console.log('Страница загружена, запускаем Minecraft...');
            
            // ========== НАСТРОЙКИ ==========
            const BLOCK_SIZE = 1;
            const PLAYER_SPEED = 0.15;
            const JUMP_FORCE = 0.2;
            const GRAVITY = 0.015;
            const REACH = 4;
            
            // ========== ТРИДЭШНАЯ СЦЕНА ==========
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(5, 5, 10);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // ========== ОСВЕЩЕНИЕ ==========
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            light.castShadow = true;
            light.shadow.mapSize.width = 1024;
            light.shadow.mapSize.height = 1024;
            scene.add(light);
            
            // ========== БЛОКИ ==========
            const blocks = [];
            const blockTypes = {
                'grass': { color: 0x7CFC00, emoji: '🌿' },
                'dirt': { color: 0x8B5A2B, emoji: '🟫' },
                'stone': { color: 0x808080, emoji: '🪨' },
                'wood': { color: 0x8B4513, emoji: '🪵' },
                'leaf': { color: 0x2E8B57, emoji: '🍃' }
            };
            
            function createBlock(type, x, y, z) {
                const geometry = new THREE.BoxGeometry(BLOCK_SIZE, BLOCK_SIZE, BLOCK_SIZE);
                const material = new THREE.MeshStandardMaterial({ color: blockTypes[type].color });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(x, y, z);
                cube.castShadow = true;
                cube.receiveShadow = true;
                cube.userData = { type: type };
                return cube;
            }
            
            // СОЗДАЕМ ЗЕМЛЮ
            for (let x = -10; x <= 10; x++) {
                for (let z = -10; z <= 10; z++) {
                    // Трава сверху
                    const grass = createBlock('grass', x, 0, z);
                    scene.add(grass);
                    blocks.push(grass);
                    
                    // Земля под травой
                    const dirt = createBlock('dirt', x, -1, z);
                    scene.add(dirt);
                    blocks.push(dirt);
                }
            }
            
            // ДОБАВЛЯЕМ НЕСКОЛЬКО БЛОКОВ ПОВЕРХ
            for (let i = 0; i < 20; i++) {
                const x = Math.floor(Math.random() * 10) - 5;
                const z = Math.floor(Math.random() * 10) - 5;
                if (Math.random() > 0.5) {
                    const block = createBlock('stone', x, 1, z);
                    scene.add(block);
                    blocks.push(block);
                }
            }
            
            // ========== ПЕРЕМЕННЫЕ ИГРОКА ==========
            const player = {
                x: camera.position.x,
                y: camera.position.y,
                z: camera.position.z,
                velY: 0,
                onGround: false,
                selectedSlot: 0,
                hotbar: ['grass', 'dirt', 'stone', 'wood', 'leaf'],
                inventory: {
                    'grass': 20,
                    'dirt': 20,
                    'stone': 20,
                    'wood': 10,
                    'leaf': 10
                }
            };
            
            let pitch = 0;
            let yaw = 0;
            let moveX = 0;
            let moveZ = 0;
            let lookX = 0;
            let lookY = 0;
            
            // ========== ФИЗИКА ==========
            function checkCollision(x, y, z) {
                for (let block of blocks) {
                    const b = block.position;
                    if (x + 0.3 > b.x - 0.5 && x - 0.3 < b.x + 0.5 &&
                        y + 1.8 > b.y - 0.5 && y < b.y + 0.5 &&
                        z + 0.3 > b.z - 0.5 && z - 0.3 < b.z + 0.5) {
                        return true;
                    }
                }
                return false;
            }
            
            // ========== ПОИСК БЛОКА ПОД ПРИЦЕЛОМ ==========
            function getLookedBlock() {
                const raycaster = new THREE.Raycaster();
                const dir = new THREE.Vector3(
                    Math.sin(yaw) * Math.cos(pitch),
                    Math.sin(pitch),
                    Math.cos(yaw) * Math.cos(pitch)
                );
                raycaster.set(camera.position, dir);
                const intersects = raycaster.intersectObjects(blocks);
                if (intersects.length > 0 && intersects[0].distance < REACH) {
                    return intersects[0].object;
                }
                return null;
            }
            
            // ========== СЛОМАТЬ БЛОК ==========
            function breakBlock() {
                const block = getLookedBlock();
                if (block) {
                    const type = block.userData.type;
                    player.inventory[type] += 1;
                    
                    scene.remove(block);
                    const index = blocks.indexOf(block);
                    if (index > -1) blocks.splice(index, 1);
                    
                    updateHotbar();
                    console.log('Блок сломан');
                }
            }
            
            // ========== ПОСТАВИТЬ БЛОК ==========
            function placeBlock() {
                const block = getLookedBlock();
                if (!block) return;
                
                const type = player.hotbar[player.selectedSlot];
                if (player.inventory[type] <= 0) return;
                
                const dir = new THREE.Vector3(
                    Math.sin(yaw) * Math.cos(pitch),
                    Math.sin(pitch),
                    Math.cos(yaw) * Math.cos(pitch)
                );
                
                const pos = block.position.clone().add(dir.clone().multiplyScalar(1.1));
                pos.x = Math.round(pos.x);
                pos.y = Math.round(pos.y);
                pos.z = Math.round(pos.z);
                
                // Проверяем, свободно ли место
                let occupied = false;
                for (let b of blocks) {
                    if (Math.abs(b.position.x - pos.x) < 0.1 && 
                        Math.abs(b.position.y - pos.y) < 0.1 && 
                        Math.abs(b.position.z - pos.z) < 0.1) {
                        occupied = true;
                        break;
                    }
                }
                
                if (!occupied && Math.abs(pos.x - player.x) > 0.8) {
                    const newBlock = createBlock(type, pos.x, pos.y, pos.z);
                    scene.add(newBlock);
                    blocks.push(newBlock);
                    player.inventory[type] -= 1;
                    updateHotbar();
                    console.log('Блок поставлен');
                }
            }
            
            // ========== ПРЫЖОК ==========
            function jump() {
                if (player.onGround) {
                    player.velY = JUMP_FORCE;
                    player.onGround = false;
                    console.log('Прыжок');
                }
            }
            
            // ========== ОБНОВЛЕНИЕ ХОТБАРА ==========
            function updateHotbar() {
                const hotbarDiv = document.getElementById('hotbar');
                hotbarDiv.innerHTML = '';
                
                for (let i = 0; i < player.hotbar.length; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'hotbar-slot' + (i === player.selectedSlot ? ' active' : '');
                    
                    const type = player.hotbar[i];
                    slot.textContent = blockTypes[type].emoji;
                    
                    const count = document.createElement('span');
                    count.className = 'slot-count';
                    count.textContent = player.inventory[type];
                    
                    slot.appendChild(count);
                    hotbarDiv.appendChild(slot);
                }
                
                document.getElementById('block-counter').textContent = player.inventory[player.hotbar[player.selectedSlot]];
            }
            
            // ========== ОБНОВЛЕНИЕ ИГРЫ ==========
            function update() {
                // Поворот камеры
                yaw -= lookX * 0.02;
                pitch += lookY * 0.02;
                if (pitch > 1.4) pitch = 1.4;
                if (pitch < -1.4) pitch = -1.4;
                
                camera.rotation.order = 'YXZ';
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;
                
                // Гравитация
                player.velY -= GRAVITY;
                
                // Движение
                let newX = player.x;
                let newZ = player.z;
                
                if (Math.abs(moveX) > 0.1 || Math.abs(moveZ) > 0.1) {
                    const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
                    const right = new THREE.Vector3(Math.sin(yaw + Math.PI/2), 0, Math.cos(yaw + Math.PI/2));
                    
                    newX += (forward.x * -moveZ + right.x * moveX) * PLAYER_SPEED;
                    newZ += (forward.z * -moveZ + right.z * moveX) * PLAYER_SPEED;
                }
                
                // Вертикаль
                let newY = player.y + player.velY;
                
                // Коллизии
                let onGround = false;
                
                if (!checkCollision(newX, newY, player.z)) {
                    player.x = newX;
                    player.y = newY;
                } else {
                    player.velY = 0;
                    onGround = true;
                }
                
                if (!checkCollision(player.x, player.y, newZ)) {
                    player.z = newZ;
                }
                
                player.onGround = onGround;
                
                // Обновляем позицию камеры
                camera.position.x = player.x;
                camera.position.y = player.y;
                camera.position.z = player.z;
            }
            
            // ========== АНИМАЦИЯ ==========
            function animate() {
                requestAnimationFrame(animate);
                update();
                renderer.render(scene, camera);
            }
            animate();
            
            // ========== ДЖОЙСТИКИ ==========
            setTimeout(() => {
                if (typeof nipplejs !== 'undefined') {
                    console.log('Джойстики инициализируются');
                    
                    // Левый джойстик (движение)
                    const leftManager = nipplejs.create({
                        zone: document.getElementById('left-joystick'),
                        mode: 'static',
                        position: { left: '50%', top: '50%' },
                        color: 'white',
                        size: 80
                    });
                    
                    leftManager.on('move', function(evt, nipple) {
                        moveX = nipple.vector.x;
                        moveZ = nipple.vector.y;
                    }).on('end', function() {
                        moveX = 0;
                        moveZ = 0;
                    });
                    
                    // Правый джойстик (поворот)
                    const rightManager = nipplejs.create({
                        zone: document.getElementById('right-joystick'),
                        mode: 'static',
                        position: { left: '50%', top: '50%' },
                        color: 'white',
                        size: 80
                    });
                    
                    rightManager.on('move', function(evt, nipple) {
                        lookX = nipple.vector.x;
                        lookY = nipple.vector.y;
                    }).on('end', function() {
                        lookX = 0;
                        lookY = 0;
                    });
                }
            }, 500);
            
            // ========== КНОПКИ ==========
            document.getElementById('jump-btn').addEventListener('click', function(e) {
                e.preventDefault();
                jump();
            });
            
            document.getElementById('break-btn').addEventListener('click', function(e) {
                e.preventDefault();
                breakBlock();
            });
            
            document.getElementById('place-btn').addEventListener('click', function(e) {
                e.preventDefault();
                placeBlock();
            });
            
            // Переключение слотов
            window.addEventListener('keydown', function(e) {
                if (e.key >= '1' && e.key <= '5') {
                    player.selectedSlot = parseInt(e.key) - 1;
                    updateHotbar();
                }
            });
            
            // Полный экран
            document.getElementById('fullscreen-btn').addEventListener('click', function() {
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            });
            
            // Запрещаем скролл
            document.addEventListener('touchmove', function(e) {
                e.preventDefault();
            }, { passive: false });
            
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });
            
            // Запуск
            updateHotbar();
            console.log('Minecraft запущен! Всё должно работать!');
        });
    </script>
</body>
</html>
