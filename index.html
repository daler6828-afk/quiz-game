<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Назад во времени: Плавная Камера</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .screen { position: absolute; width: 100%; height: 100%; background: linear-gradient(45deg, #0f2027, #203a43, #2c5364); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; z-index: 100; color: white; text-align: center; }
        .btn { padding: 20px 60px; margin: 15px; font-size: 28px; color: white; border: 4px solid #fff; background: rgba(255,255,255,0.1); cursor: pointer; border-radius: 50px; font-weight: bold; }
        #dialog { position: absolute; top: 20px; width: 80%; left: 10%; background: rgba(0,0,0,0.7); color: #ffd700; padding: 12px; border-radius: 20px; border: 2px solid #ffd700; text-align: center; font-size: 18px; }
        .joy-base { position: absolute; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border: 3px solid #fff; border-radius: 50%; display: none; }
        .joy-stick { width: 50px; height: 50px; background: #fff; border-radius: 50%; position: absolute; left: 35px; top: 35px; }
        #jump-btn { position: absolute; bottom: 40px; right: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border: 4px solid #fff; border-radius: 50%; pointer-events: auto; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<canvas id="g"></canvas>
<div id="ui">
    <div id="menu" class="screen">
        <h1>НАЗАД ВО ВРЕМЕНИ</h1>
        <div class="btn" onclick="startFull()">ИГРАТЬ</div>
    </div>
    <div id="game-hud" class="hidden">
        <div id="dialog">Используй джойстик и камеру, чтобы найти артефакт!</div>
        <div id="jump-btn">ПРЫЖОК</div>
    </div>
    <div id="joy-ui" class="joy-base"><div class="joy-stick"></div></div>
</div>

<script>
const canvas = document.getElementById('g');
const ctx = canvas.getContext('2d');
const joyUI = document.getElementById('joy-ui');

let w, h, active = false;
let camera = { x: 0, y: 0 };
let player = { x: 100, y: 0, vx: 0, vy: 0, w: 40, h: 60, ground: false, hasStaff: false };
let staff = { x: 1500, y: 200, collected: false };
let portal = { x: 50, y: 0, active: false };
let platforms = [];

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    // Создаем длинный уровень
    platforms = [
        {x: -500, y: h - 60, w: 3000, h: 100}, // Земля
        {x: 300, y: h - 180, w: 200, h: 20},
        {x: 600, y: h - 300, w: 200, h: 20},
        {x: 900, y: h - 220, w: 200, h: 20},
        {x: 1200, y: h - 350, w: 200, h: 20},
        {x: 1450, y: h - 450, w: 150, h: 20}, // Платформа с посохом
    ];
    staff.y = h - 490;
    portal.y = h - 160;
}

window.addEventListener('resize', init);
init();

// --- УПРАВЛЕНИЕ ---
let joy = { id: null, x: 0, dx: 0 };
window.addEventListener('touchstart', e => {
    for(let t of e.changedTouches) {
        if(t.clientX < w/2 && joy.id === null) {
            joy.id = t.identifier; joy.x = t.clientX;
            joyUI.style.display = 'block';
            joyUI.style.left = (t.clientX - 60) + 'px'; joyUI.style.top = (t.clientY - 60) + 'px';
        } else if(t.clientX >= w/2) { jump(); }
    }
}, {passive: false});

window.addEventListener('touchmove', e => {
    e.preventDefault();
    for(let t of e.changedTouches) {
        if(t.identifier === joy.id) {
            let move = t.clientX - joy.x;
            joy.dx = Math.max(-1, Math.min(1, move / 50));
            joyUI.querySelector('.joy-stick').style.transform = `translateX(${joy.dx * 35}px)`;
        }
    }
}, {passive: false});

window.addEventListener('touchend', e => {
    for(let t of e.changedTouches) { if(t.identifier === joy.id) { joy.id = null; joy.dx = 0; joyUI.style.display = 'none'; } }
});

function jump() { if(player.ground) { player.vy = -18; player.ground = false; } }

function startFull() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(() => {});
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('game-hud').classList.remove('hidden');
    active = true;
    player.y = h - 200;
    loop();
}

function update() {
    player.vx = joy.dx * 8;
    player.vy += 0.8;
    player.x += player.vx;
    player.y += player.vy;

    // Слежение камеры (плавное)
    let targetCamX = player.x - w / 2 + player.w / 2;
    camera.x += (targetCamX - camera.x) * 0.1;

    player.ground = false;
    platforms.forEach(p => {
        if(player.x+player.w > p.x && player.x < p.x+p.w && player.y+player.h > p.y && player.y+player.h < p.y+p.h+15 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.ground = true;
        }
    });

    if(!staff.collected && player.x+player.w > staff.x && player.x < staff.x+20 && player.y+player.h > staff.y) {
        staff.collected = true; player.hasStaff = true; portal.active = true;
        document.getElementById('dialog').innerText = "Артефакт у тебя! Возвращайся к началу уровня!";
    }
}

function draw() {
    ctx.clearRect(0,0,w,h);
    
    // Фон (неподвижный)
    let gdt = ctx.createLinearGradient(0,0,0,h);
    gdt.addColorStop(0, '#0f2027'); gdt.addColorStop(1, '#2c5364');
    ctx.fillStyle = gdt; ctx.fillRect(0,0,w,h);

    ctx.save();
    ctx.translate(-camera.x, 0); // Сдвигаем мир относительно камеры

    // Облака (параллакс - движутся медленнее)
    ctx.fillStyle = "rgba(255,255,255,0.1)";
    for(let i=0; i<10; i++) ctx.fillRect(i*400 + camera.x*0.5, 100 + i*20, 150, 40);

    // Платформы
    platforms.forEach(p => {
        ctx.fillStyle = '#3e2723'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#2e7d32'; ctx.fillRect(p.x, p.y, p.w, 10);
    });

    // Посох
    if(!staff.collected) {
        ctx.fillStyle = '#ffd700'; ctx.shadowBlur = 15; ctx.shadowColor = "yellow";
        ctx.fillRect(staff.x, staff.y, 8, 40);
        ctx.beginPath(); ctx.arc(staff.x+4, staff.y, 10, 0, 7); ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Портал
    if(portal.active) {
        ctx.fillStyle = '#00f2fe'; ctx.shadowBlur = 20; ctx.shadowColor = "#00f2fe";
        ctx.beginPath(); ctx.ellipse(portal.x+30, portal.y+50, 30, 60, 0, 0, 7); ctx.fill();
        ctx.shadowBlur = 0;
    }

    // Игрок
    ctx.strokeStyle = "white"; ctx.lineWidth = 4;
    let x = player.x + 20, y = player.y;
    ctx.beginPath();
    ctx.arc(x, y+10, 10, 0, 7); // голова
    ctx.moveTo(x, y+20); ctx.lineTo(x, y+45); // тело
    ctx.moveTo(x-15, y+35); ctx.lineTo(x+15, y+35); // руки
    ctx.moveTo(x, y+45); ctx.lineTo(x-12, y+60); // ноги
    ctx.moveTo(x, y+45); ctx.lineTo(x+12, y+60);
    ctx.stroke();
    if(player.hasStaff) { ctx.fillStyle = "#ffd700"; ctx.fillRect(x+15, y+15, 5, 40); }

    ctx.restore();
}

function loop() { if(!active) return; update(); draw(); requestAnimationFrame(loop); }
</script>
</body>
</html>
