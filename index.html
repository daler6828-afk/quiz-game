<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BOMBUZA: PHOTO EDITION</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; --tile: #334155; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.5s; }
        .panel { background: var(--card); padding: 30px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); max-width: 900px; margin: 0 auto; }
        .setup-section { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--accent); }
        input, select { padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: inherit; font-size: 15px; }
        .scoreboard { display: flex; gap: 15px; justify-content: center; margin: 30px 0; flex-wrap: wrap; }
        .team-box { min-width: 140px; background: var(--card); padding: 15px; border-radius: 20px; text-align: center; border: 4px solid transparent; transition: 0.4s; }
        .team-box.active { border-color: var(--accent); transform: scale(1.05); }
        .score { font-size: 36px; font-weight: 900; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 12px; }
        .tile { aspect-ratio: 1/1; background: var(--tile); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.2s; position: relative; }
        .tile:hover { background: var(--accent); color: #000; }
        .tile.used { pointer-events: none; opacity: 0.1; background: #000 !important; }
        .tile.used::after { content: "❌"; position: absolute; font-size: 40px; color: #ef4444; inset: 0; display: flex; align-items: center; justify-content: center; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card); width: 90%; max-width: 550px; padding: 40px; border-radius: 35px; text-align: center; border: 2px solid var(--accent); }
        .btn { padding: 14px 28px; border-radius: 12px; border: none; cursor: pointer; font-weight: 800; margin: 8px; }
        .btn-check { background: var(--accent); color: #000; width: 100%; }
        .btn-win { background: #22c55e; color: white; }
        .btn-lose { background: #ef4444; color: white; }
    </style>
</head>
<body>

<div class="panel" id="setup">
    <h2 style="text-align:center; margin-top:0">BOMBUZA: ПО КАРТИНКЕ</h2>
    
    <div class="setup-section">
        <label>⚙️ ОБЩЕЕ КОЛИЧЕСТВО КАРТОЧЕК</label>
        <input type="number" id="v-total" value="44" style="width: 100%; font-size: 24px; text-align: center; border: 2px solid var(--accent); margin-top:10px">
        <div class="setup-grid" style="margin-top:20px">
            <div class="group"><label>Команды</label><input type="text" id="v-teams" value="Команда 1, Команда 2"></div>
            <div class="group"><label>Очки за ответ</label><input type="number" id="v-win" value="15"></div>
            <div class="group"><label>Штраф бомбы</label><input type="number" id="v-bomb" value="20"></div>
        </div>
    </div>

    <div class="setup-section">
        <label>🎁 БОНУСЫ (ВНУТРИ ЛИМИТА)</label>
        <div class="setup-grid">
            <div class="group"><label>💣 Бомбы</label><input type="number" id="c-b" value="4"></div>
            <div class="group"><label>💎 Алмазы</label><input type="number" id="c-g" value="2"></div>
            <div class="group"><label>🚀 Ракета</label><input type="number" id="c-r" value="1"></div>
            <div class="group"><label>🛡️ Щиты</label><input type="number" id="c-s" value="2"></div>
        </div>
    </div>

    <button class="btn btn-check" onclick="init()">СОЗДАТЬ ПОЛЕ</button>
</div>

<div id="game-ui" style="display:none">
    <div class="scoreboard" id="score-board"></div>
    <div class="grid" id="game-grid"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div id="m-icon" style="font-size:70px"></div>
        <h2 id="m-title" style="color:var(--accent)"></h2>
        <p id="m-text" style="font-size:22px; margin:20px 0"></p>
        <button id="m-rev-btn" class="btn btn-check" onclick="show()">ПРОВЕРИТЬ</button>
        <div id="m-ans-box" style="display:none; background:rgba(255,255,255,0.05); padding:20px; border-radius:15px; margin-bottom:15px">
            <b id="m-ans-text" style="font-size:22px; color:var(--accent)"></b>
        </div>
        <div id="m-ctrl" style="display:none">
            <button class="btn btn-win" onclick="fin(true)">ВЕРНО ✅</button>
            <button class="btn btn-lose" onclick="fin(false)">ОШИБКА ❌</button>
        </div>
        <button id="m-ok-btn" class="btn btn-check" style="display:none" onclick="nxt()">ДАЛЬШЕ</button>
    </div>
</div>

<script>
const originalQuestions = [
    {q: "О борьбе между Христом и сатаной в теч 7000 лет", a: "Быт. 3:15"},
    {q: "Пророчество Еноха", a: "Иуд. 1:14-15"},
    {q: "Пророчество о потопе", a: "Быт. 6-7гл."},
    {q: "Пророчество Ноя о его потомках", a: "Быт. 9:25-27"},
    {q: "430 лет", a: "Быт. 15:13-16"},
    {q: "Пророчество Иакова", a: "Быт. 49:10"},
    {q: "Пророчество Иова", a: "Иов 19:25-27"},
    {q: "40 лет странствования по пустыне", a: "Числ. 14:33-34"},
    {q: "Пророчество Моисея о Христе как пророке", a: "Втор. 18:15-19"},
    {q: "70 лет Вавилонского плена", a: "2Парал. 36:20-21"},
    {q: "Великий пророческий истукан", a: "Дан. 2 гл."},
    {q: "Четыре больших зверя", a: "Дан. 7 гл."},
    {q: "Овен и козёл", a: "Дан. 8 гл."},
    {q: "2300 вечеров и утр (лет)", a: "Дан. 8:14"},
    {q: "70 седьмин", a: "Дан. 9:24-27"},
    {q: "1260 дней (лет)", a: "Дан. 7:25"},
    {q: "1290 дней (лет)", a: "Дан. 12:11"},
    {q: "1335 дней (лет)", a: "Дан. 12:12"},
    {q: "Великое пророчество Иисуса Христа", a: "Матф. 24 гл."},
    {q: "Пророч. ап. Павла о вел. отступл. в христ-ве", a: "2Фес. 2:11-12"},
    {q: "Семь церквей", a: "Откр. 2-3 гл."},
    {q: "Семь печатей", a: "Откр. 5, 6, 8:1"},
    {q: "Удержание ветров и окончание запечатления", a: "Откр. 7:1-8"},
    {q: "Семь труб", a: "Откр. 8-11 гл."},
    {q: "Время Филадельф. Адвент. в симв. Ангела обл. в обл.", a: "Откр. 10 гл."},
    {q: "Особое время, не измеряемое тростью ВНЗ", a: "Откр. 11:1-2"},
    {q: "1260 лет Библия во вретище", a: "Откр. 11:3-6"},
    {q: "Церковь Божья всех веков", a: "Откр. 12 гл."},
    {q: "Время папского Рима", a: "Откр. 13:1-10"},
    {q: "Двурогий зверь - лжепротестантизм", a: "Откр. 13:11"},
    {q: "Время формирован. и запечатл. 144 000 искупл.", a: "Откр. 14:1-5"},
    {q: "Время трёхангельской вести", a: "Откр. 14:6-12"},
    {q: "Две жатвы", a: "Откр. 14:14"},
    {q: "Песнь Моисея и Агнца перед язвами", a: "Откр. 15:1-4"},
    {q: "Закрытие благодати", a: "Откр. 15:5-8"},
    {q: "Излитие семи посл. чаш (язв) гнева Б. на землю", a: "Откр. 16 гл."},
    {q: "Два зверя и их участие в последней вел. борьбе", a: "Откр. 17 гл."},
    {q: "Весть Иного Ангела. Посл. предупрежд. миру", a: "Откр. 18:1-5"},
    {q: "Наказание Вавилона", a: "Откр. 18:6-24"},
    {q: "Радость неба о правосудии над Вавилоном", a: "Откр. 19:1-10"},
    {q: "4 посл. вест. имени Хр. и 4 стадии раб. Иного Анг.", a: "Откр. 19:11"},
    {q: "Великая вечеря птиц", a: "Откр. 19:17"},
    {q: "1000-летнее царство и суд", a: "Откр. 20 гл."},
    {q: "Город Новый Иерусалим - Жена невеста Агнца", a: "Откр. 21 гл."}
];

let g = { teams:[], scores:[], shields:[], cur:0, deck:[], w:15, b:20, extra:false };

function init() {
    g.teams = document.getElementById('v-teams').value.split(',').map(n => n.trim());
    g.scores = g.teams.map(() => 0);
    g.shields = g.teams.map(() => false);
    g.w = parseInt(document.getElementById('v-win').value);
    g.b = parseInt(document.getElementById('v-bomb').value);
    
    let limit = parseInt(document.getElementById('v-total').value);
    let deck = [];

    const addB = (id, type, icon, t, d) => {
        let n = parseInt(document.getElementById(id).value);
        for(let i=0; i<n; i++) if(deck.length < limit) deck.push({type, icon, t, d});
    };

    addB('c-b', 'b', '💣', 'БОМБА!', `Минус ${g.b} очков!`);
    addB('c-g', 'g', '💎', 'АЛМАЗ!', '+50 очков!');
    addB('c-r', 'r', '🚀', 'РАКЕТА!', 'Еще один ход!');
    addB('c-s', 's', '🛡️', 'ЩИТ!', 'Защита от бомбы!');

    let left = limit - deck.length;
    for(let i=0; i < left; i++) {
        let item = originalQuestions[i % originalQuestions.length];
        deck.push({type:'q', title:`Цепь №${i+1}`, q: item.q, a: item.a});
    }

    g.deck = deck.sort(() => Math.random() - 0.5);
    render();
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
}

function render() {
    const sb = document.getElementById('score-board');
    sb.innerHTML = g.teams.map((n, i) => `
        <div class="team-box ${i===g.cur ? 'active' : ''}">
            <div style="font-size:12px">${n} ${g.shields[i] ? '🛡️' : ''}</div>
            <div class="score">${g.scores[i]}</div>
        </div>
    `).join('');
    const grid = document.getElementById('game-grid');
    grid.innerHTML = g.deck.map((item, i) => `<div class="tile ${item.type==='used'?'used':''}" onclick="openT(${i})">${i+1}</div>`).join('');
}

function openT(idx) {
    const it = g.deck[idx];
    if(it.type === 'used') return;
    window.activeIdx = idx;
    const m = document.getElementById('modal');
    ['m-rev-btn', 'm-ans-box', 'm-ctrl', 'm-ok-btn'].forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById('m-icon').innerText = it.icon || '📖';
    document.getElementById('m-title').innerText = it.title || it.t;
    document.getElementById('m-text').innerText = it.q || it.d;
    if(it.type === 'q') {
        document.getElementById('m-rev-btn').style.display = 'block';
        document.getElementById('m-ans-text').innerText = it.a;
    } else {
        document.getElementById('m-ok-btn').style.display = 'block';
        apply(it);
    }
    m.style.display = 'flex';
}

function apply(it) {
    let c = g.cur;
    if(it.type === 'b') { if(g.shields[c]) g.shields[c] = false; else g.scores[c] -= g.b; }
    if(it.type === 'g') g.scores[c] += 50;
    if(it.type === 's') g.shields[c] = true;
    if(it.type === 'r') g.extra = true;
}

function show() {
    document.getElementById('m-rev-btn').style.display = 'none';
    document.getElementById('m-ans-box').style.display = 'block';
    document.getElementById('m-ctrl').style.display = 'flex';
}

function fin(win) {
    if(win) g.scores[g.cur] += g.w;
    nxt();
}

function nxt() {
    document.getElementById('modal').style.display = 'none';
    g.deck[window.activeIdx] = { type: 'used' };
    if(!g.extra) g.cur = (g.cur + 1) % g.teams.length;
    g.extra = false;
    render();
}
</script>
</body>
</html>
