<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>David: Open World RPG</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #game-ui { width: 600px; display: flex; justify-content: space-between; padding: 10px; background: #333; border-radius: 10px 10px 0 0; }
        
        /* Карта мира */
        #world { 
            position: relative; width: 600px; height: 400px; 
            background: #4a7023; /* Цвет травы */
            border: 4px solid #5d3a1c; overflow: hidden; 
        }

        .object { position: absolute; font-size: 30px; transition: all 0.1s linear; }
        #player { z-index: 10; font-size: 40px; }
        .rock { color: #888; }
        .enemy { color: #ff4d4d; }
        
        #controls-hint { margin-top: 15px; color: #aaa; text-align: center; }
        .stat { font-weight: bold; color: #ffcc00; }
    </style>
</head>
<body>

<div id="game-ui">
    <div>💎 Камни: <span id="rocks-count" class="stat">0</span></div>
    <div>❤️ Здоровье: <span id="hp-count" class="stat">100</span></div>
    <div>🏆 Опыт: <span id="exp-count" class="stat">0</span></div>
</div>

<div id="world">
    <div id="player" class="object">👤</div>
</div>

<div id="controls-hint">
    Используй <b>W, A, S, D</b> для передвижения.<br>
    Собирай камни 🪨 и побеждай львов 🦁!
</div>

<script>
    const world = document.getElementById('world');
    const playerEl = document.getElementById('player');
    
    let player = { x: 280, y: 180, hp: 100, rocks: 0, exp: 0 };
    let objects = []; // Здесь храним камни и врагов

    // Обновление позиции игрока
    function updatePlayerPos() {
        playerEl.style.left = player.x + 'px';
        playerEl.style.top = player.y + 'px';
    }

    // Создание случайных объектов на карте
    function spawnObject(type, icon, className) {
        const obj = {
            id: Math.random(),
            x: Math.random() * 560,
            y: Math.random() * 360,
            type: type
        };
        
        const el = document.createElement('div');
        el.className = 'object ' + className;
        el.id = obj.id;
        el.innerHTML = icon;
        el.style.left = obj.x + 'px';
        el.style.top = obj.y + 'px';
        
        world.appendChild(el);
        objects.push(obj);
    }

    // Проверка столкновений
    function checkCollisions() {
        objects.forEach((obj, index) => {
            const dist = Math.hypot(player.x - obj.x, player.y - obj.y);
            
            if (dist < 30) {
                if (obj.type === 'rock') {
                    player.rocks++;
                    document.getElementById('rocks-count').innerText = player.rocks;
                } else if (obj.type === 'enemy') {
                    if (player.rocks > 0) {
                        player.rocks--; // Тратим камень на победу
                        player.exp += 20;
                        alert("Ты победил льва камнем!");
                    } else {
                        player.hp -= 20;
                        alert("У тебя нет камней! Лев укусил тебя!");
                    }
                    document.getElementById('hp-count').innerText = player.hp;
                    document.getElementById('rocks-count').innerText = player.rocks;
                    document.getElementById('exp-count').innerText = player.exp;
                }
                
                // Удаляем объект с карты
                document.getElementById(obj.id).remove();
                objects.splice(index, 1);
                
                // Спавним новый объект взамен
                setTimeout(() => {
                    if (obj.type === 'rock') spawnObject('rock', '🪨', 'rock');
                    else spawnObject('enemy', '🦁', 'enemy');
                }, 3000);
            }
        });

        if (player.hp <= 0) {
            alert("Игра окончена! Ты стал легендой пустыни.");
            location.reload();
        }
    }

    // Управление
    window.addEventListener('keydown', (e) => {
        const step = 15;
        if (e.key.toLowerCase() === 'w' && player.y > 0) player.y -= step;
        if (e.key.toLowerCase() === 's' && player.y < 350) player.y += step;
        if (e.key.toLowerCase() === 'a' && player.x > 0) player.x -= step;
        if (e.key.toLowerCase() === 'd' && player.x < 560) player.x += step;
        
        updatePlayerPos();
        checkCollisions();
    });

    // Начальный спавн
    for(let i=0; i<5; i++) spawnObject('rock', '🪨', 'rock');
    for(let i=0; i<3; i++) spawnObject('enemy', '🦁', 'enemy');
    
    updatePlayerPos();
</script>

</body>
</html>
