<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ной: Строительство Ковчега</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; user-select: none; }
        canvas { display: block; }

        /* Экраны */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .screen { position: absolute; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; color: white; text-align: center; }
        .btn { padding: 15px 40px; margin: 20px; font-size: 20px; color: #fff; border: 2px solid #fff; background: transparent; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .fade-in { animation: fadeInAnimation 2s forwards; }
        @keyframes fadeInAnimation { from { opacity: 0; } to { opacity: 1; } }

        /* Инвентарь снизу (по твоему рисунку) */
        #inv-toggle { position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; background: rgba(255,215,0,0.2); border: 2px solid #ffd700; border-radius: 10px; display: flex; align-items: center; justify-content: center; pointer-events: auto; font-size: 24px; z-index: 200; }
        #inv-panel { position: absolute; bottom: -120px; left: 50%; transform: translateX(-50%); width: 85%; height: 90px; background: rgba(40, 30, 20, 0.95); border: 3px solid #5d4037; border-radius: 15px 15px 0 0; display: flex; align-items: center; justify-content: space-around; transition: bottom 0.4s; pointer-events: auto; z-index: 150; }
        .inv-panel-open { bottom: 0px !important; }
        .slot { width: 55px; height: 55px; background: rgba(255,255,255,0.05); border: 2px dashed #8d6e63; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 25px; }
        .filled { border: 2px solid #ffd700 !important; background: rgba(255,215,0,0.1) !important; }

        /* Джойстик */
        #joy-base { position: absolute; bottom: 120px; left: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; }
        #joy-stick { position: absolute; width: 40px; height: 40px; background: #fff; border-radius: 50%; left: 30px; top: 30px; }
        #jump-btn { position: absolute; bottom: 120px; right: 50px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; pointer-events: auto; }

        #dialog-box { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 80%; background: rgba(0,0,0,0.85); border: 2px solid #ffd700; border-radius: 10px; padding: 15px; color: white; display: none; text-align: center; pointer-events: none; z-index: 110; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="ui">
    <div id="menu" class="screen">
        <h1 style="color: #ffd700; letter-spacing: 3px;">НАЗАД ВО ВРЕМЕНИ</h1>
        <p style="opacity: 0.6;">Эпизод: Ковчег спасения</p>
        <div class="btn" onclick="startIntro()">НАЧАТЬ ПУТЬ</div>
    </div>

    <div id="intro" class="screen hidden">
        <p id="intro-text" class="fade-in"></p>
        <div class="btn hidden" id="intro-btn" onclick="startGame()">ВОЙТИ В ИСТОРИЮ</div>
    </div>

    <div id="hud" class="hidden">
        <div id="inv-toggle" onclick="toggleInv()">🎒</div>
        <div id="inv-panel">
            <div class="slot" id="s0"></div>
            <div class="slot" id="s1"></div>
            <div class="slot" id="s2"></div>
            <div class="slot" id="s3"></div>
        </div>
        <div id="joy-base"><div id="joy-stick"></div></div>
        <div id="jump-btn">ПРЫЖОК</div>
        <div id="dialog-box"></div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let w, h, active = false, frame = 0;
let player = { x: 150, y: 0, vx: 0, vy: 0, w: 40, h: 65, ground: false, items: [], state: 'NORMAL' };
let cameraX = 0;
let waterY = 0, isFlooding = false;
let arkX = 3500; // Ковчег в конце длинной карты

const items = [
    {x: 1000, y: 0, id: '🪓', name: 'Топор', collected: false},
    {x: 1800, y: 0, id: '🪵', name: 'Кедр', collected: false},
    {x: 2700, y: 0, id: '🪄', name: 'Посох', collected: false}
];

let platforms = [];

function startIntro() {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    document.getElementById('menu').classList.add('hidden');
    document.getElementById('intro').classList.remove('hidden');
    
    const lines = [
        "Небо затянуло тучами...",
        "Ной строит Ковчег, но ему нужна твоя помощь.",
        "Найди инструменты и ресурсы, пока не начался дождь."
    ];
    let i = 0;
    const txt = document.getElementById('intro-text');
    txt.innerText = lines[0];
    const itv = setInterval(() => {
        i++;
        if(i < lines.length) txt.innerText = lines[i];
        else { clearInterval(itv); document.getElementById('intro-btn').classList.remove('hidden'); }
    }, 3000);
}

function startGame() {
    document.getElementById('intro').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    active = true;
    init();
    loop();
    showDialog("Ной: 'Путник, помоги мне! Найди Топор, Дерево и мой Посох, чтобы достроить Ковчег!'");
}

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    player.y = h - 150;
    waterY = h + 100;

    platforms = [
        {x: 0, y: h-70, w: 4000, h: 70, type: 'ground'}, // Очень длинная земля
        {x: 600, y: h-200, w: 200, h: 20},
        {x: 950, y: h-320, w: 150, h: 20},
        {x: 1300, y: h-220, w: 300, h: 20},
        {x: 1700, y: h-400, w: 200, h: 20},
        {x: 2100, y: h-300, w: 400, h: 20},
        {x: 2600, y: h-450, w: 200, h: 20},
    ];

    items[0].y = h - 250;
    items[1].y = h - 450;
    items[2].y = h - 500;
}

// Управление
let joy = { id: null, x: 0, dx: 0 };
window.addEventListener('touchstart', e => {
    for(let t of e.changedTouches) {
        if(t.clientX < w/2 && joy.id === null) {
            joy.id = t.identifier; joy.x = t.clientX;
            document.getElementById('joy-base').style.display = 'block';
            document.getElementById('joy-base').style.left = (t.clientX - 50) + 'px';
            document.getElementById('joy-base').style.top = (t.clientY - 50) + 'px';
        } else if(t.clientX >= w/2) { if(player.ground) player.vy = -18; }
    }
}, {passive: false});

window.addEventListener('touchmove', e => {
    for(let t of e.changedTouches) {
        if(t.identifier === joy.id) {
            joy.dx = Math.max(-1, Math.min(1, (t.clientX - joy.x) / 40));
            document.getElementById('joy-stick').style.transform = `translateX(${joy.dx * 25}px)`;
        }
    }
});

window.addEventListener('touchend', e => {
    for(let t of e.changedTouches) if(t.identifier === joy.id) { joy.id = null; joy.dx = 0; document.getElementById('joy-base').style.display = 'none'; }
});

function toggleInv() { document.getElementById('inv-panel').classList.toggle('inv-panel-open'); }

function showDialog(t) {
    const b = document.getElementById('dialog-box');
    b.innerText = t; b.style.display = 'block';
    setTimeout(() => b.style.display = 'none', 5000);
}

function update() {
    frame++;
    player.vx = joy.dx * 8;
    player.vy += 0.8;
    player.x += player.vx;
    player.y += player.vy;
    cameraX += (player.x - w/2 - cameraX) * 0.1;

    player.ground = false;
    platforms.forEach(p => {
        if(player.x+25 > p.x && player.x < p.x+p.w && player.y+player.h > p.y && player.y+player.h < p.y+20 && player.vy >= 0) {
            player.y = p.y - player.h; player.vy = 0; player.ground = true;
        }
    });

    items.forEach(item => {
        if(!item.collected && Math.abs(player.x - item.x) < 40 && Math.abs(player.y - item.y) < 60) {
            item.collected = true;
            player.items.push(item.id);
            const slot = document.getElementById('s' + (player.items.length-1));
            slot.innerText = item.id; slot.classList.add('filled');
            if(player.items.length === 3) showDialog("Все собрано! Скорее к Ковчегу в конце пути!");
        }
    });

    // Финал: Ковчег
    if(player.x > arkX && player.items.length === 3 && !isFlooding) {
        isFlooding = true;
        player.state = 'INSIDE_ARK';
        showDialog("Вы успели! Начинается Великий Потоп...");
    }

    if(isFlooding) {
        waterY -= 2;
        if(waterY < h - 400) {
            active = false;
            alert("Глава 1 завершена! Ной спасен. Продолжение следует...");
            location.reload();
        }
    }
}

function draw() {
    ctx.clearRect(0,0,w,h);
    let g = ctx.createLinearGradient(0,0,0,h);
    g.addColorStop(0, '#0a1a2a'); g.addColorStop(1, '#203a43');
    ctx.fillStyle = g; ctx.fillRect(0,0,w,h);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Платформы
    platforms.forEach(p => {
        ctx.fillStyle = '#3e2723'; ctx.fillRect(p.x, p.y, p.w, p.h);
        ctx.fillStyle = '#2e7d32'; ctx.fillRect(p.x, p.y, p.w, 10);
    });

    // Ной в начале
    drawNoah(150, h-135);

    // Ковчег в конце
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(arkX, h-220, 400, 150); // Корпус
    ctx.fillStyle = '#3e2723';
    ctx.fillRect(arkX + 100, h-300, 200, 80); // Надстройка
    ctx.fillStyle = "white"; ctx.fillText("КОВЧЕГ", arkX + 160, h-250);

    items.forEach(item => {
        if(!item.collected) {
            ctx.font = "30px Arial";
            ctx.fillText(item.id, item.x, item.y + Math.sin(frame/10)*10);
        }
    });

    if(player.state !== 'INSIDE_ARK') drawNoah(player.x + 20, player.y, true);

    ctx.restore();

    // Вода
    ctx.fillStyle = "rgba(0, 120, 255, 0.7)";
    ctx.fillRect(0, waterY, w, h);
    ctx.fillStyle = "white"; ctx.fillRect(0, waterY, w, 3);
}

function drawNoah(x, y, isPlayer = false) {
    ctx.lineWidth = 3; ctx.lineCap = "round";
    let anim = Math.sin(frame/5) * 10;
    
    // Мантия
    ctx.fillStyle = isPlayer ? "#5d4037" : "#455a64";
    ctx.beginPath(); ctx.moveTo(x-15, y+65); ctx.lineTo(x+15, y+65); ctx.lineTo(x, y+20); ctx.fill();

    // Голова и борода
    ctx.strokeStyle = "white";
    ctx.beginPath(); ctx.arc(x, y+15, 10, 0, 7); ctx.stroke();
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.moveTo(x-6, y+18); ctx.lineTo(x+6, y+18); ctx.lineTo(x, y+35); ctx.fill();

    // Руки
    ctx.strokeStyle = "#e0ac69";
    let move = (isPlayer && Math.abs(joy.dx) > 0.1) ? anim : 0;
    ctx.beginPath(); ctx.moveTo(x, y+25); ctx.lineTo(x-18, y+40+move); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x, y+25); ctx.lineTo(x+18, y+40-move); ctx.stroke();

    if(isPlayer && player.items.includes('🪄')) {
        ctx.strokeStyle = "gold"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(x+18, y+20-move); ctx.lineTo(x+18, y+60-move); ctx.stroke();
    }
}

function loop() { if(!active) return; update(); draw(); requestAnimationFrame(loop); }
window.addEventListener('resize', init);
init();
</script>
</body>
</html>
